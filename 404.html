<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f0f0f; 
            color: #e5e5e5; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="text-center px-6">
        <h1 class="text-9xl font-extrabold tracking-tighter text-zinc-800 mb-4">404</h1>
        <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Oops! Nyasar ya?</h2>
        <p class="text-zinc-500 mb-8 max-w-md mx-auto">
            Halaman yang kamu cari sepertinya tidak ada, sudah dihapus, atau kamu salah masukin URL.
        </p>
        
        <a href="/" class="inline-flex items-center px-6 py-3 bg-white text-black font-bold rounded-full hover:bg-zinc-200 transition-colors duration-300">
            <i class="fas fa-home mr-2"></i> Kembali ke Beranda
        </a>
    </div>

</body>
</html>
