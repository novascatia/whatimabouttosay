<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <link rel="icon" type="image/png" href="/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body { 
            background-color: #0f0f0f; 
            color: #e5e5e5; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Aktifkan ruang 3D agar efek timbul bekerja */
            perspective: 1200px; 
        }
        
        .glass-card { 
            background: #1a1a1a; 
            border: 1px solid #2d2d2d; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .pop-up-container {
            opacity: 0;
            transform: translateY(40px);
        }

        /* Setel preserve-3d agar elemen anak bisa menonjol dalam ruang 3D */
        .error-title {
            transform-style: preserve-3d;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div class="pop-up-container text-center px-8 py-12 glass-card max-w-lg mx-4 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-zinc-800 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-zinc-800 rounded-full blur-3xl opacity-50"></div>

        <div class="relative z-10">
            <h1 class="error-title text-8xl md:text-9xl font-extrabold tracking-tighter text-zinc-800 mb-2 drop-shadow-2xl relative inline-block py-6 px-10">
                <span class="error-number inline-block">4</span>
                <span class="error-number inline-block">0</span>
                <span class="error-number inline-block">4</span>
            </h1>
            <h2 class="text-2xl md:text-3xl font-bold text-white mb-4">Oops! Nyasar ya?</h2>
            <p class="text-zinc-400 mb-8 text-sm md:text-base leading-relaxed max-w-xs mx-auto">
                Halaman yang kamu cari kayanya gaada, dihapus, atau.. kamu yang salah link?! Coba cek yang bener dulu ya!
            </p>
            
            <a href="/" class="inline-flex items-center px-6 py-3 bg-white text-black font-bold rounded-full hover:scale-105 hover:bg-zinc-200 transition-all duration-300">
                <i class="fas fa-home mr-2"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        // 1. Animasi saat halaman pertama kali dimuat (Inisialisasi)
        // Kita set skala awalnya ke 0.8 di sini, bukan di CSS agar tidak konflik dengan GSAP hover
        gsap.set(".pop-up-container", { scale: 0.8 }); 

        gsap.to(".pop-up-container", { 
            duration: 0.8, 
            scale: 1, 
            opacity: 1, 
            y: 0,
            ease: "back.out(1.5)"
        });
        
        gsap.from(".error-number", {
            duration: 0.6,
            y: -30,
            opacity: 0,
            stagger: 0.15,
            ease: "bounce.out",
            delay: 0.3
        });

        // 2. Logika 3D Tilt + SCALE (Membesar) Hover Effect
        const errorTitle = document.querySelector('.error-title');

        errorTitle.addEventListener('mousemove', (e) => {
            const rect = errorTitle.getBoundingClientRect();
            
            // Hitung posisi mouse relatif terhadap titik tengah (-1 sampai 1)
            const x = ((e.clientX - rect.left) / rect.width) - 0.5;
            const y = ((e.clientY - rect.top) / rect.height) - 0.5;

            // ANIMASI UTAMA: Miringkan DAN Besarkan kontainer tulisan
            gsap.to(errorTitle, {
                duration: 0.3,
                scale: 1.15,      // <--- INI DIA! Membesar sebanyak 15%
                rotationY: x * 40,  // Sudut miring kiri/kanan
                rotationX: -y * 40, // Sudut miring atas/bawah
                ease: "power1.out"
            });

            // ANIMASI ANKGA: Dorong angka melesat jauh ke depan
            gsap.to(".error-number", {
                duration: 0.3,
                z: 100, // <--- Semakin besar angkanya, semakin menonjol keluar
                ease: "power1.out"
            });
        });

        // Kembalikan ke posisi normal saat kursor pergi
        errorTitle.addEventListener('mouseleave', () => {
            gsap.to(errorTitle, {
                duration: 0.8,
                scale: 1,        // <--- Kembali ke ukuran asli
                rotationY: 0,
                rotationX: 0,
                ease: "elastic.out(1, 0.3)" // Efek memantul saat kembali
            });
            
            gsap.to(".error-number", {
                duration: 0.8,
                z: 0,            // Kembali rata dengan tanah
                ease: "elastic.out(1, 0.3)"
            });
        });
    </script>
</body>
</html>
