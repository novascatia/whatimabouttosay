<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Stats & Tracker</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #0f0f0f; color: #e5e5e5; overflow-x: hidden; }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 16px; transition: 0.3s; }
        .glass-card:hover { border-color: #4a4a4a; }

        .tab-pill { 
            padding: 8px 24px; border-radius: 30px; font-size: 13px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px; color: #71717a; 
            background: transparent; transition: all 0.3s; cursor: pointer; 
        }
        .tab-pill:hover { color: #fff; }
        .tab-pill.active { background: #1ed760; color: #000; }

        .time-filter-btn { 
            padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 1px; color: #a1a1aa; 
            border: 1px solid #3f3f46; background: transparent; transition: all 0.2s; cursor: pointer; 
        }
        .time-filter-btn:hover { border-color: #71717a; color: #fff; }
        .time-filter-btn.active { background: #1ed760 !important; color: #000 !important; border-color: #1ed760 !important; }

        .bounce-up { opacity: 0; transform: translateY(20px); animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounceIn { to { opacity: 1; transform: translateY(0); } }
        
        .waveform { display: flex; align-items: flex-end; gap: 3px; height: 14px; }
        .waveform-bar { width: 3px; background-color: #1ed760; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .waveform-bar:nth-child(2) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 14px; } }
        
        #share-template { position: absolute; left: -9999px; top: 0; width: 400px; padding: 40px 30px; background: #0f0f0f; border: 1px solid #2d2d2d; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        .bg-logo-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; opacity: 0.05; z-index: 0; pointer-events: none; filter: grayscale(1); object-fit: cover; border-radius: 50%; }
        .share-content { position: relative; z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-5xl mx-auto mb-20">

    <div id="auth-section" class="hidden flex-col items-center justify-center min-h-[80vh] text-center">
        <i class="fab fa-spotify text-6xl text-[#1ed760] mb-6"></i>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-white">Spotify Stats</h1>
        <p class="text-zinc-400 mb-8 max-w-sm mx-auto">Login to see your realtime activity, top tracks, and generate your aesthetic share card.</p>
        <button onclick="window.location.href='/.netlify/functions/login-tracker'" class="bg-[#1ed760] text-black font-bold px-8 py-3.5 rounded-full hover:scale-105 transition shadow-[0_0_20px_rgba(30,215,96,0.2)] tracking-widest text-sm">LOGIN WITH SPOTIFY</button>
    </div>

    <div id="stats-section" class="hidden mt-6">
        
        <div class="flex items-center justify-between mb-10 bg-[#111] p-5 rounded-3xl border border-zinc-800/80 shadow-lg max-w-2xl mx-auto">
            <div class="flex items-center gap-4">
                <img id="user-profile-img" src="/logo.png" class="w-12 h-12 rounded-full object-cover border-2 border-zinc-700">
                <div class="text-left">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Logged in as</p>
                    <h3 id="user-profile-name" class="text-white font-black text-lg truncate max-w-[150px] sm:max-w-[200px]">Someone</h3>
                </div>
            </div>
            <button onclick="logoutSpotify()" class="bg-red-900/10 hover:bg-red-900/30 text-red-500 w-10 h-10 rounded-full flex items-center justify-center transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>

        <div class="flex flex-col items-center gap-6 mb-10">
            <div class="flex justify-center gap-3">
                <button onclick="switchTrackerTab('recent')" id="btn-recent" class="tab-pill active">RECENT</button>
                <button onclick="switchTrackerTab('top')" id="btn-top" class="tab-pill">TOP TRACKS</button>
            </div>
            
            <button onclick="generateShareImage()" id="share-btn" class="inline-flex items-center gap-2 bg-zinc-800 hover:bg-[#1ed760] hover:text-black text-zinc-400 px-6 py-2 rounded-full text-[11px] font-black transition tracking-widest uppercase">
                <i class="fas fa-share-nodes"></i> Share These Stats
            </button>
        </div>

        <div id="top-filters" class="flex justify-center gap-2 mb-8 hidden">
            <button onclick="changeTimeRange('short_term')" id="filter-short_term" class="time-filter-btn active">4 Weeks</button>
            <button onclick="changeTimeRange('medium_term')" id="filter-medium_term" class="time-filter-btn">6 Months</button>
            <button onclick="changeTimeRange('long_term')" id="filter-long_term" class="time-filter-btn">All Time</button>
        </div>

        <div id="tracker-loader" class="text-center py-20 hidden">
            <i class="fas fa-circle-notch fa-spin text-3xl text-[#1ed760]"></i>
        </div>

        <div id="recent-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div id="top-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5 hidden"></div>
    </div>

    <div id="share-template">
        <img id="share-watermark" src="/logo.png" class="bg-logo-watermark" crossOrigin="anonymous">
        <div class="share-content">
            <div class="text-center mb-8">
                <p class="text-[#1ed760] text-[10px] font-black uppercase tracking-[0.3em] mb-2">Spotify Stats</p>
                <h2 id="share-title" class="text-2xl font-black">What someone been listening..</h2>
                <p id="share-subtitle" class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mt-1"></p>
            </div>
            <div id="share-items" class="flex flex-col gap-3"></div>
            <div class="mt-12 pt-6 border-t border-zinc-800/50 text-center">
                <p class="text-zinc-600 text-[9px] font-bold tracking-widest uppercase">novascatia.my.id</p>
            </div>
        </div>
    </div>

    <div id="share-modal" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col items-center p-4 transition-opacity duration-300 opacity-0 backdrop-blur-md overflow-y-auto modal-scroll">
        <div id="share-modal-content" class="relative max-w-sm w-full flex flex-col items-center transform scale-95 transition-transform duration-300 my-auto py-10">
            <button onclick="closeModal()" class="absolute top-2 right-0 md:-right-6 bg-zinc-800 hover:bg-zinc-700 text-white w-10 h-10 rounded-full flex items-center justify-center transition shadow-lg z-50 border border-zinc-600"><i class="fas fa-times text-xl"></i></button>
            <img id="share-preview" src="" alt="Preview" class="w-full max-w-[300px] max-h-[55vh] object-contain rounded-2xl shadow-2xl mb-6 border border-zinc-800">
            <a id="download-link" href="#" download="my-stats.png" class="bg-[#1ed760] hover:bg-[#1db954] text-black font-black px-8 py-4 rounded-full flex items-center justify-center gap-3 transition transform hover:scale-105 shadow-[0_15px_30px_rgba(30,215,96,0.2)] w-full max-w-[280px] text-xs tracking-[0.15em] uppercase"><i class="fas fa-download text-lg"></i> Download PNG</a>
        </div>
    </div>

    <script>
        let currentTrackerTab = 'recent';
        let currentTimeRange = 'short_term';
        let trackerData = { recent: [], top: [], nowPlaying: null };
        let userProfile = { name: "Someone", image: "/logo.png" };
        let forceAnimate = true;

        function logoutSpotify() {
            localStorage.removeItem('spotify_user_token');
            window.location.href = window.location.pathname; 
        }

        // FUNGSI UNTUK MERAPIKAN URL
        function beautifyURL(username) {
            const cleanName = username.toLowerCase().replace(/\s+/g, '');
            // Mengubah URL jadi novascatia.my.id/username tanpa reload
            window.history.replaceState({}, document.title, "/" + cleanName);
        }

        function checkAuth() {
            const hash = window.location.hash;
            if (hash.includes('access_token')) {
                const urlParams = new URLSearchParams(hash.substring(1));
                const token = urlParams.get('access_token');
                localStorage.setItem('spotify_user_token', token);
                // Hash dihapus segera setelah disave
                window.location.hash = ''; 
            }

            const token = localStorage.getItem('spotify_user_token');
            if (token) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('stats-section').classList.remove('hidden');
                initTrackerApp(token);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('auth-section').classList.add('flex');
                document.getElementById('stats-section').classList.add('hidden');
            }
        }

async function fetchSpotifyAPI(endpoint, token) {
            // Memecah teks URL agar tidak disensor otomatis
            const p1 = "api";
            const p2 = "spotify";
            const p3 = "com";
            const baseUrl = "https://" + p1 + "." + p2 + "." + p3 + "/v1/";

            const res = await fetch(baseUrl + endpoint, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (res.status === 401) { logoutSpotify(); return null; } 
            if (res.status === 204) return null; 
            return await res.json();
        }

        async function initTrackerApp(token) {
            const profile = await fetchSpotifyAPI('me', token);
            if (profile && !profile.error) {
                userProfile.name = profile.display_name || 'User';
                if (profile.images && profile.images.length > 0) userProfile.image = profile.images[0].url;
                
                document.getElementById('user-profile-name').innerText = userProfile.name;
                document.getElementById('user-profile-img').src = userProfile.image;
                document.getElementById('share-title').innerText = `What ${userProfile.name} been listening..`;
                document.getElementById('share-watermark').src = userProfile.image;

                // EKSEKUSI MERAPIKAN URL
                beautifyURL(userProfile.name);
            }
            fetchTrackerData();
            setInterval(fetchTrackerData, 15000); 
        }

        // (Fungsi fetchData, renderTrackerUI, generateShareImage, dll tetap sama dengan perbaikan Grid)
        async function fetchTrackerData() {
            const token = localStorage.getItem('spotify_user_token');
            if(!token) return;
            document.getElementById('tracker-loader').classList.remove('hidden');
            try {
                const [nowPlayingRes, recentRes, topRes] = await Promise.all([
                    fetchSpotifyAPI('me/player/currently-playing', token),
                    fetchSpotifyAPI('me/player/recently-played?limit=20', token),
                    fetchSpotifyAPI(`me/top/tracks?time_range=${currentTimeRange}&limit=20`, token)
                ]);
                if (nowPlayingRes && nowPlayingRes.is_playing && nowPlayingRes.item) {
                    trackerData.nowPlaying = { isPlaying: true, title: nowPlayingRes.item.name, artist: nowPlayingRes.item.artists.map(a => a.name).join(', '), albumArt: nowPlayingRes.item.album.images[0].url, url: nowPlayingRes.item.external_urls.spotify };
                } else trackerData.nowPlaying = null;
                if (recentRes && recentRes.items) {
                    trackerData.recent = recentRes.items.map(item => ({ title: item.track.name, artist: item.track.artists.map(a => a.name).join(', '), albumArt: item.track.album.images[0].url, playedAt: item.played_at, url: item.track.external_urls.spotify }));
                }
                if (topRes && topRes.items) {
                    trackerData.top = topRes.items.map(track => ({ title: track.name, artist: track.artists.map(a => a.name).join(', '), albumArt: track.album.images[0].url, url: track.external_urls.spotify }));
                }
                renderTrackerUI();
            } catch (e) { console.error(e); }
        }

        function switchTrackerTab(tab) {
            if(currentTrackerTab === tab) return;
            currentTrackerTab = tab;
            forceAnimate = true;
            document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('recent-list').classList.toggle('hidden', tab !== 'recent');
            document.getElementById('top-list').classList.toggle('hidden', tab !== 'top');
            document.getElementById('top-filters').classList.toggle('hidden', tab !== 'top');
            renderTrackerUI();
        }

        function changeTimeRange(range) {
            if(currentTimeRange === range) return;
            currentTimeRange = range;
            forceAnimate = true;
            document.querySelectorAll('.time-filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + range).classList.add('active');
            document.getElementById('top-list').innerHTML = ''; 
            document.getElementById('tracker-loader').classList.remove('hidden');
            fetchTrackerData();
        }

        function formatRelativeTime(dateString) {
            const diffMins = Math.floor((new Date() - new Date(dateString)) / 60000);
            const diffHours = Math.floor(diffMins / 60);
            if (diffMins < 1) return "Now";
            if (diffMins < 60) return `${diffMins}m`;
            if (diffHours < 24) return `${diffHours}h`;
            return new Date(dateString).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
        }

        function renderTrackerUI() {
            document.getElementById('tracker-loader').classList.add('hidden');
            const animClass = forceAnimate ? 'bounce-up' : '';
            if (currentTrackerTab === 'recent') {
                const cont = document.getElementById('recent-list');
                let html = '';
                if (trackerData.nowPlaying && trackerData.nowPlaying.isPlaying) {
                    html += `<a href="${trackerData.nowPlaying.url}" target="_blank" class="glass-card p-3.5 flex items-center gap-4 border border-green-500/50 hover:border-green-500 transition ${animClass}"><img src="${trackerData.nowPlaying.albumArt}" class="w-12 h-12 rounded-md object-cover flex-shrink-0"><div class="flex-1 min-w-0"><h3 class="font-bold text-sm text-green-400 truncate">${trackerData.nowPlaying.title}</h3><p class="text-[10px] text-zinc-400 truncate">${trackerData.nowPlaying.artist}</p></div><div class="waveform mr-2 flex-shrink-0"><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div><div class="waveform-bar"></div></div></a>`;
                }
                trackerData.recent.forEach((t, i) => {
                    if (trackerData.nowPlaying && trackerData.nowPlaying.title === t.title) return;
                    html += `<a href="${t.url}" target="_blank" class="glass-card p-3.5 flex items-center gap-4 hover:border-zinc-500 transition ${animClass}" style="animation-delay: ${(i+1)*0.05}s"><img src="${t.albumArt}" class="w-12 h-12 rounded-md object-cover flex-shrink-0"><div class="flex-1 min-w-0"><h3 class="font-bold text-sm text-zinc-200 truncate">${t.title}</h3><p class="text-[10px] text-zinc-500 truncate">${t.artist}</p></div><span class="text-[9px] text-zinc-500 uppercase font-bold flex-shrink-0 mr-2">${formatRelativeTime(t.playedAt)}</span></a>`;
                });
                cont.innerHTML = html;
            } else {
                const cont = document.getElementById('top-list');
                let html = '';
                trackerData.top.forEach((t, i) => {
                    html += `<a href="${t.url}" target="_blank" class="glass-card p-3 relative group hover:border-green-500 transition block ${animClass}" style="animation-delay: ${i*0.05}s"><div class="absolute -top-2 -left-2 bg-zinc-800 text-white w-6 h-6 flex items-center justify-center rounded-full text-[10px] font-bold shadow-lg z-10 border border-zinc-700">#${i+1}</div><div class="overflow-hidden rounded-xl mb-2 aspect-square"><img src="${t.albumArt}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500"></div><h3 class="text-xs font-bold text-zinc-200 truncate mb-0.5">${t.title}</h3><p class="text-[9px] text-zinc-500 truncate">${t.artist}</p></a>`;
                });
                cont.innerHTML = html;
            }
            if (forceAnimate) setTimeout(() => forceAnimate = false, 1000);
        }

        async function generateShareImage() {
            const btn = document.getElementById('share-btn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>'; btn.disabled = true;
            const shareItemsCont = document.getElementById('share-items');
            const shareSubtitle = document.getElementById('share-subtitle');
            shareItemsCont.innerHTML = '';
            let items = [];
            if (currentTrackerTab === 'recent') {
                shareSubtitle.innerText = "Recently Played";
                if(trackerData.nowPlaying && trackerData.nowPlaying.isPlaying) items.push(trackerData.nowPlaying);
                items = [...items, ...trackerData.recent].slice(0, 5);
            } else {
                const labels = { short_term: "Last Month", medium_term: "Last 6 Months", long_term: "All Time" };
                shareSubtitle.innerText = "Top Tracks " + labels[currentTimeRange];
                items = trackerData.top.slice(0, 5);
            }
            items.forEach((item, idx) => {
                shareItemsCont.innerHTML += `<div class="flex items-center gap-4 bg-[#161616] p-3.5 rounded-xl border border-zinc-800/50"><img src="${item.albumArt}" class="w-12 h-12 rounded-lg flex-shrink-0" crossOrigin="anonymous"><div class="flex-1 min-w-0"><div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-bottom: 2px;"><span class="font-bold text-[13px] text-white">${item.title}</span></div><div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"><span class="text-zinc-500 text-[10px] font-medium">${item.artist}</span></div></div><div class="ml-2 text-zinc-800 font-black text-xl italic">#${idx+1}</div></div>`;
            });
            setTimeout(() => {
                html2canvas(document.querySelector("#share-template"), { backgroundColor: "#0f0f0f", useCORS: true, scale: 3, logging: false }).then(canvas => {
                    document.getElementById('share-preview').src = canvas.toDataURL("image/png");
                    document.getElementById('download-link').href = canvas.toDataURL("image/png");
                    btn.innerHTML = '<i class="fas fa-share-nodes"></i> Share These Stats'; btn.disabled = false;
                    const modal = document.getElementById('share-modal');
                    modal.classList.remove('hidden'); modal.classList.add('flex');
                    setTimeout(() => { modal.classList.remove('opacity-0'); modal.classList.add('opacity-100'); }, 10);
                });
            }, 600);
        }

        function closeModal() {
            const modal = document.getElementById('share-modal');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        window.onload = () => { checkAuth(); };
    </script>
</body>
</html>
