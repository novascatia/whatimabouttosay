<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencari Lirik Lagu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        input {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #hasil-lirik {
            margin-top: 30px;
            text-align: left;
            white-space: pre-wrap; /* Menjaga format baris lirik */
            line-height: 1.6;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 5px;
            border: 1px solid #eee;
            display: none; /* Disembunyikan sebelum ada hasil */
            max-height: 500px;
            overflow-y: auto;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pencari Lirik Lagu 🎶</h1>
        <p>Masukkan nama artis dan judul lagu untuk mencari lirik.</p>
        
        <input type="text" id="input-artis" placeholder="Nama Artis (contoh: Coldplay)" required>
        <input type="text" id="input-lagu" placeholder="Judul Lagu (contoh: Yellow)" required>
        
        <button onclick="cariLirik()">Cari Lirik</button>

        <div id="status" class="loading"></div>
        <div id="hasil-lirik"></div>
    </div>

    <script>
        async function cariLirik() {
            const artis = document.getElementById('input-artis').value.trim();
            const lagu = document.getElementById('input-lagu').value.trim();
            const hasilDiv = document.getElementById('hasil-lirik');
            const statusDiv = document.getElementById('status');

            // Cek apakah input kosong
            if (!artis || !lagu) {
                alert("Tolong isi nama artis dan judul lagunya ya!");
                return;
            }

            // Tampilan loading
            statusDiv.textContent = "Mencari lirik... Tunggu sebentar ya.";
            hasilDiv.style.display = 'none';
            hasilDiv.textContent = "";

            try {
                // Mengambil data dari public API
                const response = await fetch(`https://api.lyrics.ovh/v1/${artis}/${lagu}`);
                const data = await response.json();

                if (data.lyrics) {
                    statusDiv.textContent = "";
                    hasilDiv.style.display = 'block';
                    // Menghapus teks "Paroles de la chanson" yang kadang muncul dari API ini
                    let lirikBersih = data.lyrics.replace(/Paroles de la chanson .+\r?\n/i, "");
                    hasilDiv.textContent = lirikBersih;
                } else {
                    statusDiv.textContent = "Yah, lirik lagunya nggak ketemu. Coba cek ejaan nama artis dan judul lagunya.";
                }
            } catch (error) {
                statusDiv.textContent = "Terjadi kesalahan saat mencari lirik. Mungkin server API sedang sibuk atau koneksi internet terputus.";
                console.error(error);
            }
        }
    </script>

</body>
</html>
