<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencari Lirik</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px;}
        button { background: #3498db; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;}
        button:hover { background: #2980b9; }
        #hasil { margin-top: 20px; text-align: left; white-space: pre-wrap; display: none; background: #f9f9f9; padding: 15px; border-radius: 5px; max-height: 400px; overflow-y: auto; line-height: 1.6; border: 1px solid #eee;}
        .info { color: #666; font-size: 14px; margin-top: 15px; font-style: italic; }
        .judul-lagu { font-weight: bold; font-size: 18px; margin-bottom: 15px; color: #2c3e50; text-align: center; border-bottom: 2px dashed #ccc; padding-bottom: 10px;}
    </style>
</head>
<body>

<div class="box">
    <h2>Pencari Lirik 🎵</h2>
    <input type="text" id="input-pencarian" placeholder="Ketik lagunya (misal: Yellow Coldplay)" onkeydown="if(event.key === 'Enter') cariLirik()">
    <button onclick="cariLirik()">Cari</button>
    
    <div id="status" class="info"></div>
    <div id="hasil"></div>
</div>

<script>
    async function cariLirik() {
        const input = document.getElementById('input-pencarian').value.trim();
        const hasilDiv = document.getElementById('hasil');
        const statusDiv = document.getElementById('status');

        if (!input) {
            alert("Ketik lagunya dulu ya!");
            return;
        }

        statusDiv.textContent = "Mencari lagu...";
        hasilDiv.style.display = 'none';
        hasilDiv.innerHTML = "";

        try {
            // Tahap 1: Cari tebakan artis & judul dari kata kunci
            const resSearch = await fetch(`https://api.lyrics.ovh/suggest/${input}`);
            const dataSearch = await resSearch.json();

            // Kalau lagu tidak ditemukan di database
            if (dataSearch.data.length === 0) {
                statusDiv.textContent = "Yah, lagunya nggak ketemu. Coba tambahkan nama artisnya.";
                return;
            }

            // Ambil hasil pencarian teratas (paling relevan)
            const artis = dataSearch.data[0].artist.name;
            const judul = dataSearch.data[0].title;
            
            statusDiv.textContent = `Ketemu! Mengambil lirik: ${judul} - ${artis}...`;

            // Tahap 2: Ambil liriknya berdasarkan tebakan tadi
            const resLyrics = await fetch(`https://api.lyrics.ovh/v1/${artis}/${judul}`);
            const dataLyrics = await resLyrics.json();

            if (dataLyrics.lyrics) {
                statusDiv.textContent = "";
                hasilDiv.style.display = 'block';
                
                // Bersihkan teks iklan yang kadang nyangkut dari API
                let lirikBersih = dataLyrics.lyrics.replace(/Paroles de la chanson .+\r?\n/i, "");
                
                // Tampilkan judul + artis di bagian atas lirik
                hasilDiv.innerHTML = `<div class="judul-lagu">${judul}<br><small style="font-weight:normal; font-size:14px;">oleh ${artis}</small></div>${lirikBersih}`;
            } else {
                statusDiv.textContent = `Lagu "${judul} - ${artis}" ada, tapi liriknya belum tersedia di database.`;
            }

        } catch (error) {
            statusDiv.textContent = "Terjadi kesalahan. Mungkin server sedang sibuk, coba klik Cari lagi.";
        }
    }
</script>

</body>
</html>
