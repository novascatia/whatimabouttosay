<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnichord Smooth Sequencer</title>
    <style>
        :root { 
            --bg: #0a0a0c; --panel: #16161a; --accent: #00ffcc; 
            --next: #ff9f43; --danger: #ff4757; --glass: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { background: var(--panel); padding: 30px; border-radius: 32px; width: 95%; max-width: 600px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        textarea { width: 100%; background: rgba(0,0,0,0.3); color: var(--accent); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; font-size: 1.1em; resize: none; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .playlist-visual { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5px; margin-bottom: 20px; min-height: 45px; scrollbar-width: none; }
        .chord-tag { padding: 8px 18px; background: var(--glass); border-radius: 12px; font-size: 0.9em; white-space: nowrap; cursor: pointer; transition: 0.2s; color: #aaa; border: 1px solid transparent; }
        .chord-tag.playing { background: var(--next); color: #000; font-weight: bold; border-color: rgba(255,255,255,0.3); }
        .controls { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; }
        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; padding: 15px; font-size: 0.8em; text-transform: uppercase; }
        .btn-start { background: var(--accent); color: #000; }
        .btn-start.stop { background: var(--danger); color: #fff; }
        .btn-nav { background: var(--glass); color: #fff; }
        .chord-indicator { font-size: 4em; font-weight: 900; text-align: center; margin: 30px 0; min-height: 1.2em; color: white; }
        .plate { height: 100px; background: #000; border-radius: 20px; margin-top: 25px; display: flex; align-items: center; justify-content: center; color: #222; font-weight: 900; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span style="color: var(--accent); font-weight: 900; letter-spacing: 1px;">SMOOTH OMNI V9.2</span>
            <input type="range" id="vol" min="0" max="1" step="0.1" value="0.5">
        </div>

        <textarea id="chord-input" rows="3">C G Am F Cmaj7 G/B</textarea>
        <div id="visual-list" class="playlist-visual"></div>
        <div class="chord-indicator" id="current-display">---</div>

        <div class="controls">
            <button id="btn-play" class="btn btn-start" onclick="togglePlay()">Start</button>
            <button class="btn btn-nav" onclick="prevChord()">Back</button>
            <button class="btn btn-nav" onclick="nextChord()">Next</button>
            <button class="btn btn-nav" onclick="resetToBegin()">Reset</button>
        </div>

        <div class="plate" id="plate">STRUM PLATE</div>
    </div>

    <script>
        const audiocontext = new (window.AudioContext || window.webkitAudioContext)();
        const masternode = audiocontext.createGain();
        masternode.connect(audiocontext.destination);
        masternode.gain.value = 0.5;

        let activeoscs = [];
        let chordlist = [];
        let currentindex = -1;
        let isplaying = false;

        const basefreqs = { 
            'C': 261.63, 'C#': 277.18, 'Db': 277.18, 'D': 293.66, 'D#': 311.13, 'Eb': 311.13,
            'E': 329.63, 'F': 349.23, 'F#': 369.99, 'Gb': 369.99, 'G': 392.00, 'G#': 415.30,
            'Ab': 415.30, 'A': 220.00, 'A#': 233.08, 'Bb': 233.08, 'B': 246.94 
        };

        const chordintervals = {
            maj: [0, 4, 7], m: [0, 3, 7], '7': [0, 4, 7, 10], maj7: [0, 4, 7, 11],
            m7: [0, 3, 7, 10], '6': [0, 4, 7, 9], m6: [0, 3, 7, 9], '9': [0, 4, 7, 10, 14],
            aug: [0, 4, 8], dim: [0, 3, 6], sus4: [0, 5, 7], sus2: [0, 2, 7]
        };

        const input = document.getElementById('chord-input');

        input.addEventListener('input', () => {
            if(!isplaying) {
                chordlist = input.value.split(/[\s,]+/).filter(x => x.length > 0);
                updatevisual();
            }
        });

        function parsechord(raw) {
            if (!raw) return null;
            let parts = raw.split('/');
            let rootpart = parts[0];
            let bass = parts[1] || null;
            let rootmatch = rootpart.match(/^[A-G][#b]?/);
            if (!rootmatch) return null;
            let root = rootmatch[0];
            let variant = rootpart.slice(root.length) || 'maj';
            if (variant === 'min') variant = 'm';
            return { root, variant, bass, label: raw };
        }

        function updatevisual() {
            const visual = document.getElementById('visual-list');
            visual.innerHTML = '';
            chordlist.forEach((c, i) => {
                const span = document.createElement('span');
                span.className = 'chord-tag' + (i === currentindex ? ' playing' : '');
                span.innerText = c;
                span.onclick = () => { if(isplaying) { currentindex = i; playindex(); } };
                visual.appendChild(span);
            });
        }

        function togglePlay() {
            if (audiocontext.state === 'suspended') audiocontext.resume();
            const btn = document.getElementById('btn-play');
            if (!isplaying) {
                chordlist = input.value.split(/[\s,]+/).filter(x => x.length > 0);
                if (chordlist.length === 0) return;
                isplaying = true;
                input.disabled = true;
                btn.innerText = "Stop"; btn.classList.add('stop');
                currentindex = 0; playindex();
            } else {
                stopaudio();
                isplaying = false; input.disabled = false;
                btn.innerText = "Start"; btn.classList.remove('stop');
                document.getElementById('current-display').innerText = "---";
                currentindex = -1; updatevisual();
            }
        }

        function nextChord() { if (isplaying) { currentindex = (currentindex + 1) % chordlist.length; playindex(); } }
        function prevChord() { if (isplaying) { currentindex = (currentindex - 1 + chordlist.length) % chordlist.length; playindex(); } }
        function resetToBegin() { if (isplaying) { currentindex = 0; playindex(); } }

        function playindex() {
            let data = parsechord(chordlist[currentindex]);
            if (data) {
                document.getElementById('current-display').innerText = data.label;
                playaudio(data);
                updatevisual();
            }
        }

        function stopaudio() {
            activeoscs.forEach(o => { try { o.stop(); } catch(e) {} });
            activeoscs = [];
        }

        function playaudio(data) {
            stopaudio();
            let base = basefreqs[data.root];
            
            // LOGIKA SMOOTH VOICING:
            // Jika nada dasar di atas 350Hz (Nada F ke atas), turunkan 1 oktaf
            // agar selalu berkumpul di area tengah (200Hz - 350Hz)
            if (base > 350) base = base / 2;

            const ints = chordintervals[data.variant] || chordintervals.maj;
            ints.forEach(i => createosc(base * Math.pow(2, i/12), 0.2, 'triangle'));
            
            if (data.bass && basefreqs[data.bass]) {
                let bassf = basefreqs[data.bass];
                while(bassf > 200) bassf /= 2; // Pastikan bass selalu rendah
                createosc(bassf, 0.4, 'triangle');
            }
        }

        function createosc(f, v, t) {
            const o = audiocontext.createOscillator();
            const g = audiocontext.createGain();
            o.type = t;
            o.frequency.setValueAtTime(f, audiocontext.currentTime);
            g.gain.setValueAtTime(v, audiocontext.currentTime);
            o.connect(g); g.connect(masternode);
            o.start(); activeoscs.push(o);
        }

        document.getElementById('vol').oninput = (e) => masternode.gain.value = e.target.value;

        let lastx = 0;
        document.getElementById('plate').onmousemove = (e) => {
            if (currentindex === -1) return;
            if (Math.abs(e.offsetX - lastx) > 30) {
                let note = document.getElementById('current-display').innerText;
                let data = parsechord(note);
                if(!data) return;
                let base = basefreqs[data.root];
                if (base > 350) base /= 2;
                const ints = chordintervals[data.variant] || [0];
                const f = (base * 2) * Math.pow(2, ints[Math.floor(Math.random() * ints.length)]/12);
                const o = audiocontext.createOscillator();
                const g = audiocontext.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(f, audiocontext.currentTime);
                g.gain.setValueAtTime(0.2, audiocontext.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audiocontext.currentTime + 0.4);
                o.connect(g); g.connect(masternode);
                o.start(); o.stop(audiocontext.currentTime + 0.4);
                lastx = e.offsetX;
            }
        };

        chordlist = input.value.split(/[\s,]+/).filter(x => x.length > 0);
        updatevisual();
    </script>
</body>
</html>
