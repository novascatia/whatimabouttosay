<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Instance YouTube Player</title>
<style>
    body {
        margin: 0;
        background: #0f172a;
        background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .glass-nav {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .glass-nav h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 1px;
    }
    button {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 500;
    }
    button:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    #grid-container {
        flex: 1;
        display: grid;
        gap: 15px;
        padding: 15px;
        box-sizing: border-box;
        overflow-y: auto;
        transition: all 0.3s ease;
    }
    .player-instance {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }
    .player-header {
        display: flex;
        padding: 10px;
        gap: 10px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .url-input {
        flex: 1;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        outline: none;
        transition: border 0.2s;
    }
    .url-input:focus {
        border-color: rgba(255, 255, 255, 0.5);
    }
    .close-btn {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.4);
        color: #fca5a5;
    }
    .close-btn:hover {
        background: rgba(239, 68, 68, 0.4);
    }
    .media-container {
        display: flex;
        flex: 1;
        height: 100%;
        min-height: 300px;
    }
    .video-wrapper {
        flex: 1;
        height: 100%;
    }
    .chat-wrapper {
        width: 320px;
        min-width: 200px;
        max-width: 60%;
        resize: horizontal;
        overflow: hidden;
        display: none;
        direction: rtl;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        background: #0f172a;
    }
    .chat-wrapper iframe {
        direction: ltr;
        width: 100%;
        height: 100%;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<div class="glass-nav">
    <h1>YT Multi-View</h1>
    <button id="add-instance-btn">+ Add Player</button>
</div>

<div id="grid-container"></div>

<script>
    const gridContainer = document.getElementById('grid-container');
    const addBtn = document.getElementById('add-instance-btn');

    function updateGridLayout() {
        const count = gridContainer.children.length;
        if (count === 0) {
            gridContainer.style.gridTemplateColumns = '1fr';
        } else if (count === 1) {
            gridContainer.style.gridTemplateColumns = '1fr';
        } else if (count === 2) {
            gridContainer.style.gridTemplateColumns = '1fr 1fr';
        } else if (count === 3 || count === 4) {
            gridContainer.style.gridTemplateColumns = '1fr 1fr';
            gridContainer.style.gridTemplateRows = '1fr 1fr';
        } else {
            gridContainer.style.gridTemplateColumns = 'repeat(auto-fit, minmax(450px, 1fr))';
        }
    }

    function extractYTId(url) {
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/);
        return match ? match[1] : url.trim();
    }

    function createInstance() {
        const instance = document.createElement('div');
        instance.className = 'player-instance';

        const header = document.createElement('div');
        header.className = 'player-header';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'url-input';
        input.placeholder = 'Paste YT Link or Video ID...';

        const loadBtn = document.createElement('button');
        loadBtn.textContent = 'Load';

        const chatToggleBtn = document.createElement('button');
        chatToggleBtn.textContent = 'Chat';

        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.textContent = 'X';

        header.appendChild(input);
        header.appendChild(loadBtn);
        header.appendChild(chatToggleBtn);
        header.appendChild(closeBtn);

        const media = document.createElement('div');
        media.className = 'media-container';

        const vidWrapper = document.createElement('div');
        vidWrapper.className = 'video-wrapper';

        const chatWrapper = document.createElement('div');
        chatWrapper.className = 'chat-wrapper';

        const vidFrame = document.createElement('iframe');
        vidFrame.allowFullscreen = true;

        const chatFrame = document.createElement('iframe');

        vidWrapper.appendChild(vidFrame);
        chatWrapper.appendChild(chatFrame);
        media.appendChild(vidWrapper);
        media.appendChild(chatWrapper);
        instance.appendChild(header);
        instance.appendChild(media);
        gridContainer.appendChild(instance);

        updateGridLayout();

        loadBtn.addEventListener('click', () => {
            const vidId = extractYTId(input.value);
            if (vidId) {
                vidFrame.src = `https://www.youtube.com/embed/${vidId}?autoplay=1`;
                const domain = window.location.hostname || 'localhost';
                chatFrame.src = `https://www.youtube.com/live_chat?v=${vidId}&embed_domain=${domain}`;
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadBtn.click();
        });

        chatToggleBtn.addEventListener('click', () => {
            if (chatWrapper.style.display === 'block') {
                chatWrapper.style.display = 'none';
            } else {
                chatWrapper.style.display = 'block';
            }
        });

        closeBtn.addEventListener('click', () => {
            instance.remove();
            updateGridLayout();
        });
    }

    addBtn.addEventListener('click', createInstance);
    createInstance();
</script>
</body>
</html>
