<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Instance YouTube Player</title>
<style>
    body {
        margin: 0;
        background: #0f172a;
        background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .glass-nav {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    .glass-nav h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 1px;
    }
    button {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-weight: 500;
    }
    button:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    #grid-container {
        flex: 1;
        display: grid;
        gap: 15px;
        padding: 15px;
        box-sizing: border-box;
        overflow-y: auto;
        transition: all 0.3s ease;
    }
    .player-instance {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        cursor: grab;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .player-instance:active {
        cursor: grabbing;
    }
    .player-instance.dragging {
        opacity: 0.5;
        transform: scale(0.98);
    }
    .player-instance.drag-over {
        border: 2px dashed rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.05);
    }
    .player-header {
        display: flex;
        padding: 10px;
        gap: 10px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        cursor: move;
    }
    .input-wrapper {
        position: relative;
        flex: 1;
        display: flex;
    }
    .url-input {
        flex: 1;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        outline: none;
        transition: border 0.2s;
    }
    .url-input:focus {
        border-color: rgba(255, 255, 255, 0.5);
    }
    .search-results {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        margin-top: 8px;
        max-height: 350px;
        overflow-y: auto;
        display: none;
        z-index: 20;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .search-results::-webkit-scrollbar {
        width: 8px;
    }
    .search-results::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.2);
    }
    .search-results::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.2);
        border-radius: 4px;
    }
    .result-item {
        display: flex;
        padding: 12px;
        gap: 12px;
        cursor: pointer;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: background 0.2s;
    }
    .result-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .result-thumb {
        width: 120px;
        height: 68px;
        object-fit: cover;
        border-radius: 6px;
        background: rgba(0,0,0,0.5);
    }
    .result-info {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        flex: 1;
    }
    .result-title {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 6px;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .result-author {
        font-size: 0.8rem;
        color: #94a3b8;
    }
    .loading-text {
        padding: 15px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.9rem;
    }
    .close-btn {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.4);
        color: #fca5a5;
    }
    .close-btn:hover {
        background: rgba(239, 68, 68, 0.4);
    }
    .media-container {
        display: flex;
        flex: 1;
        height: 100%;
        min-height: 300px;
    }
    .video-wrapper {
        flex: 1;
        height: 100%;
        pointer-events: auto;
    }
    .chat-wrapper {
        width: 320px;
        min-width: 200px;
        max-width: 60%;
        resize: horizontal;
        overflow: hidden;
        display: none;
        direction: rtl;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        background: #0f172a;
        position: relative;
    }
    .chat-wrapper iframe {
        direction: ltr;
        width: 100%;
        height: 100%;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<div class="glass-nav">
    <h1>YT Multi-View</h1>
    <button id="add-instance-btn">+ Add Player</button>
</div>

<div id="grid-container"></div>

<script>
    const gridContainer = document.getElementById('grid-container');
    const addBtn = document.getElementById('add-instance-btn');
    let draggedInstance = null;

    function updateGridLayout() {
        const count = gridContainer.children.length;
        if (count === 0) {
            gridContainer.style.gridTemplateColumns = '1fr';
        } else if (count === 1) {
            gridContainer.style.gridTemplateColumns = '1fr';
        } else if (count === 2) {
            gridContainer.style.gridTemplateColumns = '1fr 1fr';
        } else if (count === 3 || count === 4) {
            gridContainer.style.gridTemplateColumns = '1fr 1fr';
            gridContainer.style.gridTemplateRows = '1fr 1fr';
        } else {
            gridContainer.style.gridTemplateColumns = 'repeat(auto-fit, minmax(450px, 1fr))';
        }
    }

    function extractYTId(url) {
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|live\/))([^?&/]{11})/);
        if (match) return match[1];
        if (url.trim().length === 11 && !url.includes(' ')) return url.trim();
        return null;
    }

    function loadVideo(vidId, vidFrame, chatFrame) {
        vidFrame.src = `https://www.youtube.com/embed/${vidId}?autoplay=1`;
        let domain = window.location.hostname;
        if (!domain) domain = 'localhost';
        chatFrame.src = `https://www.youtube.com/live_chat?v=${vidId}&embed_domain=${domain}&dark_theme=1`;
    }

    async function searchYouTube(query, resultsContainer, input, vidFrame, chatFrame) {
        resultsContainer.innerHTML = '<div class="loading-text">Searching...</div>';
        resultsContainer.style.display = 'block';

        try {
            const res = await fetch(`https://vid.puffyan.us/api/v1/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            resultsContainer.innerHTML = '';
            const videos = data.filter(item => item.type === 'video').slice(0, 10);
            
            if (videos.length === 0) {
                resultsContainer.innerHTML = '<div class="loading-text">No results found.</div>';
                return;
            }

            videos.forEach(video => {
                const item = document.createElement('div');
                item.className = 'result-item';
                
                const thumbUrl = video.videoThumbnails.find(t => t.quality === 'medium')?.url || video.videoThumbnails[0]?.url || '';
                
                item.innerHTML = `
                    <img src="${thumbUrl}" class="result-thumb" loading="lazy">
                    <div class="result-info">
                        <div class="result-title">${video.title}</div>
                        <div class="result-author">${video.author}</div>
                    </div>
                `;
                
                item.addEventListener('click', () => {
                    input.value = `https://youtube.com/watch?v=${video.videoId}`;
                    resultsContainer.style.display = 'none';
                    loadVideo(video.videoId, vidFrame, chatFrame);
                });
                
                resultsContainer.appendChild(item);
            });
        } catch (e) {
            resultsContainer.innerHTML = '<div class="loading-text">Search failed. Try a direct link.</div>';
        }
    }

    function createInstance() {
        const instance = document.createElement('div');
        instance.className = 'player-instance';
        instance.draggable = true;

        const header = document.createElement('div');
        header.className = 'player-header';

        const inputWrapper = document.createElement('div');
        inputWrapper.className = 'input-wrapper';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'url-input';
        input.placeholder = 'Search video, or paste link/ID...';

        const searchResults = document.createElement('div');
        searchResults.className = 'search-results';

        inputWrapper.appendChild(input);
        inputWrapper.appendChild(searchResults);

        const loadBtn = document.createElement('button');
        loadBtn.textContent = 'Load / Search';

        const chatToggleBtn = document.createElement('button');
        chatToggleBtn.textContent = 'Chat';

        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.textContent = 'X';

        header.appendChild(inputWrapper);
        header.appendChild(loadBtn);
        header.appendChild(chatToggleBtn);
        header.appendChild(closeBtn);

        const media = document.createElement('div');
        media.className = 'media-container';

        const vidWrapper = document.createElement('div');
        vidWrapper.className = 'video-wrapper';

        const chatWrapper = document.createElement('div');
        chatWrapper.className = 'chat-wrapper';

        const vidFrame = document.createElement('iframe');
        vidFrame.allowFullscreen = true;
        vidFrame.allow = "autoplay; encrypted-media; picture-in-picture";

        const chatFrame = document.createElement('iframe');
        chatFrame.allow = "autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share";

        vidWrapper.appendChild(vidFrame);
        chatWrapper.appendChild(chatFrame);
        media.appendChild(vidWrapper);
        media.appendChild(chatWrapper);
        instance.appendChild(header);
        instance.appendChild(media);
        gridContainer.appendChild(instance);

        updateGridLayout();

        instance.addEventListener('dragstart', (e) => {
            draggedInstance = instance;
            setTimeout(() => instance.classList.add('dragging'), 0);
        });

        instance.addEventListener('dragend', () => {
            instance.classList.remove('dragging');
            draggedInstance = null;
            document.querySelectorAll('.player-instance').forEach(el => el.classList.remove('drag-over'));
        });

        instance.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (draggedInstance === instance) return;
            instance.classList.add('drag-over');
        });

        instance.addEventListener('dragleave', () => {
            instance.classList.remove('drag-over');
        });

        instance.addEventListener('drop', (e) => {
            e.preventDefault();
            instance.classList.remove('drag-over');
            if (draggedInstance && draggedInstance !== instance) {
                const allInstances = [...gridContainer.querySelectorAll('.player-instance')];
                const draggedIndex = allInstances.indexOf(draggedInstance);
                const targetIndex = allInstances.indexOf(instance);
                
                if (draggedIndex < targetIndex) {
                    instance.after(draggedInstance);
                } else {
                    instance.before(draggedInstance);
                }
            }
        });

        const processInput = () => {
            const val = input.value;
            if (!val.trim()) return;
            
            const vidId = extractYTId(val);
            if (vidId) {
                searchResults.style.display = 'none';
                loadVideo(vidId, vidFrame, chatFrame);
            } else {
                searchYouTube(val, searchResults, input, vidFrame, chatFrame);
            }
        };

        loadBtn.addEventListener('click', processInput);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processInput();
        });

        document.addEventListener('click', (e) => {
            if (!inputWrapper.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });

        chatToggleBtn.addEventListener('click', () => {
            chatWrapper.style.display = chatWrapper.style.display === 'block' ? 'none' : 'block';
        });

        closeBtn.addEventListener('click', () => {
            instance.remove();
            updateGridLayout();
        });
    }

    addBtn.addEventListener('click', createInstance);
    createInstance();
</script>
</body>
</html>
