<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream - Nova</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f0f0f; color: #e5e5e5; }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 24px; overflow: hidden; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-6xl mx-auto">

    <nav class="mb-12">
        <a href="/" class="text-sm font-bold text-zinc-500 hover:text-white transition uppercase tracking-widest flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Back
        </a>
    </nav>

    <header class="mb-8">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2 text-white italic">Live Stream</h1>
        <p class="text-zinc-500 text-lg">Sports Hub</p>
    </header>

    <main>
        <div class="glass-card shadow-2xl">
            <div class="bg-zinc-800/50 p-4 border-b border-zinc-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-zinc-300">Live Broadcast</span>
                </div>
                <span class="text-[10px] text-zinc-500 font-mono">Powered by Sportsrc</span>
            </div>
            
            <div class="video-container">
                <iframe 
                    src="https://sportsrc.org/" 
                    allowfullscreen="true" 
                    scrolling="no" 
                    allow="autoplay; encrypted-media">
                </iframe>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass-card p-6">
                <h3 class="text-white font-bold mb-2 flex items-center">
                    <i class="fas fa-info-circle mr-2 text-cyan-500"></i> Tips Nonton
                </h3>
                <p class="text-sm text-zinc-400 leading-relaxed">
                    Jika player tidak muncul atau error, pastikan ad-blocker Anda dimatikan atau gunakan browser yang mendukung pemutaran HLS.
                </p>
            </div>
            <div class="glass-card p-6">
                <h3 class="text-white font-bold mb-2 flex items-center">
                    <i class="fas fa-shield-alt mr-2 text-green-500"></i> Status Server
                </h3>
                <div class="flex items-center gap-2 text-sm text-zinc-400">
                    <span class="px-2 py-1 bg-green-500/10 text-green-500 rounded text-xs font-bold">ONLINE</span>
                    <span>Stable connection</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 mb-10 text-center">
        <p class="text-zinc-600 text-[10px] uppercase tracking-widest font-bold">© 2026 Novascatia Entertainment</p>
    </footer>

</body>
</html>
