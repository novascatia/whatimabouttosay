<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League Live - Nova</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f0f0f; color: #e5e5e5; }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 20px; transition: all 0.3s ease; }
        .match-card:hover { border-color: #06b6d4; background: #222; transform: translateY(-2px); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .active-stream { border: 2px solid #06b6d4 !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #2d2d2d; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-6xl mx-auto">

    <nav class="mb-12">
        <a href="/" class="text-sm font-bold text-zinc-500 hover:text-white transition uppercase tracking-widest flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Back to Archive
        </a>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <header class="mb-6">
                <h1 id="streamTitle" class="text-3xl font-extrabold tracking-tight text-white italic text-cyan-500">PL Hub</h1>
                <p id="streamStatus" class="text-zinc-500 text-sm italic">Status: Monitoring Kick-off...</p>
            </header>

            <div class="glass-card p-2 shadow-2xl">
                <div id="playerWrapper" class="video-container">
                    <div class="absolute inset-0 flex flex-col items-center justify-center text-zinc-600">
                        <i class="fas fa-satellite-dish text-6xl mb-4 animate-pulse"></i>
                        <p class="font-bold tracking-widest uppercase text-[10px]">Signal Ready</p>
                    </div>
                </div>
            </div>

            <div class="mt-6 glass-card p-6">
                <h3 class="text-white font-bold mb-2 flex items-center text-sm uppercase tracking-wider">
                    <i class="fas fa-terminal mr-2 text-cyan-500 text-[10px]"></i> Log Output
                </h3>
                <p class="text-[10px] text-zinc-400 leading-relaxed font-mono">
                    > API Connect: sportsrc.org/api<br>
                    > Filter: Match Title / Category Match<br>
                    > Status: <span id="logStatus" class="text-yellow-500">Scanning...</span>
                </p>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-500">Available Feed</h2>
                <button onclick="loadMatches()" class="text-zinc-500 hover:text-white transition text-xs">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>

            <div id="matchList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                <p class="text-zinc-600 italic text-[10px]">Loading matches...</p>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = "https://api.sportsrc.org/";

        function formatMatchTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        }

        async function loadMatches() {
            const container = document.getElementById('matchList');
            const logStatus = document.getElementById('logStatus');
            logStatus.textContent = "Syncing Data...";

            try {
                const response = await fetch(`${API_BASE}?data=matches&category=football`);
                const result = await response.json();
                const allMatches = result.data || [];

                // LOGIKA FIX: Karena API kadang tidak merespon filter 'league=PL', 
                // Kita filter secara manual berdasarkan Title atau ID pertandingan.
                // Jika ingin melihat semua, hapus filter ini.
                const matches = allMatches; 

                if (matches.length > 0) {
                    logStatus.textContent = "Connected";
                    logStatus.className = "text-green-500";
                    container.innerHTML = matches.map(match => {
                        const timeStr = formatMatchTime(match.date);
                        // Cek apakah match sedang berlangsung (berdasarkan jam sekarang)
                        const isNow = new Date().getTime() >= match.date;

                        return `
                        <div onclick="playMatch('${match.id}', '${match.title}')" 
                             id="card-${match.id}"
                             class="match-card glass-card p-4 cursor-pointer">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-[9px] text-cyan-500 font-bold uppercase tracking-wider">Football Feed</span>
                                <span class="text-[9px] ${isNow ? 'text-red-500 font-bold' : 'text-zinc-600'} font-mono italic">
                                    ${isNow ? '● LIVE' : timeStr}
                                </span>
                            </div>
                            <h3 class="text-sm font-bold text-zinc-300 transition italic truncate">${match.title}</h3>
                        </div>
                    `}).join('');
                } else {
                    logStatus.textContent = "No Feed";
                    container.innerHTML = `<p class="text-zinc-600 text-[10px] italic text-center p-4">No signal found.</p>`;
                }
            } catch (e) {
                logStatus.textContent = "Error";
                logStatus.className = "text-red-500";
            }
        }

        async function playMatch(id, title) {
            const playerWrapper = document.getElementById('playerWrapper');
            const streamTitle = document.getElementById('streamTitle');
            const streamStatus = document.getElementById('streamStatus');

            document.querySelectorAll('.match-card').forEach(c => c.classList.remove('active-stream'));
            document.getElementById(`card-${id}`)?.classList.add('active-stream');

            streamTitle.textContent = "Requesting Stream...";
            playerWrapper.innerHTML = `<div class="absolute inset-0 flex items-center justify-center"><i class="fas fa-spinner fa-spin text-3xl text-cyan-500"></i></div>`;

            try {
                const response = await fetch(`${API_BASE}?data=detail&category=football&id=${id}`);
                const result = await response.json();
                const detail = result.data || result;

                if (detail && detail.embed_url) {
                    streamTitle.textContent = title;
                    streamStatus.textContent = `Broadcast: Active`;
                    playerWrapper.innerHTML = `
                        <iframe 
                            src="${detail.embed_url}" 
                            allowfullscreen="true" 
                            scrolling="no" 
                            allow="autoplay; encrypted-media">
                        </iframe>`;
                } else {
                    throw new Error();
                }
            } catch (e) {
                streamTitle.textContent = "Feed Down";
                streamStatus.textContent = "Link belum dirilis oleh provider (tunggu beberapa menit).";
                playerWrapper.innerHTML = `
                    <div class="absolute inset-0 flex flex-col items-center justify-center text-zinc-800">
                        <i class="fas fa-clock text-4xl mb-2"></i>
                        <p class="text-[10px] font-bold uppercase tracking-widest italic">Signal Unavailable</p>
                    </div>`;
            }
        }

        window.onload = loadMatches;
    </script>
</body>
</html>
