<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveSport – Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090e;
  --card: #111520;
  --border: #1c2233;
  --accent: #d4f53c;
  --red: #ff3b3b;
  --text: #dde0eb;
  --muted: #4a5268;
  --sidebar: 360px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: rgba(7,9,14,0.97); backdrop-filter: blur(16px); flex-shrink: 0; z-index: 50;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:3px; color:var(--accent); }
.logo span { color: var(--text); }
.live-badge { display:flex; align-items:center; gap:6px; font-size:10px; font-weight:600; letter-spacing:2px; color:var(--red); text-transform:uppercase; }
.live-dot { width:6px; height:6px; background:var(--red); border-radius:50%; animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.cat-bar { display:flex; align-items:center; gap:8px; padding:9px 16px; border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
.cat-bar::-webkit-scrollbar { display:none; }
.cat-btn { padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; transition:all .15s; flex-shrink:0; }
.cat-btn:hover { border-color:var(--accent); color:var(--accent); }
.cat-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }

.main { display:grid; grid-template-columns:1fr var(--sidebar); flex:1; overflow:hidden; }

/* PLAYER */
.player-side { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--border); }
.tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.tab { flex:1; padding:11px; text-align:center; font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.stream-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:40px; text-align:center; }
.play-ring { width:72px; height:72px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--muted); }
.placeholder h3 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--muted); }
.placeholder p { font-size:12px; color:var(--muted); opacity:.6; max-width:200px; line-height:1.7; }

#playerBox { display:none; flex-direction:column; }
.video-wrap { position:relative; width:100%; padding-bottom:56.25%; background:#000; flex-shrink:0; }
.video-wrap > * { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }

.match-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-bottom:1px solid var(--border); gap:12px; flex-wrap:wrap; }
.match-bar-teams { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.mbt { display:flex; align-items:center; gap:7px; }
.mbt img { width:24px; height:24px; object-fit:contain; }
.mbt-name { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:1px; }
.vs-sep { font-size:11px; color:var(--muted); font-weight:600; }
.match-bar-meta { font-size:11px; color:var(--muted); }

.stream-switcher { display:none; gap:8px; padding:10px 14px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
.stream-btn { padding:5px 13px; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:5px; cursor:pointer; font-size:11px; font-family:'DM Sans',sans-serif; transition:all .15s; }
.stream-btn:hover, .stream-btn.active { border-color:var(--accent); color:var(--accent); }

.standings-wrap { flex:1; overflow-y:auto; padding:16px; }
.standings-title { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; color:var(--muted); margin-bottom:10px; }
.standings-table { width:100%; border-collapse:collapse; font-size:12px; }
.standings-table th { padding:6px 7px; color:var(--muted); font-weight:500; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid var(--border); text-align:left; }
.standings-table td { padding:7px; border-bottom:1px solid rgba(28,34,51,.5); }
.standings-table tr:hover td { background:var(--card); }

/* SIDEBAR */
.sidebar { display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:11px 14px 9px; font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; color:var(--muted); border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.match-count { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; color:var(--muted); letter-spacing:0; }
.search-wrap { padding:10px 12px; border-bottom:1px solid var(--border); flex-shrink:0; position:relative; }
.search-icon { position:absolute; left:21px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:12px; pointer-events:none; }
.search-input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 10px 7px 30px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; outline:none; transition:border-color .15s; }
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--muted); }

.match-list { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.match-item { display:flex; align-items:center; gap:9px; padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; position:relative; }
.match-item:hover { background:var(--card); }
.match-item.selected { background:var(--card); }
.match-item.selected::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); }
.match-time { font-size:10px; font-weight:600; color:var(--muted); min-width:42px; text-align:center; letter-spacing:.5px; flex-shrink:0; }
.match-time.live { color:var(--red); }
.match-teams-col { flex:1; min-width:0; }
.team-row { display:flex; align-items:center; gap:6px; }
.team-row + .team-row { margin-top:5px; }
.team-badge { width:15px; height:15px; object-fit:contain; flex-shrink:0; }
.team-badge-ph { width:15px; height:15px; background:var(--border); border-radius:2px; flex-shrink:0; display:inline-block; }
.team-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.play-btn { color:var(--muted); font-size:12px; flex-shrink:0; transition:color .12s; }
.match-item:hover .play-btn { color:var(--accent); }

.loader { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px; gap:14px; color:var(--muted); }
.spinner { width:26px; height:26px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { font-size:10px; letter-spacing:2px; text-transform:uppercase; }
.error-box { margin:14px; padding:12px 14px; background:rgba(255,59,59,.07); border:1px solid rgba(255,59,59,.2); border-radius:8px; font-size:12px; color:#ff7070; line-height:1.7; }
.empty { padding:32px 16px; text-align:center; color:var(--muted); font-size:12px; line-height:1.7; }

@media (max-width:768px) {
  html,body { overflow:auto; }
  .main { grid-template-columns:1fr; overflow:visible; }
  .player-side { border-right:none; border-bottom:1px solid var(--border); overflow:visible; }
  .stream-area { overflow:visible; }
  .sidebar { height:65vh; }
}
</style>
</head>
<body>

<header>
  <div class="logo">LIVE<span>SPORT</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE STREAMING</div>
</header>

<div class="cat-bar" id="catBar">
  <button class="cat-btn active" data-cat="football">Football</button>
</div>

<div class="main">

  <!-- PLAYER SIDE -->
  <div class="player-side">
    <div class="tabs">
      <div class="tab active" data-tab="stream">▶ Stream</div>
      <div class="tab" data-tab="standings">📊 Klasemen</div>
    </div>

    <div class="stream-area" id="tabStream">
      <div class="placeholder" id="placeholder">
        <div class="play-ring">▶</div>
        <h3>Pilih Pertandingan</h3>
        <p>Klik pertandingan di panel kanan untuk menonton livestream</p>
      </div>
      <div id="playerBox">
        <div class="video-wrap"><div id="embedArea"></div></div>
        <div class="match-bar">
          <div class="match-bar-teams" id="matchBarTeams"></div>
          <div class="match-bar-meta" id="matchBarMeta"></div>
        </div>
        <div class="stream-switcher" id="streamSwitcher"></div>
      </div>
    </div>

    <div class="standings-wrap" id="tabStandings" style="display:none">
      <div id="standingsContent"><div class="empty">Memuat klasemen...</div></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>JADWAL</span>
      <span class="match-count" id="matchCount"></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Cari tim...">
    </div>
    <div class="match-list" id="matchList">
      <div class="loader"><div class="spinner"></div><div class="loader-text">Memuat...</div></div>
    </div>
  </div>

</div>

<script>
const API = '/.netlify/functions/sportsrc-proxy';
let currentCategory = 'football';
let allMatches = [];

// TABS
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const w = tab.dataset.tab;
    document.getElementById('tabStream').style.display = w === 'stream' ? 'flex' : 'none';
    document.getElementById('tabStandings').style.display = w === 'standings' ? 'block' : 'none';
    if (w === 'standings') loadStandings();
  });
});

// SEARCH
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  renderList(q ? allMatches.filter(m => (getHome(m)+' '+getAway(m)).toLowerCase().includes(q)) : allMatches);
});

// FETCH
async function apiFetch(params) {
  try {
    const res = await fetch(API + '?' + new URLSearchParams(params));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(e) { return { error: e.message }; }
}

// HELPERS
function getHome(m) { return m.teams?.home?.name || m.title?.split(' vs ')[0] || '?'; }
function getAway(m) { return m.teams?.away?.name || (m.title?.split(' vs ')[1]) || '?'; }
function formatTime(ms) {
  return new Date(ms).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jakarta' }) + ' WIB';
}
function badgeImg(url, alt, size) {
  const s = size || 15;
  if (url) return `<img class="team-badge" src="${url}" alt="${alt}" style="width:${s}px;height:${s}px" onerror="this.outerHTML='<span class=team-badge-ph style=width:${s}px;height:${s}px></span>'">`;
  return `<span class="team-badge-ph" style="width:${s}px;height:${s}px"></span>`;
}

// CATEGORIES
async function loadCategories() {
  const res = await apiFetch({ data: 'sports' });
  const cats = res?.data || [];
  if (!cats.length) return;
  const bar = document.getElementById('catBar');
  bar.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.id === currentCategory ? ' active' : '');
    btn.dataset.cat = cat.id;
    btn.textContent = cat.name;
    btn.addEventListener('click', () => {
      currentCategory = cat.id;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat.id));
      document.getElementById('searchInput').value = '';
      loadMatches(cat.id);
      resetPlayer();
    });
    bar.appendChild(btn);
  });
}

// MATCHES
async function loadMatches(cat) {
  document.getElementById('matchList').innerHTML = '<div class="loader"><div class="spinner"></div><div class="loader-text">Memuat...</div></div>';
  const res = await apiFetch({ data: 'matches', category: cat });
  if (res.error || !res.success) {
    document.getElementById('matchList').innerHTML = '<div class="error-box">Gagal: ' + (res.error||'') + '</div>';
    return;
  }
  allMatches = res.data || [];
  document.getElementById('matchCount').textContent = allMatches.length + ' match';
  renderList(allMatches);
}

function renderList(matches) {
  const list = document.getElementById('matchList');
  if (!matches.length) { list.innerHTML = '<div class="empty">Tidak ada pertandingan.</div>'; return; }
  list.innerHTML = '';
  matches.forEach(m => {
    const el = document.createElement('div');
    el.className = 'match-item';
    const home = getHome(m), away = getAway(m);
    const isLive = m.live === true;
    const timeStr = isLive ? 'LIVE' : (m.date ? formatTime(m.date) : 'TBD');
    el.innerHTML =
      `<div class="match-time${isLive?' live':''}">${timeStr}</div>` +
      `<div class="match-teams-col">` +
        `<div class="team-row">${badgeImg(m.teams?.home?.badge,home)}<span class="team-name">${home}</span></div>` +
        `<div class="team-row">${badgeImg(m.teams?.away?.badge,away)}<span class="team-name">${away}</span></div>` +
      `</div><div class="play-btn">▶</div>`;
    el.addEventListener('click', () => {
      document.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
      loadStream(m.category || currentCategory, m.id, m);
    });
    list.appendChild(el);
  });
}

// PLAYER
function resetPlayer() {
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('playerBox').style.display = 'none';
}

// STREAM
async function loadStream(cat, id, m) {
  // show player box
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('playerBox').style.display = 'flex';

  // switch to stream tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="stream"]').classList.add('active');
  document.getElementById('tabStream').style.display = 'flex';
  document.getElementById('tabStandings').style.display = 'none';

  // match bar
  const home = getHome(m), away = getAway(m);
  document.getElementById('matchBarTeams').innerHTML =
    `<div class="mbt">${badgeImg(m.teams?.home?.badge,home,24)}<span class="mbt-name">${home}</span></div>` +
    `<span class="vs-sep">VS</span>` +
    `<div class="mbt"><span class="mbt-name">${away}</span>${badgeImg(m.teams?.away?.badge,away,24)}</div>`;
  document.getElementById('matchBarMeta').textContent = m.live ? '🔴 LIVE' : (m.date ? formatTime(m.date) : '');

  // loading
  const ea = document.getElementById('embedArea');
  ea.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div>';
  const sw = document.getElementById('streamSwitcher');
  sw.style.display = 'none'; sw.innerHTML = '';

  const res = await apiFetch({ data: 'detail', category: cat, id });
  if (res.error || !res.success) {
    ea.innerHTML = `<div class="error-box" style="position:absolute;inset:0;margin:20px">Gagal: ${res.error||''}</div>`;
    return;
  }

  const detail = res.data || {};

  // DEBUG: tampilkan raw JSON isi detail
  ea.innerHTML = `<div style="position:absolute;inset:0;overflow:auto;padding:14px;background:#07090e">
    <div style="color:#d4f53c;font-family:monospace;font-size:11px;font-weight:700;margin-bottom:8px">RAW DETAIL RESPONSE:</div>
    <pre style="color:#bbb;font-size:10px;white-space:pre-wrap;word-break:break-all">${JSON.stringify(res, null, 2)}</pre>
  </div>`;
  return;

  const sources = detail.sources || detail.streams || detail.links || [];

  function applyEmbed(code) {
    if (!code) return false;
    const c = code.trim();
    if (c.startsWith('<')) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%';
      wrap.innerHTML = c;
      wrap.querySelectorAll('iframe').forEach(f => {
        f.style.cssText = 'width:100%;height:100%;border:none';
        f.removeAttribute('width'); f.removeAttribute('height');
      });
      ea.innerHTML = '';
      ea.appendChild(wrap);
    } else if (c.startsWith('http') || c.startsWith('//')) {
      ea.innerHTML = `<iframe src="${c}" allowfullscreen allow="autoplay;encrypted-media;picture-in-picture"></iframe>`;
    } else { return false; }
    return true;
  }

  if (sources.length > 0) {
    const ok = applyEmbed(sources[0].embed || sources[0].url || '');
    if (!ok) ea.innerHTML = `<div class="error-box" style="position:absolute;inset:0;margin:20px">Stream belum aktif.<br><small style="opacity:.6">Fields: ${Object.keys(detail).join(', ')}</small></div>`;

    if (sources.length > 1) {
      sw.style.display = 'flex';
      sources.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'stream-btn' + (i===0?' active':'');
        btn.textContent = s.name || ('Stream '+(i+1));
        btn.addEventListener('click', () => {
          sw.querySelectorAll('.stream-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          if (!applyEmbed(s.embed||s.url||''))
            ea.innerHTML='<div class="error-box" style="position:absolute;inset:0;margin:20px">Tidak tersedia.</div>';
        });
        sw.appendChild(btn);
      });
    }
  } else {
    const direct = detail.embed || detail.stream || detail.iframe || detail.url || '';
    if (!applyEmbed(direct))
      ea.innerHTML = `<div class="error-box" style="position:absolute;inset:0;margin:20px">Stream belum tersedia.<br><small style="opacity:.6">Fields: ${Object.keys(detail).join(', ')}</small></div>`;
  }
}

// STANDINGS
async function loadStandings() {
  const panel = document.getElementById('standingsContent');
  panel.innerHTML = '<div class="loader"><div class="spinner"></div><div class="loader-text">Memuat...</div></div>';
  const lr = await apiFetch({ data: 'results', category: 'leagues' });
  const lid = lr?.data?.[0]?.id || 'PL';
  const res = await apiFetch({ data: 'results', category: 'tables', league: lid });
  if (res.error||!res.success) { panel.innerHTML='<div class="error-box">Gagal.</div>'; return; }
  const rows = res.data||[];
  if (!rows.length) { panel.innerHTML='<div class="empty">Tidak tersedia.</div>'; return; }
  panel.innerHTML = `<div class="standings-title">KLASEMEN – ${lid.toUpperCase()}</div>
    <table class="standings-table">
      <thead><tr><th>#</th><th>Tim</th><th>M</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr></thead>
      <tbody>${rows.map((r,i)=>`<tr>
        <td style="color:var(--muted)">${r.position||r.pos||i+1}</td>
        <td>${r.team||r.name||'–'}</td><td>${r.played||r.p||'–'}</td>
        <td>${r.won||r.w||'–'}</td><td>${r.drawn||r.d||'–'}</td>
        <td>${r.lost||r.l||'–'}</td>
        <td style="font-weight:700;color:var(--accent)">${r.points||r.pts||'–'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

// INIT
loadCategories();
loadMatches(currentCategory);
</script>
</body>
</html>
