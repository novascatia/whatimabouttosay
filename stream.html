<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveSport – Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1117;
    --card: #131720;
    --border: #1e2535;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #e8eaf0;
    --muted: #5a6278;
    --live: #ff3b3b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(8,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--live);
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--live);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* LAYOUT */
  .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

  /* CATEGORIES */
  .categories-bar {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .categories-bar::-webkit-scrollbar { display: none; }

  .cats-inner {
    display: flex;
    gap: 10px;
    padding: 0 24px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .cat-btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.18s;
    text-transform: capitalize;
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* MAIN */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: calc(100vh - 130px);
  }

  /* MATCHES LIST */
  .matches-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 130px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .panel-header {
    padding: 20px 24px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }

  .match-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .match-item:hover { background: var(--card); }
  .match-item.selected { background: var(--card); }
  .match-item.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .match-time {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    min-width: 48px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .match-time.live-text { color: var(--live); font-weight: 700; }

  .match-teams {
    flex: 1;
    min-width: 0;
  }

  .team-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .team-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .team-score {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    min-width: 14px;
    text-align: right;
  }

  .match-league {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .stream-icon {
    color: var(--muted);
    font-size: 16px;
    transition: color 0.15s;
  }

  .match-item:hover .stream-icon { color: var(--accent); }

  /* PLAYER PANEL */
  .player-panel {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: calc(100vh - 130px);
  }

  .player-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 48px 24px;
    text-align: center;
  }

  .play-big {
    width: 72px; height: 72px;
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--muted);
  }

  .placeholder-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .placeholder-sub {
    font-size: 13px;
    color: var(--muted);
    opacity: 0.6;
    max-width: 200px;
    line-height: 1.6;
  }

  /* STREAM EMBED */
  .stream-container {
    display: none;
    flex-direction: column;
  }

  .stream-container.active { display: flex; }

  .stream-info {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .stream-match-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    line-height: 1.2;
  }

  .stream-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stream-frame-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
  }

  .stream-frame-wrap iframe,
  .stream-frame-wrap #stream-embed {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  #stream-embed-html {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* LOADING */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 16px;
    color: var(--muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ERROR */
  .error-box {
    margin: 20px;
    padding: 16px;
    background: rgba(255,71,87,0.08);
    border: 1px solid rgba(255,71,87,0.2);
    border-radius: 8px;
    font-size: 13px;
    color: #ff6b7a;
    line-height: 1.6;
  }

  /* LEAGUES/STANDINGS */
  .standings-panel {
    padding: 20px;
  }

  .standings-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    margin-bottom: 14px;
    color: var(--muted);
  }

  .standings-table {
    width: 100%;
    font-size: 12px;
    border-collapse: collapse;
  }

  .standings-table th {
    text-align: left;
    padding: 6px 8px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .standings-table td {
    padding: 8px;
    border-bottom: 1px solid rgba(30,37,53,0.5);
  }

  .standings-table tr:hover td { background: var(--card); }

  .pos-num { color: var(--muted); font-weight: 500; }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .main-grid {
      grid-template-columns: 1fr;
    }
    .player-panel {
      max-height: none;
      order: -1;
    }
    .matches-panel {
      max-height: 60vh;
    }
    header { padding: 14px 16px; }
    .cats-inner { padding: 0 16px; }
  }

  /* EMPTY */
  .empty {
    padding: 40px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <div class="logo">LIVE<span>SPORT</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE STREAMING</div>
</header>

<!-- CATEGORIES -->
<div class="categories-bar">
  <div class="cats-inner" id="catBar">
    <button class="cat-btn active" data-cat="football">⚽ Football</button>
  </div>
</div>

<div class="container" style="padding:0; max-width:100%;">
  <div class="main-grid">

    <!-- MATCHES -->
    <div class="matches-panel">
      <div class="panel-header">JADWAL PERTANDINGAN</div>
      <div id="matchList">
        <div class="loader"><div class="spinner"></div><div class="loader-text">Memuat...</div></div>
      </div>
    </div>

    <!-- PLAYER + STANDINGS -->
    <div class="player-panel">
      <div class="tabs">
        <div class="tab active" data-tab="stream">▶ Stream</div>
        <div class="tab" data-tab="standings">📊 Klasemen</div>
      </div>

      <!-- STREAM TAB -->
      <div id="tabStream">
        <div id="playerPlaceholder" class="player-placeholder">
          <div class="play-big">▶</div>
          <div class="placeholder-title">Pilih Pertandingan</div>
          <div class="placeholder-sub">Klik pertandingan di sebelah kiri untuk menonton livestream</div>
        </div>

        <div id="streamContainer" class="stream-container">
          <div class="stream-info">
            <div class="stream-match-name" id="streamMatchName">–</div>
            <div class="stream-meta" id="streamMatchMeta">–</div>
          </div>
          <div class="stream-frame-wrap">
            <div id="stream-embed-html"></div>
          </div>
        </div>
      </div>

      <!-- STANDINGS TAB -->
      <div id="tabStandings" style="display:none;">
        <div class="standings-panel">
          <div id="standingsContent">
            <div class="empty">Pilih kategori untuk melihat klasemen.</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = '/.netlify/functions/sportsrc-proxy';
let currentCategory = 'football';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const which = tab.dataset.tab;
    document.getElementById('tabStream').style.display = which === 'stream' ? '' : 'none';
    document.getElementById('tabStandings').style.display = which === 'standings' ? '' : 'none';
    if (which === 'standings') loadStandings(currentCategory);
  });
});

async function apiFetch(params) {
  const url = API + '?' + new URLSearchParams(params);
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

async function loadCategories() {
  const res = await apiFetch({ data: 'sports' });
  const bar = document.getElementById('catBar');
  const cats = (res && res.data) ? res.data : [];
  if (!cats.length) return;
  bar.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.id === currentCategory ? ' active' : '');
    btn.dataset.cat = cat.id;
    btn.textContent = cat.name;
    btn.addEventListener('click', () => selectCategory(cat.id));
    bar.appendChild(btn);
  });
}

function selectCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  loadMatches(cat);
  document.getElementById('playerPlaceholder').style.display = 'flex';
  document.getElementById('streamContainer').classList.remove('active');
}

async function loadMatches(cat) {
  const list = document.getElementById('matchList');
  list.innerHTML = '<div class="loader"><div class="spinner"></div><div class="loader-text">Memuat Jadwal...</div></div>';
  const res = await apiFetch({ data: 'matches', category: cat });
  if (res.error || !res.success) {
    list.innerHTML = '<div class="error-box">Gagal memuat jadwal: ' + (res.error || '') + '</div>';
    return;
  }
  const matches = res.data || [];
  if (!matches.length) { list.innerHTML = '<div class="empty">Tidak ada pertandingan.</div>'; return; }
  list.innerHTML = '';
  matches.forEach(m => renderMatchItem(m, list));
}

function renderMatchItem(m, container) {
  const el = document.createElement('div');
  el.className = 'match-item';
  const id = m.id || '';
  const home = (m.teams && m.teams.home) ? m.teams.home.name : (m.title || '–').split(' vs ')[0];
  const away = (m.teams && m.teams.away) ? m.teams.away.name : ((m.title || '–').split(' vs ')[1] || '–');
  const homeBadge = (m.teams && m.teams.home && m.teams.home.badge) ? m.teams.home.badge : '';
  const awayBadge = (m.teams && m.teams.away && m.teams.away.badge) ? m.teams.away.badge : '';
  const isLive = m.live === true;
  const timeStr = isLive ? 'LIVE' : (m.date ? formatTime(m.date) : 'TBD');
  const badge = (url, alt) => url
    ? '<img src="' + url + '" alt="' + alt + '" onerror="this.style.display=\'none\'" style="width:20px;height:20px;object-fit:contain;border-radius:3px;flex-shrink:0">'
    : '<span style="width:20px;height:20px;background:var(--border);border-radius:3px;display:inline-block;flex-shrink:0"></span>';

  el.innerHTML =
    '<div class="match-time ' + (isLive ? 'live-text' : '') + '">' + timeStr + '</div>' +
    '<div class="match-teams">' +
      '<div class="team-row">' + badge(homeBadge,home) + '<span class="team-name" style="margin-left:8px">' + home + '</span></div>' +
      '<div class="team-row" style="margin-top:6px">' + badge(awayBadge,away) + '<span class="team-name" style="margin-left:8px">' + away + '</span></div>' +
    '</div>' +
    '<div class="stream-icon">▶</div>';

  el.addEventListener('click', () => {
    document.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    loadStream(m.category || currentCategory, id, home + ' vs ' + away, timeStr);
  });
  container.appendChild(el);
}

function formatTime(ms) {
  return new Date(ms).toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jakarta' }) + ' WIB';
}

async function loadStream(cat, id, matchName, meta) {
  document.getElementById('playerPlaceholder').style.display = 'none';
  document.getElementById('streamContainer').classList.add('active');
  document.getElementById('streamMatchName').textContent = matchName;
  document.getElementById('streamMatchMeta').textContent = meta;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('[data-tab="stream"]').classList.add('active');
  document.getElementById('tabStream').style.display = '';
  document.getElementById('tabStandings').style.display = 'none';

  const embedDiv = document.getElementById('stream-embed-html');
  embedDiv.innerHTML = '<div class="loader" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"><div class="spinner"></div></div>';

  const res = await apiFetch({ data: 'detail', category: cat, id: id });
  if (res.error || !res.success) {
    embedDiv.innerHTML = '<div class="error-box" style="margin:20px">Gagal memuat stream: ' + (res.error||'') + '</div>';
    return;
  }

  const detail = res.data || {};
  const streams = detail.streams || detail.links || [];

  function renderEmbed(code) {
    if (!code) return '<div class="error-box" style="margin:20px">Stream belum tersedia.<br><small style="opacity:0.6">Fields tersedia: ' + Object.keys(detail).join(', ') + '</small></div>';
    if (code.trim().startsWith('<')) return code;
    if (code.startsWith('http')) return '<iframe src="' + code + '" allowfullscreen allow="autoplay;encrypted-media;picture-in-picture" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none"></iframe>';
    return '<div class="error-box" style="margin:20px">Format tidak dikenali: ' + code.substring(0,100) + '</div>';
  }

  const firstEmbed = (streams[0] && streams[0].embed) ? streams[0].embed : (detail.embed || detail.stream || detail.iframe || detail.url || '');
  embedDiv.innerHTML = renderEmbed(firstEmbed);

  // Stream switcher jika ada beberapa stream
  const old = document.getElementById('streamSwitcher');
  if (old) old.remove();
  if (streams.length > 1) {
    const sw = document.createElement('div');
    sw.id = 'streamSwitcher';
    sw.style.cssText = 'padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)';
    streams.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.textContent = s.name || ('Stream ' + (i+1));
      btn.style.cssText = 'padding:6px 14px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:5px;cursor:pointer;font-size:12px';
      btn.addEventListener('click', () => { embedDiv.innerHTML = renderEmbed(s.embed); });
      sw.appendChild(btn);
    });
    document.getElementById('streamContainer').appendChild(sw);
  }
}

async function loadStandings(cat) {
  const panel = document.getElementById('standingsContent');
  panel.innerHTML = '<div class="loader"><div class="spinner"></div><div class="loader-text">Memuat klasemen...</div></div>';
  const leagueRes = await apiFetch({ data: 'results', category: 'leagues' });
  const leagues = (leagueRes && leagueRes.data) ? leagueRes.data : [];
  const leagueName = (leagues[0] && leagues[0].id) ? leagues[0].id : 'PL';
  const res = await apiFetch({ data: 'results', category: 'tables', league: leagueName });
  if (res.error || !res.success) { panel.innerHTML = '<div class="error-box">Gagal memuat klasemen.</div>'; return; }
  const rows = res.data || [];
  if (!rows.length) { panel.innerHTML = '<div class="empty">Data tidak tersedia.</div>'; return; }
  panel.innerHTML = '<div class="standings-title">KLASEMEN</div><table class="standings-table"><thead><tr><th>#</th><th>Tim</th><th>M</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr></thead><tbody>' +
    rows.map((r,i) => '<tr><td class="pos-num">'+(r.position||r.pos||i+1)+'</td><td>'+(r.team||r.name||'–')+'</td><td>'+(r.played||r.p||'–')+'</td><td>'+(r.won||r.w||'–')+'</td><td>'+(r.drawn||r.d||'–')+'</td><td>'+(r.lost||r.l||'–')+'</td><td style="font-weight:700;color:var(--accent)">'+(r.points||r.pts||'–')+'</td></tr>').join('') +
  '</tbody></table>';
}

async function init() {
  await loadCategories();
  await loadMatches(currentCategory);
}
init();
</script>
</body>
</html>
