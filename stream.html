<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Live - Nova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f0f0f; color: #e5e5e5; }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 16px; transition: 0.3s; }
        .glass-card:hover { border-color: #06b6d4; }
    </style>
</head>
<body class="p-6 max-w-5xl mx-auto">
    <header class="mb-10">
        <h1 class="text-4xl font-extrabold italic text-white">Live Sports</h1>
        <p class="text-zinc-500">Watching match comfortably.</p>
    </header>

    <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
        <button onclick="loadMatches('football')" class="px-4 py-2 bg-zinc-800 rounded-full text-sm hover:bg-cyan-600 transition">Football</button>
        <button onclick="loadMatches('basketball')" class="px-4 py-2 bg-zinc-800 rounded-full text-sm hover:bg-cyan-600 transition">Basketball</button>
        <button onclick="loadMatches('f1')" class="px-4 py-2 bg-zinc-800 rounded-full text-sm hover:bg-cyan-600 transition">F1</button>
    </div>

    <div id="matchContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <p class="text-zinc-600">Loading matches...</p>
    </div>

    <div id="streamModal" class="fixed inset-0 bg-black/90 hidden z-50 flex flex-col items-center justify-center p-4">
        <button onclick="closeStream()" class="absolute top-5 right-5 text-white text-2xl">&times; Close</button>
        <div id="videoWrapper" class="w-full max-w-4xl aspect-video bg-black rounded-lg overflow-hidden"></div>
    </div>

    <script>
        async function loadMatches(cat = 'football') {
            const container = document.getElementById('matchContainer');
            container.innerHTML = '<p>Fetching data...</p>';
            
            try {
                const res = await fetch(`/.netlify/functions/fetch-sports?type=matches&category=${cat}`);
                const data = await res.json();
                
                // Asumsi API mengembalikan array di dalam properti tertentu (sesuaikan dengan output API aslinya)
                const matches = data.matches || data; 

                container.innerHTML = matches.map(match => `
                    <div class="glass-card p-5 cursor-pointer" onclick="watchMatch('${cat}', '${match.id}')">
                        <div class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest mb-2">${match.league || 'Match'}</div>
                        <h3 class="text-lg font-bold text-white">${match.title}</h3>
                        <p class="text-sm text-zinc-500 mt-1">${match.time || ''}</p>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<p class="text-red-500">Error loading data.</p>';
            }
        }

        async function watchMatch(category, id) {
            const modal = document.getElementById('streamModal');
            const wrapper = document.getElementById('videoWrapper');
            modal.classList.remove('hidden');
            wrapper.innerHTML = '<p class="p-10 text-center">Loading stream...</p>';

            try {
                const res = await fetch(`/.netlify/functions/fetch-sports?type=detail&category=${category}&id=${id}`);
                const data = await res.json();
                
                // Embed code biasanya ada di property 'embed_code' atau 'stream_url'
                wrapper.innerHTML = data.embed_code || `<iframe src="${data.stream_url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>`;
            } catch (e) {
                wrapper.innerHTML = '<p class="p-10 text-red-500 text-center">Failed to load stream.</p>';
            }
        }

        function closeStream() {
            document.getElementById('streamModal').classList.add('hidden');
            document.getElementById('videoWrapper').innerHTML = '';
        }

        window.onload = () => loadMatches('football');
    </script>
</body>
</html>
