<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Tracker - Novascatia</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #0f0f0f; 
            color: #e5e5e5; 
            overflow-x: hidden; 
        }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 16px; transition: 0.3s; }
        
        .tab-btn { color: #52525b; transition: all 0.3s; cursor: pointer; }
        .tab-btn.active { color: #1ed760; border-bottom: 2px solid #1ed760; }
        .filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #71717a; border: 1px solid #2d2d2d; transition: all 0.2s; cursor: pointer; }
        .filter-btn.active { background: #1ed760; color: #000; border-color: #1ed760; }

        .bounce-up {
            opacity: 0;
            transform: translateY(30px);
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes bounceIn { to { opacity: 1; transform: translateY(0); } }

        .waveform { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        .waveform-bar { width: 3px; background-color: #1ed760; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .waveform-bar:nth-child(2) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 16px; } }

        /* TEMPLATE SHARE PNG */
        #share-template {
            position: absolute; left: -9999px; top: 0;
            width: 400px; padding: 40px 30px; background: #0f0f0f;
            border: 1px solid #2d2d2d; color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .bg-logo-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; opacity: 0.05; z-index: 0; pointer-events: none; filter: grayscale(1);
        }

        .share-content { position: relative; z-index: 10; }
        .hidden { display: none !important; }
        
        /* Custom scrollbar untuk Modal Pop-up */
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-2xl mx-auto mb-20">

    <header class="mb-10 text-center mt-6 relative">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-2 text-white">Rama's Account</h1>
        <p class="text-zinc-500 text-sm mb-6">Listening activity and Top tracks on Rama's account</p>
        
        <button id="share-btn" onclick="generateShareImage()" class="inline-flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white px-5 py-2.5 rounded-full text-xs font-bold transition disabled:opacity-50">
            <i class="fas fa-share-nodes"></i> SHARE
        </button>
    </header>

    <div class="flex justify-center gap-8 mb-6 border-b border-zinc-800">
        <button onclick="switchTab('recent')" id="btn-recent" class="tab-btn active pb-2 font-bold uppercase text-xs tracking-widest">Recent</button>
        <button onclick="switchTab('top')" id="btn-top" class="tab-btn pb-2 font-bold uppercase text-xs tracking-widest">Top</button>
    </div>

    <div id="top-filters" class="flex justify-center gap-3 mb-8 hidden">
        <button onclick="changeTimeRange('short_term')" id="filter-short_term" class="filter-btn active">4 Weeks</button>
        <button onclick="changeTimeRange('medium_term')" id="filter-medium_term" class="filter-btn">6 Months</button>
        <button onclick="changeTimeRange('long_term')" id="filter-long_term" class="filter-btn">All Time</button>
    </div>

    <div id="loader" class="text-center py-20">
        <i class="fas fa-circle-notch fa-spin text-3xl text-green-500"></i>
    </div>

    <div id="recent-list" class="flex flex-col gap-3"></div>
    <div id="top-list" class="grid grid-cols-2 sm:grid-cols-3 gap-4 hidden"></div>

    <div id="share-template">
        <img src="/logo.png" class="bg-logo-watermark">
        
        <div class="share-content">
            <div class="text-center mb-8">
                <p class="text-[#1ed760] text-[10px] font-black uppercase tracking-[0.3em] mb-2">Spotify Stats</p>
                <h2 class="text-2xl font-black">What Rama been listening..</h2>
                <p id="share-subtitle" class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mt-1"></p>
            </div>
            
            <div id="share-items" class="flex flex-col gap-3">
                </div>

            <div class="mt-12 pt-6 border-t border-zinc-800/50 text-center">
                <p class="text-zinc-600 text-[9px] font-bold tracking-widest uppercase">novascatia.my.id/tracker</p>
            </div>
        </div>
    </div>

    <div id="share-modal" class="fixed inset-0 bg-black/90 z-[9999] hidden flex-col items-center p-4 transition-opacity duration-300 opacity-0 backdrop-blur-md overflow-y-auto modal-scroll">
        <div id="share-modal-content" class="relative max-w-sm w-full flex flex-col items-center transform scale-95 transition-transform duration-300 my-auto py-10">
            <button onclick="closeModal()" class="absolute top-2 right-0 md:-right-6 bg-zinc-800 hover:bg-zinc-700 text-white w-10 h-10 rounded-full flex items-center justify-center transition border border-zinc-600 shadow-lg z-50">
                <i class="fas fa-times text-xl"></i>
            </button>
            
            <img id="share-preview" src="" alt="Preview" class="w-full max-w-[300px] max-h-[55vh] object-contain rounded-2xl shadow-2xl mb-6 border border-zinc-800">
            
            <a id="download-link" href="#" download="rama-listening.png" class="bg-[#1ed760] hover:bg-[#1db954] text-black font-black px-8 py-4 rounded-full flex items-center justify-center gap-3 transition transform hover:scale-105 shadow-[0_15px_30px_rgba(30,215,96,0.2)] w-full max-w-[280px] text-xs tracking-[0.15em] uppercase">
                <i class="fas fa-download text-lg"></i> Download PNG
            </a>
        </div>
    </div>

    <script>
        let currentTab = 'recent';
        let currentTimeRange = 'short_term';
        let currentData = { recent: [], top: [], nowPlaying: null };
        let forceAnimate = true;

        function formatRelativeTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return "Baru saja";
            if (diffMins < 60) return `${diffMins} menit lalu`;
            if (diffHours < 24) return `${diffHours} jam lalu`;
            if (diffDays === 1) return "Kemarin";
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
        }

        async function generateShareImage() {
            const btn = document.getElementById('share-btn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> GENERATING...';
            btn.disabled = true;

            const shareItemsCont = document.getElementById('share-items');
            const shareSubtitle = document.getElementById('share-subtitle');
            shareItemsCont.innerHTML = '';

            let items = [];
            if (currentTab === 'recent') {
                shareSubtitle.innerText = "Recently Played";
                if(currentData.nowPlaying && currentData.nowPlaying.isPlaying) items.push(currentData.nowPlaying);
                items = [...items, ...currentData.recent].slice(0, 5);
            } else {
                const labels = { short_term: "Last Month", medium_term: "Last 6 Months", long_term: "All Time" };
                shareSubtitle.innerText = "Top Tracks " + labels[currentTimeRange];
                items = currentData.top.slice(0, 5);
            }

            items.forEach((item, idx) => {
                shareItemsCont.innerHTML += `
                    <div class="flex items-center gap-4 bg-[#161616] p-3.5 rounded-xl border border-zinc-800/50">
                        <img src="${item.albumArt}" class="w-12 h-12 rounded-lg shadow-md flex-shrink-0" crossOrigin="anonymous">
                        <div class="flex-1 min-w-0">
                            <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-bottom: 3px;">
                                <span class="font-bold text-[13px] text-white" style="line-height: 1.2;">${item.title}</span>
                            </div>
                            <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-bottom: 2px;">
                                <span class="text-zinc-500 text-[10px] font-medium" style="line-height: 1.2;">${item.artist}</span>
                            </div>
                        </div>
                        <div class="ml-2 text-zinc-800 font-black text-xl italic flex-shrink-0" style="opacity: 0.8">#${idx+1}</div>
                    </div>
                `;
            });

            setTimeout(() => {
                html2canvas(document.querySelector("#share-template"), {
                    backgroundColor: "#0f0f0f",
                    useCORS: true,
                    scale: 3, 
                    logging: false
                }).then(canvas => {
                    const dataUrl = canvas.toDataURL("image/png");
                    
                    document.getElementById('share-preview').src = dataUrl;
                    document.getElementById('download-link').href = dataUrl;
                    document.getElementById('download-link').download = `rama-listening-${currentTab}.png`;

                    btn.innerHTML = '<i class="fas fa-share-nodes"></i> SHARE PNG';
                    btn.disabled = false;

                    const modal = document.getElementById('share-modal');
                    const content = document.getElementById('share-modal-content');
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    
                    void modal.offsetWidth; 
                    
                    modal.classList.remove('opacity-0');
                    modal.classList.add('opacity-100');
                    content.classList.remove('scale-95');
                    content.classList.add('scale-100');
                });
            }, 600);
        }

        function closeModal() {
            const modal = document.getElementById('share-modal');
            const content = document.getElementById('share-modal-content');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function switchTab(tab) {
            if(currentTab === tab) return;
            currentTab = tab;
            forceAnimate = true;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            if(tab === 'recent') {
                document.getElementById('recent-list').classList.remove('hidden');
                document.getElementById('top-list').classList.add('hidden');
                document.getElementById('top-filters').classList.add('hidden');
            } else {
                document.getElementById('recent-list').classList.add('hidden');
                document.getElementById('top-list').classList.remove('hidden');
                document.getElementById('top-filters').classList.remove('hidden');
            }
            renderUI();
        }

        function changeTimeRange(range) {
            if(currentTimeRange === range) return;
            currentTimeRange = range;
            forceAnimate = true;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + range).classList.add('active');
            document.getElementById('top-list').innerHTML = ''; 
            document.getElementById('loader').classList.remove('hidden');
            fetchData();
        }

        function renderUI() {
            document.getElementById('loader').classList.add('hidden');
            const animClass = forceAnimate ? 'bounce-up' : '';

            if (currentTab === 'recent') {
                const recentCont = document.getElementById('recent-list');
                let html = '';
                if (currentData.nowPlaying && currentData.nowPlaying.isPlaying) {
                    html += `
                        <div class="glass-card p-3.5 flex items-center gap-4 border border-green-500/30 hover:border-green-500 transition ${animClass}" style="animation-delay: 0s">
                            <img src="${currentData.nowPlaying.albumArt}" class="w-12 h-12 rounded-md object-cover shadow-lg">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-sm text-green-400 truncate">${currentData.nowPlaying.title}</h3>
                                <p class="text-[10px] text-zinc-400 truncate font-medium">${currentData.nowPlaying.artist}</p>
                            </div>
                            <div class="waveform mr-2 flex-shrink-0">
                                <div class="waveform-bar"></div><div class="waveform-bar"></div>
                                <div class="waveform-bar"></div><div class="waveform-bar"></div>
                            </div>
                        </div>
                    `;
                }
                currentData.recent.forEach((t, i) => {
                    if (currentData.nowPlaying && currentData.nowPlaying.title === t.title) return;
                    html += `
                        <div class="glass-card p-3.5 flex items-center gap-4 hover:border-zinc-600 transition ${animClass}" style="animation-delay: ${(i+1) * 0.05}s">
                            <img src="${t.albumArt}" class="w-12 h-12 rounded-md object-cover flex-shrink-0">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-sm text-zinc-200 truncate">${t.title}</h3>
                                <p class="text-[10px] text-zinc-500 truncate font-medium">${t.artist}</p>
                            </div>
                            <span class="text-[10px] text-zinc-500 uppercase tracking-wider font-bold flex-shrink-0 mr-2">
                                ${formatRelativeTime(t.playedAt)}
                            </span>
                        </div>
                    `;
                });
                recentCont.innerHTML = html;
            } else {
                const topCont = document.getElementById('top-list');
                let html = '';
                currentData.top.forEach((t, i) => {
                    html += `
                        <div class="glass-card p-4 relative group hover:border-green-500 transition block ${animClass}" style="animation-delay: ${i * 0.05}s">
                            <div class="absolute -top-2.5 -left-2.5 bg-zinc-800 text-white w-7 h-7 flex items-center justify-center rounded-full text-[11px] font-bold shadow-lg border border-zinc-700 group-hover:bg-green-500 group-hover:text-black transition z-10">
                                #${i + 1}
                            </div>
                            <div class="overflow-hidden rounded-xl mb-3.5 shadow-lg aspect-square">
                                <img src="${t.albumArt}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            </div>
                            <h3 class="text-[13px] font-bold text-zinc-200 truncate mb-1">${t.title}</h3>
                            <p class="text-[10px] text-zinc-500 truncate font-medium">${t.artist}</p>
                        </div>
                    `;
                });
                topCont.innerHTML = html;
            }
            if (forceAnimate) setTimeout(() => forceAnimate = false, 1000);
        }

        async function fetchData() {
            try {
                const [nowRes, trackRes] = await Promise.all([
                    fetch('/.netlify/functions/now-playing'),
                    fetch(`/.netlify/functions/tracker-data?time_range=${currentTimeRange}`)
                ]);
                if(nowRes.ok) currentData.nowPlaying = await nowRes.json();
                if(trackRes.ok) {
                    const data = await trackRes.json();
                    currentData.recent = data.recent || [];
                    currentData.top = data.topTracks || [];
                }
                renderUI();
            } catch (e) { console.error(e); }
        }

        fetchData();
        setInterval(fetchData, 15000);
    </script>
</body>
</html>
