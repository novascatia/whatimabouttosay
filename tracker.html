<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Tracker - Novascatia</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f0f0f; color: #e5e5e5; }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 20px; transition: 0.3s; }
        .tab-btn.active { color: #1ed760; border-bottom: 2px solid #1ed760; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-5xl mx-auto">
    <nav class="mb-12">
        <a href="/" class="text-sm font-bold text-zinc-500 hover:text-white transition uppercase tracking-widest flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Back
        </a>
    </nav>

    <header class="mb-10 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">Spotify Tracker</h1>
        <p class="text-zinc-500">Aktivitas musik 24 jam terakhir & favorit mingguan.</p>
    </header>

    <div class="flex justify-center gap-8 mb-10 border-b border-zinc-800">
        <button onclick="showTab('recent')" id="btn-recent" class="tab-btn active pb-2 font-bold uppercase text-xs tracking-widest">Recent</button>
        <button onclick="showTab('top')" id="btn-top" class="tab-btn pb-2 font-bold uppercase text-xs tracking-widest">Top Weekly</button>
    </div>

    <div id="loader" class="text-center py-20">
        <i class="fas fa-circle-notch fa-spin text-3xl text-green-500"></i>
    </div>

    <div id="recent-list" class="grid grid-cols-1 gap-4 hidden"></div>
    <div id="top-list" class="grid grid-cols-2 md:grid-cols-4 gap-6 hidden"></div>

    <script>
        function showTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            if(type === 'recent') {
                document.getElementById('recent-list').classList.remove('hidden');
                document.getElementById('top-list').classList.add('hidden');
            } else {
                document.getElementById('recent-list').classList.add('hidden');
                document.getElementById('top-list').classList.remove('hidden');
            }
        }

        async function init() {
            try {
                const res = await fetch('/.netlify/functions/tracker-data');
                const data = await res.json();
                
                const recentCont = document.getElementById('recent-list');
                recentCont.innerHTML = data.recent.map(t => `
                    <div class="glass-card p-4 flex items-center gap-4">
                        <img src="${t.albumArt}" class="w-12 h-12 rounded-md">
                        <div class="flex-1 overflow-hidden">
                            <h3 class="font-bold truncate">${t.title}</h3>
                            <p class="text-xs text-zinc-500">${t.artist}</p>
                        </div>
                        <span class="text-[10px] text-zinc-600 font-mono">${t.playedAt.split(',')[1]}</span>
                    </div>
                `).join('');

                const topCont = document.getElementById('top-list');
                topCont.innerHTML = data.topTracks.map(t => `
                    <div class="text-center">
                        <img src="${t.albumArt}" class="w-full aspect-square rounded-xl mb-3 shadow-lg">
                        <h3 class="text-sm font-bold truncate">${t.title}</h3>
                        <p class="text-[10px] text-zinc-500">${t.artist}</p>
                    </div>
                `).join('');

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('recent-list').classList.remove('hidden');
            } catch (e) {
                document.getElementById('loader').innerHTML = "Gagal memuat data.";
            }
        }
        init();
    </script>
</body>
</html>
