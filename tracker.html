<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Tracker - Novascatia</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        /* Menggunakan font sistem normal (Bold, No Italic) */
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #0f0f0f; 
            color: #e5e5e5; 
            overflow-x: hidden; 
        }
        .glass-card { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 16px; transition: 0.3s; }
        
        /* TABS & FILTERS */
        .tab-btn { color: #52525b; transition: all 0.3s; cursor: pointer; }
        .tab-btn.active { color: #1ed760; border-bottom: 2px solid #1ed760; }
        .filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #71717a; border: 1px solid #2d2d2d; transition: all 0.2s; cursor: pointer; }
        .filter-btn.active { background: #1ed760; color: #000; border-color: #1ed760; }

        /* ANIMASI BOUNCE NAIK */
        .bounce-up {
            opacity: 0;
            transform: translateY(30px);
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes bounceIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* WAVEFORM ANIMASI */
        .waveform { display: flex; align-items: flex-end; gap: 3px; height: 16px; }
        .waveform-bar { width: 3px; background-color: #1ed760; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
        .waveform-bar:nth-child(2) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }

        /* TEMPLATE SHARE PNG (Tersembunyi dari layar) */
        #share-template {
            position: absolute; left: -9999px; top: 0;
            width: 400px; padding: 30px; background: #0f0f0f;
            border: 1px solid #2d2d2d; color: white;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6 md:p-12 max-w-5xl mx-auto mb-20">

    <header class="mb-10 text-center mt-6 relative">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-2 text-white">Rama's Account</h1>
        <p class="text-zinc-500 text-sm mb-6">Listening activity and Top tracks on Rama's account</p>
        
        <button onclick="generateShareImage()" class="inline-flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-full text-xs font-bold transition">
            <i class="fas fa-share-nodes"></i> SHARE
        </button>
    </header>

    <div class="flex justify-center gap-8 mb-6 border-b border-zinc-800">
        <button onclick="switchTab('recent')" id="btn-recent" class="tab-btn active pb-2 font-bold uppercase text-xs tracking-widest">Recent</button>
        <button onclick="switchTab('top')" id="btn-top" class="tab-btn pb-2 font-bold uppercase text-xs tracking-widest">Top</button>
    </div>

    <div id="top-filters" class="flex justify-center gap-3 mb-8 hidden">
        <button onclick="changeTimeRange('short_term')" id="filter-short_term" class="filter-btn active">4 Weeks</button>
        <button onclick="changeTimeRange('medium_term')" id="filter-medium_term" class="filter-btn">6 Months</button>
        <button onclick="changeTimeRange('long_term')" id="filter-long_term" class="filter-btn">All Time</button>
    </div>

    <div id="loader" class="text-center py-20">
        <i class="fas fa-circle-notch fa-spin text-3xl text-green-500"></i>
    </div>

    <div id="recent-list" class="flex flex-col gap-3"></div>
    <div id="top-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 hidden"></div>

    <div id="share-template">
        <div class="text-center mb-8">
            <p class="text-green-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">Spotify Stats</p>
            <h2 class="text-2xl font-black">What Rama been listening..</h2>
            <p id="share-subtitle" class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mt-1"></p>
        </div>
        
        <div id="share-items" class="flex flex-col gap-4">
            </div>

        <div class="mt-10 pt-6 border-t border-zinc-800 text-center">
            <p class="text-zinc-600 text-[10px] font-bold tracking-widest uppercase">novascatia.my.id/tracker</p>
        </div>
    </div>

    <script>
        let currentTab = 'recent';
        let currentTimeRange = 'short_term';
        let currentData = { recent: [], top: [], nowPlaying: null };
        let forceAnimate = true;

        function formatRelativeTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return "Baru saja";
            if (diffMins < 60) return `${diffMins} menit lalu`;
            if (diffHours < 24) return `${diffHours} jam lalu`;
            if (diffDays === 1) return "Kemarin";
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
        }

        async function generateShareImage() {
            const shareItemsCont = document.getElementById('share-items');
            const shareSubtitle = document.getElementById('share-subtitle');
            shareItemsCont.innerHTML = '';

            // Tentukan Subtitle & Data
            let items = [];
            if (currentTab === 'recent') {
                shareSubtitle.innerText = "Recently Played";
                // Gabungkan now playing (jika ada) dengan recent
                if(currentData.nowPlaying && currentData.nowPlaying.isPlaying) items.push(currentData.nowPlaying);
                items = [...items, ...currentData.recent].slice(0, 5);
            } else {
                const labels = { short_term: "Last Month", medium_term: "Last 6 Months", long_term: "All Time" };
                shareSubtitle.innerText = "Top Tracks " + labels[currentTimeRange];
                items = currentData.top.slice(0, 5);
            }

            // Masukkan data ke template
            items.forEach((item, idx) => {
                shareItemsCont.innerHTML += `
                    <div class="flex items-center gap-4 bg-[#1a1a1a] p-3 rounded-xl border border-zinc-800">
                        <img src="${item.albumArt}" class="w-12 h-12 rounded-lg" crossOrigin="anonymous">
                        <div class="overflow-hidden">
                            <p class="font-black text-xs truncate">${item.title}</p>
                            <p class="text-zinc-500 text-[10px] truncate">${item.artist}</p>
                        </div>
                        <div class="ml-auto text-zinc-700 font-black text-lg">#${idx+1}</div>
                    </div>
                `;
            });

            // Tunggu gambar di-load sebentar, lalu convert
            setTimeout(() => {
                html2canvas(document.querySelector("#share-template"), {
                    backgroundColor: "#0f0f0f",
                    useCORS: true, // Penting untuk load gambar dari Spotify
                    scale: 2 // Resolusi lebih tinggi
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `rama-listening-${currentTab}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                });
            }, 500);
        }

        function switchTab(tab) {
            if(currentTab === tab) return;
            currentTab = tab;
            forceAnimate = true;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            
            if(tab === 'recent') {
                document.getElementById('recent-list').classList.remove('hidden');
                document.getElementById('top-list').classList.add('hidden');
                document.getElementById('top-filters').classList.add('hidden');
            } else {
                document.getElementById('recent-list').classList.add('hidden');
                document.getElementById('top-list').classList.remove('hidden');
                document.getElementById('top-filters').classList.remove('hidden');
            }
            renderUI();
        }

        function changeTimeRange(range) {
            if(currentTimeRange === range) return;
            currentTimeRange = range;
            forceAnimate = true;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('filter-' + range).classList.add('active');
            document.getElementById('top-list').innerHTML = ''; 
            document.getElementById('loader').classList.remove('hidden');
            fetchData();
        }

        function renderUI() {
            document.getElementById('loader').classList.add('hidden');
            const animClass = forceAnimate ? 'bounce-up' : '';

            if (currentTab === 'recent') {
                const recentCont = document.getElementById('recent-list');
                let html = '';

                if (currentData.nowPlaying && currentData.nowPlaying.isPlaying) {
                    html += `
                        <div class="glass-card p-3 flex items-center gap-4 border border-green-500/30 hover:border-green-500 transition ${animClass}" style="animation-delay: 0s">
                            <img src="${currentData.nowPlaying.albumArt}" class="w-12 h-12 rounded-md object-cover">
                            <div class="flex-1 overflow-hidden">
                                <h3 class="font-bold text-sm text-green-400 truncate">${currentData.nowPlaying.title}</h3>
                                <p class="text-[10px] text-zinc-400 truncate">${currentData.nowPlaying.artist}</p>
                            </div>
                            <div class="waveform mr-2">
                                <div class="waveform-bar"></div><div class="waveform-bar"></div>
                                <div class="waveform-bar"></div><div class="waveform-bar"></div>
                            </div>
                        </div>
                    `;
                }

                currentData.recent.forEach((t, i) => {
                    if (currentData.nowPlaying && currentData.nowPlaying.title === t.title) return;
                    html += `
                        <div class="glass-card p-3 flex items-center gap-4 hover:border-zinc-600 transition ${animClass}" style="animation-delay: ${(i+1) * 0.05}s">
                            <img src="${t.albumArt}" class="w-12 h-12 rounded-md object-cover">
                            <div class="flex-1 overflow-hidden">
                                <h3 class="font-bold text-sm text-zinc-200 truncate">${t.title}</h3>
                                <p class="text-[10px] text-zinc-500 truncate">${t.artist}</p>
                            </div>
                            <span class="text-[10px] text-zinc-500 uppercase font-bold mr-2 whitespace-nowrap">
                                ${formatRelativeTime(t.playedAt)}
                            </span>
                        </div>
                    `;
                });
                recentCont.innerHTML = html;

            } else {
                const topCont = document.getElementById('top-list');
                let html = '';
                currentData.top.forEach((t, i) => {
                    html += `
                        <div class="glass-card p-4 relative group hover:border-green-500 transition block ${animClass}" style="animation-delay: ${i * 0.05}s">
                            <div class="absolute -top-3 -left-3 bg-zinc-800 text-white w-7 h-7 flex items-center justify-center rounded-full text-xs font-bold shadow-lg border border-zinc-600 group-hover:bg-green-500 group-hover:text-black transition z-10">
                                #${i + 1}
                            </div>
                            <div class="overflow-hidden rounded-xl mb-3 aspect-square">
                                <img src="${t.albumArt}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            </div>
                            <h3 class="text-sm font-bold text-zinc-200 truncate">${t.title}</h3>
                            <p class="text-[10px] text-zinc-500 truncate">${t.artist}</p>
                        </div>
                    `;
                });
                topCont.innerHTML = html;
            }

            if (forceAnimate) setTimeout(() => forceAnimate = false, 1000);
        }

        async function fetchData() {
            try {
                const [nowRes, trackRes] = await Promise.all([
                    fetch('/.netlify/functions/now-playing'),
                    fetch(`/.netlify/functions/tracker-data?time_range=${currentTimeRange}`)
                ]);
                if(nowRes.ok) currentData.nowPlaying = await nowRes.json();
                if(trackRes.ok) {
                    const data = await trackRes.json();
                    currentData.recent = data.recent || [];
                    currentData.top = data.topTracks || [];
                }
                renderUI();
            } catch (e) { console.error(e); }
        }

        fetchData();
        setInterval(fetchData, 15000);
    </script>
</body>
</html>
