<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama is Listening - Now Playing</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --spotify-green: #1ed760;
            --secondary-color: #b0b0b0;
            --font-main: 'Poppins', sans-serif;
        }
        
        * { box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #albumArtBackground {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(80px) brightness(0.4); transform: scale(1.1);
            opacity: 0.4; transition: all 0.8s ease; z-index: 1;
        }

        .main-wrapper {
            position: relative; z-index: 10;
            display: grid; grid-template-columns: 1fr;
            gap: 2rem; width: 100%; max-width: 450px;
            padding: 2rem; transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @media (min-width: 1024px) {
            .main-wrapper.lyric-active { max-width: 1000px; grid-template-columns: 450px 1fr; }
        }

        .player-container { text-align: center; width: 100%; }
        .album-art {
            width: 100%; max-width: 350px; border-radius: 12px;
            margin-bottom: 2rem; box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            object-fit: cover;
        }

        .song-title { font-size: 2.2em; font-weight: 700; margin: 0; line-height: 1.2; }
        .artist-name { font-size: 1.1em; color: var(--secondary-color); margin: 0; }

        .lyrics-container-rel { position: relative; width: 100%; height: 450px; }
        .lyrics-window {
            height: 100%; overflow-y: auto; scroll-behavior: smooth;
            padding: 40px 20px; text-align: left;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        .lyrics-window::-webkit-scrollbar { display: none; }

        .lyric-line {
            font-size: 1.6rem; font-weight: 700; color: rgba(255,255,255,0.15);
            margin-bottom: 1.8rem; transition: all 0.4s ease;
        }
        .lyric-line.active { color: white; transform: scale(1.03); }

        #syncToSongBtn {
            position: absolute; bottom: 20px; left: 20px;
            background: var(--spotify-green); color: black;
            border: none; padding: 10px 18px; border-radius: 30px;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            z-index: 30; transition: all 0.3s;
            opacity: 0; transform: translateY(10px); pointer-events: none;
        }
        #syncToSongBtn.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .progress-bar-container { width: 100%; height: 6px; background-color: #404040; border-radius: 3px; margin-top: 2rem; }
        .progress-bar { height: 100%; background-color: var(--spotify-green); width: 0; }
        .time-display { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--secondary-color); margin-top: 0.5rem; }

        .controls i { font-size: 1.8rem; color: var(--secondary-color); cursor: pointer; margin: 0 1rem; }
        .play-btn i { font-size: 3rem; color: var(--spotify-green); }

        .social-links { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .social-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: var(--secondary-color); text-decoration: none; margin-bottom: 10px;
            font-size: 0.9rem; transition: color 0.3s;
        }
        .social-link:hover { color: var(--spotify-green); }

        #lyricToggleBtn {
            margin-top: 1.5rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 10px 24px; border-radius: 25px; font-size: 0.85rem; 
            cursor: pointer; font-weight: 600;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="albumArtBackground"></div>

    <div id="mainWrapper" class="main-wrapper">
        <div class="player-container">
            <h1 id="listeningText" style="color:var(--spotify-green); margin-bottom: 2rem;">Loading...</h1>
            <img id="albumArt" src="" class="album-art hidden">
            
            <div id="playerInfo" class="hidden">
                <h2 id="songTitle" class="song-title"></h2>
                <p id="artistName" class="artist-name"></p>
                
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>

                <div class="controls mt-6">
                    <i class="fas fa-backward"></i>
                    <span class="play-btn"><i class="fas fa-pause"></i></span>
                    <i class="fas fa-forward"></i>
                </div>

                <button id="lyricToggleBtn">Show Lyrics</button>

                <div class="social-links">
                    <a href="https://open.spotify.com/user/ramajoki" target="_blank" class="social-link">
                        <i class="fab fa-spotify"></i> Spotify Account
                    </a>
                    <a href="https://instagram.com/grayalldayog" target="_blank" class="social-link">
                        <i class="fab fa-instagram"></i> Instagram Account
                    </a>
                </div>
            </div>
        </div>

        <div id="lyricsWrapper" class="lyrics-container-rel hidden">
            <div id="lyricsContainer" class="lyrics-window">
                <div id="lyricsContent"></div>
            </div>
            <button id="syncToSongBtn">
                <i class="fas fa-arrow-down"></i> Sync to Song
            </button>
        </div>
    </div>

    <script>
        let lastTrack = "";
        let syncedLyrics = [];
        let isLyricView = false;
        let isUserScrolling = false;
        let lastActiveIdx = -1;
        let scrollTimer = null;

        const lyricsWin = document.getElementById('lyricsContainer');
        const syncBtn = document.getElementById('syncToSongBtn');

        // Fungsi ngecek apa lirik aktif ada di area pandang tengah
        function isLineInFocus(el) {
            if (!el) return false;
            const rect = el.getBoundingClientRect();
            const winRect = lyricsWin.getBoundingClientRect();
            // Cek apakah posisi lirik berada di tengah (kasih margin 150px atas bawah)
            return (rect.top >= winRect.top + 50 && rect.bottom <= winRect.bottom - 50);
        }

        // Event listener pas user scroll
        lyricsWin.addEventListener('scroll', () => {
            isUserScrolling = true;
            updateSyncButtonVisibility();
            
            // Bersihin timer lama, kalau user diem 5 detik bisa balik auto (opsional)
            // Tapi karena lo minta tombol manual, kita stay di manual mode aja.
        });

        function updateSyncButtonVisibility() {
            const activeLine = document.querySelector('.lyric-line.active');
            // Munculin tombol cuma kalau user lagi scroll manual DAN lirik aktifnya gak keliatan di fokus
            if (activeLine && isUserScrolling && !isLineInFocus(activeLine)) {
                syncBtn.classList.add('show');
            } else {
                syncBtn.classList.remove('show');
            }
        }

        syncBtn.addEventListener('click', () => {
            isUserScrolling = false;
            syncBtn.classList.remove('show');
            const activeLine = document.querySelector('.lyric-line.active');
            if (activeLine) {
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        async function fetchNowPlaying() {
            try {
                const res = await fetch('/.netlify/functions/now-playing');
                const data = await res.json();

                if (data.isPlaying) {
                    document.getElementById('listeningText').classList.add('hidden');
                    document.getElementById('playerInfo').classList.remove('hidden');
                    
                    const isDesktop = window.innerWidth >= 1024;
                    const wrapper = document.getElementById('mainWrapper');
                    const lyricsArea = document.getElementById('lyricsWrapper');
                    const album = document.getElementById('albumArt');

                    if (isLyricView) {
                        wrapper.classList.add('lyric-active');
                        lyricsArea.classList.remove('hidden');
                        album.classList.toggle('hidden', !isDesktop);
                    } else {
                        wrapper.classList.remove('lyric-active');
                        lyricsArea.classList.add('hidden');
                        album.classList.remove('hidden');
                    }

                    document.getElementById('songTitle').textContent = data.title;
                    document.getElementById('artistName').textContent = data.artist;
                    document.getElementById('albumArt').src = data.albumArt;
                    document.getElementById('albumArtBackground').style.backgroundImage = `url('${data.albumArt}')`;

                    document.getElementById('progressBar').style.width = (data.progress / data.duration) * 100 + "%";
                    document.getElementById('currentTime').textContent = formatTime(data.progress);
                    document.getElementById('totalTime').textContent = formatTime(data.duration);

                    if (lastTrack !== data.title) {
                        lastTrack = data.title;
                        loadLyrics(data.artist, data.title);
                    }
                    updateLyricHighlight(data.progress);
                } else {
                    document.getElementById('listeningText').textContent = "Rama is doing something else..";
                    document.getElementById('playerInfo').classList.add('hidden');
                    document.getElementById('mainWrapper').classList.remove('lyric-active');
                }
            } catch (e) {}
        }

        async function loadLyrics(artist, title) {
            const container = document.getElementById('lyricsContent');
            container.innerHTML = "<p class='lyric-line'>Searching lyrics...</p>";
            syncedLyrics = [];
            isUserScrolling = false;
            lastActiveIdx = -1;

            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(title)}`);
                const data = await res.json();
                if (data.syncedLyrics) parseLRC(data.syncedLyrics);
                else if (data.plainLyrics) container.innerHTML = data.plainLyrics.split('\n').map(l => `<p class="lyric-line active">${l}</p>`).join('');
                else container.innerHTML = "<p class='lyric-line'>Lyrics not found.</p>";
            } catch (e) { container.innerHTML = "<p class='lyric-line'>Lyrics unavailable.</p>"; }
        }

        function parseLRC(lrc) {
            const container = document.getElementById('lyricsContent');
            container.innerHTML = ""; syncedLyrics = [];
            lrc.split('\n').forEach(line => {
                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if (match && match[3].trim()) {
                    const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
                    const p = document.createElement('p');
                    p.className = 'lyric-line'; p.textContent = match[3].trim();
                    p.id = `line-${syncedLyrics.length}`;
                    container.appendChild(p);
                    syncedLyrics.push({ time, el: p });
                }
            });
        }

        function updateLyricHighlight(ms) {
            const seconds = ms / 1000;
            let activeIdx = -1;
            for (let i = 0; i < syncedLyrics.length; i++) {
                if (seconds >= syncedLyrics[i].time) activeIdx = i;
                else break;
            }

            if (activeIdx !== -1 && activeIdx !== lastActiveIdx) {
                lastActiveIdx = activeIdx;
                document.querySelectorAll('.lyric-line').forEach(l => l.classList.remove('active'));
                const activeLine = document.getElementById(`line-${activeIdx}`);
                if (activeLine) {
                    activeLine.classList.add('active');
                    // AUTO-SCROLL CUMA JALAN KALU USER GAK LAGI NYENTUH LAYAR
                    if (!isUserScrolling) {
                        activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
                updateSyncButtonVisibility();
            }
        }

        function formatTime(ms) {
            const s = Math.floor((ms / 1000) % 60);
            const m = Math.floor((ms / 1000 / 60) % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        document.getElementById('lyricToggleBtn').addEventListener('click', function() {
            isLyricView = !isLyricView;
            this.textContent = isLyricView ? "Show Cover" : "Show Lyrics";
            fetchNowPlaying();
        });

        setInterval(fetchNowPlaying, 1000);
        fetchNowPlaying();
    </script>
</body>
</html>
