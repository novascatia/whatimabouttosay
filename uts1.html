<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Psikologi Industri & Organisasi (PIO)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-body: #000000;
            --bg-card: #0a0a0a;
            --border: #27272a;
            --border-hover: #3f3f46;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            
            --primary: #ededed;
            --primary-text: #0a0a0a;
            --primary-hover: #d4d4d8;
            
            --correct-bg: rgba(16, 185, 129, 0.1);
            --correct-border: #10b981;
            --correct-text: #34d399;
            
            --wrong-bg: rgba(239, 68, 68, 0.1);
            --wrong-border: #ef4444;
            --wrong-text: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 680px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 10px 30px -10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .counter {
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: 500;
            background: #18181b;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .question {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 32px;
            color: var(--text-main);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 1.5;
            opacity: 0;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--border-hover);
            color: var(--text-main);
            background: #18181b;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 500;
        }

        .option-btn.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: var(--wrong-text);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-text);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .hidden {
            display: none !important;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen {
            display: flex;
            flex-direction: column;
        }

        .start-screen, .result-screen {
            text-align: center;
            align-items: center;
            padding: 32px 0;
        }

        .start-screen h1 {
            font-size: 1.75rem;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .start-screen p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .score {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: -0.05em;
            margin: 24px 0;
            color: var(--text-main);
            line-height: 1;
        }

        .score span {
            font-size: 2rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        #next-btn {
            align-self: flex-end;
            width: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        #next-btn.show {
            display: block !important;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container animate-fade-in">
        
        <div id="start-screen" class="screen start-screen">
            <h1 class="animate-slide-up" style="animation-delay: 0.1s; opacity: 0;">Psikologi Industri & Organisasi</h1>
            <p class="animate-slide-up" style="animation-delay: 0.2s; opacity: 0;">Simulasi Ujian - <span id="total-q-start"></span> Soal</p>
            <button class="btn-primary animate-slide-up" style="animation-delay: 0.3s; opacity: 0; max-width: 200px;" onclick="startQuiz()">Mulai Latihan</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <header>
                <div class="header-title">PIO Exam Prep</div>
                <div class="counter"><span id="current-q">1</span> / <span id="total-q"></span></div>
            </header>
            
            <div class="question" id="question">Question here</div>
            
            <div class="options" id="options"></div>

            <button class="btn-primary hidden" id="next-btn" onclick="nextQuestion()">Selanjutnya &rarr;</button>
        </div>

        <div id="result-screen" class="screen result-screen hidden">
            <h2 class="animate-slide-up" style="animation-delay: 0.1s; font-size: 1.25rem; font-weight: 500; color: var(--text-muted); opacity: 0;">Skor PIO Kamu</h2>
            <div class="score animate-slide-up" id="final-score" style="animation-delay: 0.2s; opacity: 0;">0<span>/0</span></div>
            <p class="animate-slide-up" id="result-message" style="animation-delay: 0.3s; color: var(--text-main); margin-bottom: 40px; font-size: 1rem; opacity: 0;"></p>
            <button class="btn-primary animate-slide-up" style="animation-delay: 0.4s; max-width: 200px; opacity: 0;" onclick="startQuiz()">Coba Lagi</button>
        </div>

    </div>

    <script>
        const database = [
            {q: "Pada sejarah awal PIO (Perang Dunia I), dikembangkan tes Army Alpha dan Army Beta. Apa perbedaan utama keduanya?", options: ["Army Alpha berbentuk tes tertulis/verbal, Army Beta berbentuk tes non-verbal untuk yang buta huruf/tidak bisa bahasa Inggris", "Army Alpha untuk rekrutmen perwira, Beta untuk prajurit biasa", "Alpha untuk tes fisik, Beta untuk tes psikologis", "Alpha digunakan di PD I, Beta digunakan di PD II"], answer: "Army Alpha berbentuk tes tertulis/verbal, Army Beta berbentuk tes non-verbal untuk yang buta huruf/tidak bisa bahasa Inggris"},
            {q: "Manakah dari situasi berikut yang merupakan contoh dari Hawthorne Effect?", options: ["Karyawan bekerja lebih giat karena tahu mereka sedang diamati oleh peneliti", "Karyawan mogok kerja karena gaji diturunkan", "Karyawan mengalami stres akibat target yang tidak realistis", "Produktivitas menurun karena suhu ruangan terlalu panas"], answer: "Karyawan bekerja lebih giat karena tahu mereka sedang diamati oleh peneliti"},
            {q: "Ruang lingkup utama dari Psikologi Industri dan Organisasi (PIO) mencakup...", options: ["Psikologi Personalia, Psikologi Organisasi, dan Human Factors (Ergonomi)", "Psikologi Klinis, Psikologi Perkembangan, dan Psikologi Sosial", "Psikodiagnostik, Psikoanalisis, dan Behaviorisme", "Psikoterapi, Konseling, dan Rehabilitasi Medik"], answer: "Psikologi Personalia, Psikologi Organisasi, dan Human Factors (Ergonomi)"},
            {q: "Berikut ini adalah objek kajian dari Psikologi Industri dan Organisasi, KECUALI...", options: ["Penanganan gangguan mental berat (skizofrenia) pada individu", "Perilaku konsumen", "Dinamika kelompok di tempat kerja", "Kepuasan kerja dan motivasi karyawan"], answer: "Penanganan gangguan mental berat (skizofrenia) pada individu"},
            {q: "Apa perbedaan utama pendekatan PIO sebagai sains (ilmu) dan profesi (praktik)?", options: ["Sains berfokus pada riset dan penemuan teori baru, sedangkan profesi berfokus pada penerapan teori tersebut untuk menyelesaikan masalah di tempat kerja", "Sains hanya dipelajari di kampus, profesi hanya dipelajari di kantor", "Sains tidak menggunakan metode kuantitatif, profesi menggunakannya", "Keduanya tidak memiliki perbedaan dan selalu berjalan terpisah"], answer: "Sains berfokus pada riset dan penemuan teori baru, sedangkan profesi berfokus pada penerapan teori tersebut untuk menyelesaikan masalah di tempat kerja"},
            {q: "Dalam PIO, perbedaan mendasar antara seleksi dan penempatan (placement) adalah...", options: ["Seleksi adalah proses memilih orang yang tepat untuk suatu jabatan, penempatan adalah mengalokasikan individu yang sudah diterima ke posisi yang paling sesuai", "Seleksi dilakukan oleh HR, penempatan dilakukan oleh psikolog", "Seleksi untuk karyawan baru, penempatan untuk karyawan lama", "Keduanya adalah istilah yang sama persis tanpa perbedaan"], answer: "Seleksi adalah proses memilih orang yang tepat untuk suatu jabatan, penempatan adalah mengalokasikan individu yang sudah diterima ke posisi yang paling sesuai"},
            {q: "Berdasarkan kode etik psikologi, prinsip utama yang harus dipegang oleh praktisi PIO saat mengelola data karyawan adalah...", options: ["Menjaga kerahasiaan data (confidentiality) dan menggunakannya hanya untuk kepentingan profesional", "Mempublikasikan hasil tes karyawan di papan pengumuman agar transparan", "Memanipulasi data agar perusahaan terlihat baik di mata investor", "Menjual database karyawan ke perusahaan pesaing"], answer: "Menjaga kerahasiaan data (confidentiality) dan menggunakannya hanya untuk kepentingan profesional"},
            {q: "Ilmu yang mempelajari desain alat kerja, mesin, dan lingkungan fisik agar nyaman dan sesuai dengan kapasitas manusia adalah...", options: ["Human Factors / Ergonomi", "Psikologi Klinis", "Patologi Sosial", "Psikometri"], answer: "Human Factors / Ergonomi"},
            {q: "Pelaksanaan program 'team building' (membangun kerjasama tim) termasuk ke dalam ranah intervensi...", options: ["Pengembangan Organisasi (Organizational Development)", "Rekrutmen Eksternal", "Perencanaan Finansial Perusahaan", "Evaluasi Kinerja Karyawan"], answer: "Pengembangan Organisasi (Organizational Development)"},
            {q: "Upaya perusahaan yang berfokus pada keseimbangan, kesehatan fisik/mental, serta produktivitas karyawan merupakan contoh dari penerapan...", options: ["Occupational Health Psychology (Psikologi Kesehatan Kerja)", "Marketing Psychology", "Consumer Behavior", "Financial Management"], answer: "Occupational Health Psychology (Psikologi Kesehatan Kerja)"},
            {q: "Apa perbedaan antara Job Description (Deskripsi Kerja) dan Job Specification (Spesifikasi Kerja)?", options: ["Jobdesc berisi daftar tugas dan tanggung jawab pekerjaan, Jobspec berisi syarat/kualifikasi (KSAO) manusia yang dibutuhkan untuk pekerjaan itu", "Jobdesc ditulis oleh pelamar, Jobspec ditulis oleh atasan", "Jobdesc untuk karyawan kontrak, Jobspec untuk karyawan tetap", "Keduanya sama-sama berisi nominal gaji yang akan diterima"], answer: "Jobdesc berisi daftar tugas dan tanggung jawab pekerjaan, Jobspec berisi syarat/kualifikasi (KSAO) manusia yang dibutuhkan untuk pekerjaan itu"},
            {q: "Apa yang kemungkinan besar akan terjadi jika HR menyusun Job Description tanpa benar-benar mengetahui tugas riil karyawan di lapangan?", options: ["Terjadi ketidaksesuaian beban kerja, kebingungan peran (role ambiguity), dan penilaian kinerja yang tidak valid", "Karyawan akan otomatis bekerja lebih rajin", "Perusahaan akan lebih hemat biaya", "Target penjualan akan langsung meningkat tajam"], answer: "Terjadi ketidaksesuaian beban kerja, kebingungan peran (role ambiguity), dan penilaian kinerja yang tidak valid"},
            {q: "Jika sebuah perusahaan ingin menentukan standar kinerja (performance standard) yang objektif, maka langkah awal yang paling krusial untuk dilakukan adalah...", options: ["Melakukan Job Analysis (Analisis Jabatan)", "Mengurangi gaji karyawan", "Mengganti semua manajer lama", "Melakukan rekrutmen massal"], answer: "Melakukan Job Analysis (Analisis Jabatan)"},
            {q: "KSAO merupakan elemen penting dalam Job Analysis. KSAO singkatan dari...", options: ["Knowledge, Skills, Abilities, and Other characteristics", "Key Standard, Assessment, and Output", "Knowledge, Strategy, Attitude, and Order", "Kinetics, Symptoms, Attributes, and Organization"], answer: "Knowledge, Skills, Abilities, and Other characteristics"},
            {q: "Manakah di bawah ini yang BUKAN merupakan kegunaan langsung dari Job Analysis?", options: ["Menentukan strategi pemasaran produk baru ke konsumen", "Menyusun Job Description dan Job Specification", "Dasar untuk rekrutmen, seleksi, dan penempatan", "Menyusun kriteria untuk penilaian kinerja"], answer: "Menentukan strategi pemasaran produk baru ke konsumen"},
            {q: "Informasi dasar apa saja yang biasanya dikumpulkan dalam proses Job Analysis?", options: ["Aktivitas kerja, alat yang digunakan, konteks pekerjaan, dan persyaratan personel (KSAO)", "Sejarah berdirinya perusahaan dan nama pendirinya", "Data keuangan pribadi milik para direksi", "Jumlah pesaing bisnis di pasar global"], answer: "Aktivitas kerja, alat yang digunakan, konteks pekerjaan, dan persyaratan personel (KSAO)"},
            {q: "Berikut ini yang merupakan contoh metode rekrutmen dari sumber internal perusahaan adalah...", options: ["Promosi, rotasi jabatan, dan referensi karyawan internal", "Memasang iklan di LinkedIn", "Mengikuti Job Fair di universitas", "Menggunakan jasa headhunter eksternal"], answer: "Promosi, rotasi jabatan, dan referensi karyawan internal"},
            {q: "Konsep 'Person-Job Fit' merujuk pada...", options: ["Tingkat kesesuaian antara karakteristik individu (KSAO) dengan karakteristik dan tuntutan dari pekerjaan tersebut", "Kesesuaian antara pakaian karyawan dengan seragam perusahaan", "Cocoknya seseorang dengan budaya seluruh perusahaan secara umum", "Kecocokan pelamar kerja dengan pewawancara secara personal"], answer: "Tingkat kesesuaian antara karakteristik individu (KSAO) dengan karakteristik dan tuntutan dari pekerjaan tersebut"},
            {q: "Tahapan mendasar dalam Perencanaan SDM (Human Resource Planning) secara berurutan biasanya meliputi...", options: ["Memperkirakan kebutuhan SDM, memperkirakan ketersediaan SDM, dan merancang program/strategi SDM", "Langsung merekrut orang, memecat orang lama, lalu memberi pelatihan", "Wawancara awal, orientasi, lalu seleksi", "Mengiklankan lowongan, negosiasi gaji, lalu Job Analysis"], answer: "Memperkirakan kebutuhan SDM, memperkirakan ketersediaan SDM, dan merancang program/strategi SDM"},
            {q: "Manakah di bawah ini yang merupakan sumber rekrutmen eksternal?", options: ["Job portal (JobStreet, LinkedIn), Job Fair, dan biro penyalur tenaga kerja", "Mutasi karyawan dari cabang lain", "Kenaikan jabatan (promosi)", "Sistem rujukan dari manajer operasional ke direktur"], answer: "Job portal (JobStreet, LinkedIn), Job Fair, dan biro penyalur tenaga kerja"},
            {q: "Secara umum, tahapan standar yang dilakukan setelah proses Rekrutmen selesai adalah...", options: ["Proses Seleksi (screening CV, tes tertulis, wawancara)", "Langsung memberikan gaji bulan pertama", "Melakukan pemecatan karyawan lama", "Memberikan program pensiun dini"], answer: "Proses Seleksi (screening CV, tes tertulis, wawancara)"},
            {q: "Tahap krusial apa yang terjadi tepat sebelum calon pekerja memulai masa Onboarding/Orientasi karyawan baru?", options: ["Offering (Penawaran kerja) dan Penandatanganan Kontrak Kerja", "Analisis Kebutuhan Pelatihan (Training Needs Analysis)", "Evaluasi Kinerja Tahunan (Performance Appraisal)", "Proses Pengunduran Diri (Resignation)"], answer: "Offering (Penawaran kerja) dan Penandatanganan Kontrak Kerja"},
            {q: "Hal utama yang dipertimbangkan HRD saat melakukan skrining awal CV pelamar adalah...", options: ["Kesesuaian pengalaman, pendidikan, dan skill pelamar dengan Job Specification (kualifikasi minimum)", "Seberapa bagus desain visual dari CV tersebut terlepas dari isinya", "Hobi pelamar di luar jam kerja", "Agama dan status pernikahan pelamar"], answer: "Kesesuaian pengalaman, pendidikan, dan skill pelamar dengan Job Specification (kualifikasi minimum)"},
            {q: "Model wawancara di mana satu orang pelamar (interviewee) diwawancarai secara bersamaan oleh beberapa pewawancara (interviewer) disebut...", options: ["Panel Interview", "Group Interview", "Unstructured Interview", "Exit Interview"], answer: "Panel Interview"},
            {q: "Jika beberapa orang pelamar/calon pekerja dikumpulkan dan diwawancarai secara bersama-sama dalam satu ruangan/waktu, ini disebut...", options: ["Group Interview", "Panel Interview", "Behavioral Event Interview", "Situational Interview"], answer: "Group Interview"},
            {q: "Perbedaan utama antara Pelatihan (Training) dan Pengembangan (Development) adalah...", options: ["Pelatihan fokus pada peningkatan skill untuk pekerjaan saat ini (jangka pendek), pengembangan fokus pada penyiapan karyawan untuk peran/tanggung jawab di masa depan (jangka panjang)", "Pelatihan hanya untuk manajer, pengembangan untuk staf", "Pelatihan dilakukan di luar kantor, pengembangan di dalam kantor", "Keduanya tidak ada bedanya sama sekali"], answer: "Pelatihan fokus pada peningkatan skill untuk pekerjaan saat ini (jangka pendek), pengembangan fokus pada penyiapan karyawan untuk peran/tanggung jawab di masa depan (jangka panjang)"},
            {q: "Langkah-langkah dalam Analisis Kebutuhan Pelatihan (Training Needs Analysis/TNA) meliputi 3 level analisis pokok, yaitu...", options: ["Analisis Organisasi, Analisis Tugas/Pekerjaan (Task), dan Analisis Individu (Person)", "Analisis Biaya, Analisis Pasar, dan Analisis Produk", "Analisis Psikologis, Analisis Fisik, dan Analisis Lingkungan", "Analisis Internal, Analisis Eksternal, dan Analisis Pesaing"], answer: "Analisis Organisasi, Analisis Tugas/Pekerjaan (Task), dan Analisis Individu (Person)"},
            {q: "Perbedaan antara On-The-Job Training (OJT) dan Off-The-Job Training adalah...", options: ["OJT dilakukan sambil bekerja langsung di tempat kerja sesungguhnya, Off-The-Job dilakukan di luar lingkungan kerja riil (misal: kelas, seminar, simulasi)", "OJT dilakukan di luar negeri, Off-The-Job di dalam negeri", "OJT selalu berbayar, Off-The-Job gratis", "OJT fokus pada teori, Off-The-Job fokus pada praktik murni"], answer: "OJT dilakukan sambil bekerja langsung di tempat kerja sesungguhnya, Off-The-Job dilakukan di luar lingkungan kerja riil (misal: kelas, seminar, simulasi)"},
            {q: "Cara yang efektif untuk memotivasi karyawan agar bersedia menghadiri dan serius dalam program pelatihan adalah...", options: ["Menjelaskan relevansi pelatihan dengan jenjang karir mereka dan memberikan insentif/sertifikasi yang berharga", "Memotong gaji jika tidak hadir tanpa memberikan alasan manfaat pelatihannya", "Mengancam akan langsung memecat jika tidak dapat nilai A", "Memaksa karyawan ikut pelatihan di hari libur mereka"], answer: "Menjelaskan relevansi pelatihan dengan jenjang karir mereka dan memberikan insentif/sertifikasi yang berharga"},
            {q: "Bergosip menyebarkan rumor buruk di kantor termasuk ke dalam kategori perilaku...", options: ["Counterproductive Work Behavior (CWB) / Perilaku Kontraproduktif", "Organizational Citizenship Behavior (OCB)", "Perilaku Asertif", "Prosocial Behavior"], answer: "Counterproductive Work Behavior (CWB) / Perilaku Kontraproduktif"},
            {q: "'Tim cabang A berhasil menjual 200 unit motor bulan ini sesuai target.' Penilaian kinerja ini merupakan contoh pengukuran berbasis...", options: ["Results / Objective (Berdasarkan hasil/output yang terukur)", "Traits (Berdasarkan sifat kepribadian)", "Behavior (Berdasarkan observasi perilaku)", "Subjective Rating (Penilaian subjektif atasan)"], answer: "Results / Objective (Berdasarkan hasil/output yang terukur)"},
            {q: "Sistem penilaian kinerja di mana karyawan dipaksa masuk ke dalam kategori persentase tertentu (misal: 20% nilai A, 70% B, 10% C) disebut metode...", options: ["Forced Distribution Method (Distribusi Paksa)", "360-Degree Feedback", "Graphic Rating Scale", "Critical Incident Technique"], answer: "Forced Distribution Method (Distribusi Paksa)"},
            {q: "Evaluasi kinerja karyawan yang sumber penilaiannya didapatkan dari atasan, rekan kerja sejawat, bawahan, klien, hingga diri sendiri disebut...", options: ["360-Degree Feedback", "Top-Down Appraisal", "Peer Review", "Self-Assessment"], answer: "360-Degree Feedback"},
            {q: "Komponen pembentuk Job Attitude (Sikap Kerja) umumnya diukur melalui tiga aspek utama. Aspek apa sajakah itu?", options: ["Kognitif (Kepercayaan), Afektif (Perasaan), dan Perilaku (Intensi bertindak)", "Ekstrovert, Introvert, Ambivert", "Umur, Gender, Pendidikan", "Gaji, Tunjangan, Fasilitas"], answer: "Kognitif (Kepercayaan), Afektif (Perasaan), dan Perilaku (Intensi bertindak)"},
            {q: "Teori kepuasan kerja yang menyatakan bahwa kepuasan adalah hasil dari perbandingan antara apa yang diharapkan (harapan) dengan apa yang sebenarnya didapatkan (kenyataan) disebut...", options: ["Value-Percept Theory / Discrepancy Theory", "Two-Factor Theory (Herzberg)", "Maslow Hierarchy of Needs", "Job Characteristics Model"], answer: "Value-Percept Theory / Discrepancy Theory"},
            {q: "Organizational Citizenship Behavior (OCB) merujuk pada...", options: ["Perilaku sukarela karyawan di luar deskripsi kerjanya yang berkontribusi positif bagi organisasi (contoh: membantu rekan kerja yang kewalahan)", "Perilaku mencari muka kepada atasan agar cepat naik gaji", "Kewajiban lembur yang tertulis di kontrak kerja", "Tuntutan karyawan untuk mendapatkan hak fasilitas lebih"], answer: "Perilaku sukarela karyawan di luar deskripsi kerjanya yang berkontribusi positif bagi organisasi (contoh: membantu rekan kerja yang kewalahan)"},
            {q: "Salah satu faktor utama yang paling kuat mempengaruhi tingginya OCB (Organizational Citizenship Behavior) pada karyawan adalah...", options: ["Kepuasan kerja (Job Satisfaction) dan Komitmen Organisasi (Organizational Commitment) yang tinggi", "Besarnya ancaman pemecatan dari atasan", "Karakteristik karyawan yang pemalas", "Jarak rumah karyawan yang dekat dengan kantor"], answer: "Kepuasan kerja (Job Satisfaction) dan Komitmen Organisasi (Organizational Commitment) yang tinggi"},
            {q: "Menggunakan fasilitas atau barang milik kantor (seperti printer, alat tulis, atau kendaraan) untuk kepentingan pribadi tanpa izin termasuk ke dalam perilaku...", options: ["Counterproductive Work Behavior (CWB) spesifiknya Property Deviance", "Organizational Citizenship Behavior (OCB)", "Job Crafting", "Work-Life Integration"], answer: "Counterproductive Work Behavior (CWB) spesifiknya Property Deviance"},
            {q: "Manakah di bawah ini yang merupakan macam-macam metode Performance Appraisal (Penilaian Kinerja)?", options: ["Graphic Rating Scales, BARS (Behaviorally Anchored Rating Scales), dan Management by Objectives (MBO)", "Job Analysis, Job Evaluation, dan Job Design", "OJT, Off-The-Job, dan Mentoring", "Big Five Personality, MBTI, dan DISC"], answer: "Graphic Rating Scales, BARS (Behaviorally Anchored Rating Scales), dan Management by Objectives (MBO)"}
        ];

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        function getElement(id) { return document.getElementById(id); }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function triggerReflow(element) {
            element.classList.remove('animate-fade-in');
            void element.offsetWidth;
            element.classList.add('animate-fade-in');
        }

        document.addEventListener('DOMContentLoaded', () => {
            getElement('total-q-start').innerText = database.length;
            getElement('total-q').innerText = database.length;
        });

        function startQuiz() {
            questions = shuffleArray(JSON.parse(JSON.stringify(database)));
            currentIndex = 0;
            score = 0;
            
            getElement('start-screen').classList.add('hidden');
            getElement('result-screen').classList.add('hidden');
            
            const quizScreen = getElement('quiz-screen');
            quizScreen.classList.remove('hidden');
            triggerReflow(quizScreen);
            
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            
            const nextBtn = getElement('next-btn');
            nextBtn.classList.remove('show');
            setTimeout(() => nextBtn.classList.add('hidden'), 300);
            
            getElement('current-q').innerText = currentIndex + 1;
            
            const questionEl = getElement('question');
            const currentData = questions[currentIndex];
            questionEl.innerText = currentData.q;
            
            questionEl.style.opacity = '0';
            questionEl.classList.remove('animate-fade-in');
            void questionEl.offsetWidth;
            questionEl.classList.add('animate-fade-in');
            
            let optionsData = shuffleArray([...currentData.options]);
            const optionsContainer = getElement('options');
            optionsContainer.innerHTML = '';
            
            optionsData.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-slide-up';
                btn.style.animationDelay = `${index * 0.08}s`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt, currentData.answer);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct) {
            if (isAnswered) return;
            isAnswered = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) {
                    b.classList.add('correct');
                }
            });

            if (selected === correct) {
                score++;
            } else {
                btn.classList.add('wrong');
            }

            const nextBtn = getElement('next-btn');
            nextBtn.classList.remove('hidden');
            setTimeout(() => nextBtn.classList.add('show'), 10);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            getElement('quiz-screen').classList.add('hidden');
            
            const resultScreen = getElement('result-screen');
            resultScreen.classList.remove('hidden');
            
            getElement('final-score').innerHTML = `${score}<span>/${database.length}</span>`;
            
            const msg = getElement('result-message');
            const percentage = score / database.length;
            
            if (percentage === 1) msg.innerText = "ok";
            else if (percentage >= 0.75) msg.innerText = "y";
            else if (percentage >= 0.5) msg.innerText = "BALIK TK NGENTODDD";
            else msg.innerText = "semester depan cuti aj";
            
            const animatedElements = resultScreen.querySelectorAll('.animate-slide-up');
            animatedElements.forEach(el => {
                el.classList.remove('animate-slide-up');
                void el.offsetWidth;
                el.classList.add('animate-slide-up');
            });
        }
    </script>
</body>
</html>
