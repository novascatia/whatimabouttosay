<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Psikologi Teknologi & Internet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg-body: #000000;
            --bg-card: #0a0a0a;
            --border: #27272a;
            --border-hover: #3f3f46;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            
            --primary: #ededed;
            --primary-text: #0a0a0a;
            --primary-hover: #d4d4d8;
            
            --correct-bg: rgba(16, 185, 129, 0.1);
            --correct-border: #10b981;
            --correct-text: #34d399;
            
            --wrong-bg: rgba(239, 68, 68, 0.1);
            --wrong-border: #ef4444;
            --wrong-text: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 680px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 10px 30px -10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .counter {
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: 500;
            background: #18181b;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .question {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 32px;
            color: var(--text-main);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 1.5;
            opacity: 0;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--border-hover);
            color: var(--text-main);
            background: #18181b;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 500;
        }

        .option-btn.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: var(--wrong-text);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-text);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .hidden {
            display: none !important;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen {
            display: flex;
            flex-direction: column;
        }

        .start-screen, .result-screen {
            text-align: center;
            align-items: center;
            padding: 32px 0;
        }

        .start-screen h1 {
            font-size: 1.75rem;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .start-screen p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .score {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: -0.05em;
            margin: 24px 0;
            color: var(--text-main);
            line-height: 1;
        }

        .score span {
            font-size: 2rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        #next-btn {
            align-self: flex-end;
            width: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        #next-btn.show {
            display: block !important;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container animate-fade-in">
        
        <div id="start-screen" class="screen start-screen">
            <h1 class="animate-slide-up" style="animation-delay: 0.1s; opacity: 0;">Psikologi Teknologi & Internet</h1>
            <p class="animate-slide-up" style="animation-delay: 0.2s; opacity: 0;">Simulasi Ujian Berdasarkan Kisi-Kisi</p>
            <button class="btn-primary animate-slide-up" style="animation-delay: 0.3s; opacity: 0; max-width: 200px;" onclick="startQuiz()">Mulai Latihan</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <header>
                <div class="header-title">Exam Prep Mode</div>
                <div class="counter"><span id="current-q">1</span> / <span id="total-q"></span></div>
            </header>
            
            <div class="question" id="question">Question here</div>
            
            <div class="options" id="options"></div>

            <button class="btn-primary hidden" id="next-btn" onclick="nextQuestion()">Selanjutnya &rarr;</button>
        </div>

        <div id="result-screen" class="screen result-screen hidden">
            <h2 class="animate-slide-up" style="animation-delay: 0.1s; font-size: 1.25rem; font-weight: 500; color: var(--text-muted); opacity: 0;">Skor Simulasi</h2>
            <div class="score animate-slide-up" id="final-score" style="animation-delay: 0.2s; opacity: 0;">0<span>/0</span></div>
            <p class="animate-slide-up" id="result-message" style="animation-delay: 0.3s; color: var(--text-main); margin-bottom: 40px; font-size: 1rem; opacity: 0;"></p>
            <button class="btn-primary animate-slide-up" style="animation-delay: 0.4s; max-width: 200px; opacity: 0;" onclick="startQuiz()">Coba Lagi</button>
        </div>

    </div>

    <script>
        const database = [
            {q: "1. Peran Informasional Influence dalam polarisasi kelompok terjadi ketika...", options: ["Anggota kelompok terpapar argumen baru yang masuk akal dan mendukung pandangan awal mereka", "Anggota mengubah pendapat murni karena ingin diterima oleh mayoritas kelompok", "Adanya tekanan dari sosok pemimpin yang karismatik", "Anggota bertindak secara anonim untuk menghindari kritik"], answer: "Anggota kelompok terpapar argumen baru yang masuk akal dan mendukung pandangan awal mereka"},
            {q: "2. Fenomena awal yang menjadi dasar penemuan konsep polarisasi kelompok adalah...", options: ["Risky shift phenomenon (Pergeseran Risiko)", "Bystander effect", "Social loafing", "Groupthink"], answer: "Risky shift phenomenon (Pergeseran Risiko)"},
            {q: "3. Apa yang dimaksud dengan polarisasi kelompok?", options: ["Kecenderungan kelompok untuk membuat keputusan yang lebih ekstrem dibandingkan kecenderungan awal anggotanya", "Pecahnya satu kelompok besar menjadi faksi-faksi kecil yang saling bermusuhan", "Hilangnya identitas personal saat berada di dalam kerumunan", "Proses asimilasi budaya di dalam suatu komunitas maya"], answer: "Kecenderungan kelompok untuk membuat keputusan yang lebih ekstrem dibandingkan kecenderungan awal anggotanya"},
            {q: "4. Menurut Riggio (2009), konformitas didefinisikan sebagai...", options: ["Perubahan perilaku atau keyakinan individu agar sesuai dengan norma kelompok sebagai akibat dari tekanan kelompok", "Tindakan agresi yang dilakukan karena merasa tidak terlihat (anonim)", "Kepatuhan mutlak terhadap figur otoritas", "Proses penolakan individu terhadap aturan mayoritas"], answer: "Perubahan perilaku atau keyakinan individu agar sesuai dengan norma kelompok sebagai akibat dari tekanan kelompok"},
            {q: "5. Unsur utama yang mutlak harus ada agar sekumpulan orang dapat disebut sebagai 'kelompok' adalah...", options: ["Adanya interaksi, saling ketergantungan (interdependensi), dan tujuan bersama", "Adanya pemimpin yang formal dan struktur hierarki", "Terdiri dari setidaknya 10 orang dengan usia seragam", "Memiliki nama dan logo resmi"], answer: "Adanya interaksi, saling ketergantungan (interdependensi), dan tujuan bersama"},
            {q: "6. Manakah di bawah ini yang merupakan salah satu karakteristik utama dari kecanduan internet (Internet Addiction)?", options: ["Mengalami gejala penarikan diri (withdrawal) saat tidak online dan kehilangan kendali atas waktu", "Bisa membatasi waktu penggunaan media sosial dengan ketat", "Hanya menggunakan internet untuk keperluan akademis", "Meningkatnya kepuasan hidup di dunia nyata"], answer: "Mengalami gejala penarikan diri (withdrawal) saat tidak online dan kehilangan kendali atas waktu"},
            {q: "7. Secara psikologis, faktor yang sering menjadi penyebab seseorang rentan mengalami Internet Addiction adalah...", options: ["Kecemasan sosial, kesepian, dan pelarian dari masalah di dunia nyata (escapism)", "Memiliki banyak teman dekat dan dukungan sosial yang kuat", "Tingkat kecerdasan IQ yang di atas rata-rata", "Kurangnya akses terhadap perangkat teknologi"], answer: "Kecemasan sosial, kesepian, dan pelarian dari masalah di dunia nyata (escapism)"},
            {q: "8. Definisi umum dari Internet Addiction adalah...", options: ["Penggunaan internet yang berlebihan, kompulsi yang tidak terkontrol, hingga mengganggu fungsi kehidupan sehari-hari", "Hobi menggunakan komputer untuk membangun aplikasi dan jaringan", "Kebiasaan mencari informasi akademik secara terus-menerus", "Aktivitas berbelanja online seminggu sekali"], answer: "Penggunaan internet yang berlebihan, kompulsi yang tidak terkontrol, hingga mengganggu fungsi kehidupan sehari-hari"},
            {q: "9. Perbedaan mendasar antara Anonymity dan Pseudonymity di dunia maya adalah...", options: ["Anonymity berarti interaksi tanpa identitas sama sekali, sedangkan Pseudonymity menggunakan nama samaran yang dapat dilacak secara konsisten", "Anonymity menggunakan nama asli, Pseudonymity tidak pakai nama", "Keduanya memiliki arti yang persis sama dalam hukum siber", "Anonymity hanya di Deep Web, Pseudonymity di media sosial"], answer: "Anonymity berarti interaksi tanpa identitas sama sekali, sedangkan Pseudonymity menggunakan nama samaran yang dapat dilacak secara konsisten"},
            {q: "10. Salah satu trait (aspek kepribadian) dalam Big Five yang sering dikaitkan dengan tingginya kecenderungan kecanduan internet adalah...", options: ["Neuroticism yang tinggi (mudah cemas) atau Extraversion yang rendah (introvert)", "Conscientiousness yang sangat tinggi", "Openness to Experience yang rendah", "Agreeableness yang maksimal"], answer: "Neuroticism yang tinggi (mudah cemas) atau Extraversion yang rendah (introvert)"},
            {q: "11. Konsep Online Disinhibition Effect yang digagas oleh John Suler menjelaskan fenomena di mana...", options: ["Orang merasa lebih bebas bertindak atau berekspresi secara online, yang terkadang memicu perilaku agresif atau pembukaan diri yang berlebihan", "Orang menjadi sangat takut untuk berinteraksi di forum online", "Berkurangnya koneksi internet karena terlalu banyak pengguna", "Meningkatnya rasa empati saat membaca komentar negatif"], answer: "Orang merasa lebih bebas bertindak atau berekspresi secara online, yang terkadang memicu perilaku agresif atau pembukaan diri yang berlebihan"},
            {q: "12. Tindakan mengirimkan pesan penuh amarah, kasar, atau vulgar secara sengaja di forum publik termasuk dalam jenis cyberbullying yang disebut...", options: ["Flaming", "Impersonation", "Outing", "Cyberstalking"], answer: "Flaming"},
            {q: "13. Berdasarkan riset secara umum, perbedaan karakteristik pria dan wanita dalam belanja online (e-commerce) adalah...", options: ["Pria cenderung berorientasi pada efisiensi/tujuan (utilitarian), wanita lebih mementingkan eksplorasi dan interaksi emosional (hedonik)", "Pria lebih suka menawar harga, wanita langsung membeli", "Wanita lebih memikirkan spesifikasi teknis, pria fokus pada warna", "Tidak ada perbedaan pola belanja antara pria dan wanita"], answer: "Pria cenderung berorientasi pada efisiensi/tujuan (utilitarian), wanita lebih mementingkan eksplorasi dan interaksi emosional (hedonik)"},
            {q: "14. Menurut Hinduja & Patchin (2009), Cyberbullying didefinisikan sebagai...", options: ["Perilaku menyakiti orang lain yang dilakukan secara sengaja dan berulang-ulang melalui perangkat elektronik dan komputer", "Kejahatan meretas akun bank seseorang secara diam-diam", "Tindakan penipuan berkedok investasi online", "Kritik membangun yang diberikan dalam forum akademik maya"], answer: "Perilaku menyakiti orang lain yang dilakukan secara sengaja dan berulang-ulang melalui perangkat elektronik dan komputer"},
            {q: "15. Contoh penerapan Nettiquete (etika internet) yang baik dan tepat adalah...", options: ["Menghindari penggunaan HURUF KAPITAL secara keseluruhan karena terkesan sedang berteriak marah", "Meneruskan (forward) pesan berantai ke semua kontak", "Menggunakan identitas palsu untuk mengkritik orang", "Mengambil gambar tanpa mencantumkan kredit pencipta"], answer: "Menghindari penggunaan HURUF KAPITAL secara keseluruhan karena terkesan sedang berteriak marah"},
            {q: "16. Hubungan antara Nettiquete dengan fenomena Cyberbullying adalah...", options: ["Penerapan netiquette yang lemah/buruk dalam komunitas online memiliki korelasi yang kuat dengan tingginya insiden cyberbullying", "Semakin ketat netiquette, semakin tinggi angka cyberbullying", "Keduanya tidak saling berkaitan", "Netiquette adalah penyebab utama terjadinya cyberbullying"], answer: "Penerapan netiquette yang lemah/buruk dalam komunitas online memiliki korelasi yang kuat dengan tingginya insiden cyberbullying"},
            {q: "17. Apa yang dimaksud dengan Technological Gap (Kesenjangan Teknologi / Digital Divide)?", options: ["Kesenjangan antara kelompok yang memiliki akses dan kemampuan memanfaatkan teknologi dengan kelompok yang tidak memilikinya", "Perbedaan merk teknologi yang dipakai oleh dua institusi berbeda", "Jarak fisik antara server pusat dengan komputer klien", "Kesenjangan harga antara perangkat keras dan lunak"], answer: "Kesenjangan antara kelompok yang memiliki akses dan kemampuan memanfaatkan teknologi dengan kelompok yang tidak memilikinya"},
            {q: "18. Dalam aspek demografis, kondisi anonymity di internet seringkali mengakibatkan...", options: ["Bias dan prasangka awal terkait gender, ras, dan usia menjadi berkurang karena identitas fisik tidak terlihat", "Munculnya konflik antar ras secara besar-besaran di setiap forum", "Meningkatnya kesadaran akan kelas sosial seseorang", "Usia seseorang akan sangat mudah terdeteksi dari gaya bahasanya"], answer: "Bias dan prasangka awal terkait gender, ras, dan usia menjadi berkurang karena identitas fisik tidak terlihat"},
            {q: "19. Salah satu tipe Anonymity di mana pengguna tidak diketahui identitasnya oleh publik, namun pihak penyedia layanan/sistem tetap dapat melacaknya disebut...", options: ["Traceable anonymity", "Absolute anonymity", "Pseudonymity", "Visual anonymity"], answer: "Traceable anonymity"},
            {q: "20. Menulis subjek yang jelas (clear subject line) dan membalas pesan secara tepat waktu merupakan contoh dari jenis Nettiquete dalam...", options: ["One-to-one communication (Komunikasi personal, misal email)", "Many-to-many communication (Mailing list/Forum)", "Information retrieval (Pencarian informasi)", "Gaming etiquette (Etika bermain game)"], answer: "One-to-one communication (Komunikasi personal, misal email)"},
            {q: "21. Fungsi utama dari search engine (mesin pencari) adalah...", options: ["Mengindeks, mencari, dan menampilkan informasi dari miliaran halaman web berdasarkan query/kata kunci", "Menyimpan seluruh data pribadi pengguna di internet", "Sebagai perangkat lunak untuk membuat website", "Menangkal virus komputer dan malware"], answer: "Mengindeks, mencari, dan menampilkan informasi dari miliaran halaman web berdasarkan query/kata kunci"},
            {q: "22. Manakah di bawah ini yang merupakan bentuk komunikasi langsung (synchronous) di internet?", options: ["Chatting (Instant Messaging) dan Video Conference", "Email dan Forum Diskusi", "Blog dan Artikel Website", "Mailing list dan Podcast"], answer: "Chatting (Instant Messaging) dan Video Conference"},
            {q: "23. Jenis layanan email yang memungkinkan penggunanya untuk membaca, mengirim, dan mengelola email langsung melalui browser tanpa harus mengunduh aplikasinya disebut...", options: ["Webmail (contoh: Gmail, Yahoo Mail)", "POP3 mail", "IMAP client", "Forwarding mail"], answer: "Webmail (contoh: Gmail, Yahoo Mail)"},
            {q: "24. Fungsi utama dari email (electronic mail) adalah...", options: ["Menerima dan mengirimkan pesan berupa teks atau file digital secara asinkron (tidak langsung)", "Melakukan panggilan video tatap muka", "Mencari informasi artikel akademis di web", "Mendesain gambar atau mengedit video online"], answer: "Menerima dan mengirimkan pesan berupa teks atau file digital secara asinkron (tidak langsung)"},
            {q: "25. Jaringan komputer yang digunakan untuk menghubungkan komputer-komputer dalam jangkauan area geografis yang kecil, seperti gedung kantor atau kampus disebut...", options: ["LAN (Local Area Network)", "WAN (Wide Area Network)", "MAN (Metropolitan Area Network)", "PAN (Personal Area Network)"], answer: "LAN (Local Area Network)"},
            {q: "26. Dampak negatif internet bagi kesehatan mental dan psikologis individu bisa meliputi...", options: ["Cyberchondria, FOMO (Fear Of Missing Out), dan paparan Cyberbullying", "Meningkatkan kemampuan memori jangka panjang", "Membuat kualitas tidur menjadi sangat baik", "Mengurangi tingkat kemalasan fisik"], answer: "Cyberchondria, FOMO (Fear Of Missing Out), dan paparan Cyberbullying"},
            {q: "27. Secara sejarah, jaringan komputer pertama yang dikembangkan pada tahun 1969 oleh Departemen Pertahanan AS dan menjadi cikal bakal internet bernama...", options: ["ARPANET", "INTRANET", "USENET", "ETHERNET"], answer: "ARPANET"}
        ];

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        function getElement(id) { return document.getElementById(id); }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function triggerReflow(element) {
            element.classList.remove('animate-fade-in');
            void element.offsetWidth;
            element.classList.add('animate-fade-in');
        }

        document.addEventListener('DOMContentLoaded', () => {
            getElement('total-q').innerText = database.length;
        });

        function startQuiz() {
            questions = shuffleArray(JSON.parse(JSON.stringify(database)));
            currentIndex = 0;
            score = 0;
            
            getElement('start-screen').classList.add('hidden');
            getElement('result-screen').classList.add('hidden');
            
            const quizScreen = getElement('quiz-screen');
            quizScreen.classList.remove('hidden');
            triggerReflow(quizScreen);
            
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            
            const nextBtn = getElement('next-btn');
            nextBtn.classList.remove('show');
            setTimeout(() => nextBtn.classList.add('hidden'), 300);
            
            getElement('current-q').innerText = currentIndex + 1;
            
            const questionEl = getElement('question');
            const currentData = questions[currentIndex];
            questionEl.innerText = currentData.q;
            
            questionEl.style.opacity = '0';
            questionEl.classList.remove('animate-fade-in');
            void questionEl.offsetWidth;
            questionEl.classList.add('animate-fade-in');
            
            let optionsData = shuffleArray([...currentData.options]);
            const optionsContainer = getElement('options');
            optionsContainer.innerHTML = '';
            
            optionsData.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-slide-up';
                btn.style.animationDelay = `${index * 0.08}s`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt, currentData.answer);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct) {
            if (isAnswered) return;
            isAnswered = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) {
                    b.classList.add('correct');
                }
            });

            if (selected === correct) {
                score++;
            } else {
                btn.classList.add('wrong');
            }

            const nextBtn = getElement('next-btn');
            nextBtn.classList.remove('hidden');
            setTimeout(() => nextBtn.classList.add('show'), 10);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            getElement('quiz-screen').classList.add('hidden');
            
            const resultScreen = getElement('result-screen');
            resultScreen.classList.remove('hidden');
            
            getElement('final-score').innerHTML = `${score}<span>/${database.length}</span>`;
            
            const msg = getElement('result-message');
            const percentage = score / database.length;
            
            if (percentage === 1) msg.innerText = "Sempurna! Udah sangat menguasai materi nih buat ujian.";
            else if (percentage >= 0.75) msg.innerText = "Mantap! Sedikit lagi perfect, tinggal asah pemahaman teorinya.";
            else if (percentage >= 0.5) msg.innerText = "Cukup baik, tapi sepertinya harus baca-baca ulang modulnya ya.";
            else msg.innerText = "Ayo semangat! Jangan lupa direview lagi ya konsep-konsep kuncinya.";
            
            const animatedElements = resultScreen.querySelectorAll('.animate-slide-up');
            animatedElements.forEach(el => {
                el.classList.remove('animate-slide-up');
                void el.offsetWidth;
                el.classList.add('animate-slide-up');
            });
        }
    </script>
</body>
</html>
