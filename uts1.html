<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Psikodiagnostik: Observasi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            /* Vercel/Linear inspired dark mode palette */
            --bg-body: #000000;
            --bg-card: #0a0a0a;
            --border: #27272a;
            --border-hover: #3f3f46;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            
            /* Primary button: White on dark for high contrast */
            --primary: #ededed;
            --primary-text: #0a0a0a;
            --primary-hover: #d4d4d8;
            
            /* Status colors */
            --correct-bg: rgba(16, 185, 129, 0.1);
            --correct-border: #10b981;
            --correct-text: #34d399;
            
            --wrong-bg: rgba(239, 68, 68, 0.1);
            --wrong-border: #ef4444;
            --wrong-text: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Subtle grid background for premium feel */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 640px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 10px 30px -10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .counter {
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: 500;
            background: #18181b;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .question {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 32px;
            color: var(--text-main);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 1.5;
            opacity: 0;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--border-hover);
            color: var(--text-main);
            background: #18181b;
            transform: translateY(-2px);
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 500;
        }

        .option-btn.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: var(--wrong-text);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-text);
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .hidden {
            display: none !important;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen {
            display: flex;
            flex-direction: column;
        }

        .start-screen, .result-screen {
            text-align: center;
            align-items: center;
            padding: 32px 0;
        }

        .start-screen h1 {
            font-size: 1.75rem;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .start-screen p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .score {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: -0.05em;
            margin: 24px 0;
            color: var(--text-main);
            line-height: 1;
        }

        .score span {
            font-size: 2rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        #next-btn {
            align-self: flex-end;
            width: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        #next-btn.show {
            display: block !important;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container animate-fade-in">
        
        <div id="start-screen" class="screen start-screen">
            <h1 class="animate-slide-up" style="animation-delay: 0.1s; opacity: 0;">Psikodiagnostik: Observasi</h1>
            <p class="animate-slide-up" style="animation-delay: 0.2s; opacity: 0;"><span id="total-q-start"></span> Soal latihan dari dokumen UTS</p>
            <button class="btn-primary animate-slide-up" style="animation-delay: 0.3s; opacity: 0; max-width: 200px;" onclick="startQuiz()">Mulai Ujian</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <header>
                <div class="header-title">Mid-Term Practice</div>
                <div class="counter"><span id="current-q">1</span> / <span id="total-q"></span></div>
            </header>
            
            <div class="question" id="question">Question here</div>
            
            <div class="options" id="options">
                </div>

            <button class="btn-primary hidden" id="next-btn" onclick="nextQuestion()">Selanjutnya &rarr;</button>
        </div>

        <div id="result-screen" class="screen result-screen hidden">
            <h2 class="animate-slide-up" style="animation-delay: 0.1s; font-size: 1.25rem; font-weight: 500; color: var(--text-muted); opacity: 0;">Skor Akhir</h2>
            <div class="score animate-slide-up" id="final-score" style="animation-delay: 0.2s; opacity: 0;">0<span>/0</span></div>
            <p class="animate-slide-up" id="result-message" style="animation-delay: 0.3s; color: var(--text-main); margin-bottom: 40px; font-size: 1rem; opacity: 0;"></p>
            <button class="btn-primary animate-slide-up" style="animation-delay: 0.4s; max-width: 200px; opacity: 0;" onclick="startQuiz()">Ulangi Ujian</button>
        </div>

    </div>

    <script>
        const database = [
            {q: "Apa yang dimaksud dengan tes berbasis norma dalam konteks asesmen psikologis?", options: ["Membandingkan skor individu dengan skor kelompok standar (norma)", "Mengukur keahlian spesifik tanpa standar banding", "Menilai kepribadian melalui tes proyektif", "Mengukur tingkat kecerdasan absolut"], answer: "Membandingkan skor individu dengan skor kelompok standar (norma)"},
            {q: "Manfaat utama dari tes berbasis norma adalah?", options: ["Mengetahui posisi relatif individu dibandingkan populasi", "Menentukan kelulusan subjek secara mutlak", "Mendiagnosis gangguan kejiwaan akut", "Mengubah perilaku yang tidak adaptif"], answer: "Mengetahui posisi relatif individu dibandingkan populasi"},
            {q: "Apa karakteristik utama dari wawancara dalam asesmen psikologis?", options: ["Interaksi dua arah yang bertujuan mengumpulkan informasi mendalam", "Penyebaran kuesioner tertulis secara massal", "Pengamatan diam-diam dari jarak jauh", "Pemberian stimulasi fisik di laboratorium"], answer: "Interaksi dua arah yang bertujuan mengumpulkan informasi mendalam"},
            {q: "Apa yang dimaksud dengan observasi dalam konteks psikodiagnostik menurut definisi Betzen (2000)?", options: ["Pengamatan sistematis terhadap perilaku untuk tujuan asesmen", "Diskusi terbuka antara terapis dan klien", "Pengerjaan tes tertulis dengan batasan waktu", "Interpretasi dari mimpi klien"], answer: "Pengamatan sistematis terhadap perilaku untuk tujuan asesmen"},
            {q: "Menurut Cartwright & Cartwright (1984), observasi bertujuan untuk:", options: ["Mengumpulkan data perilaku subjek yang objektif", "Mengubah kepribadian klien", "Memberikan diagnosis medis secara langsung", "Menghitung tingkat IQ subjek"], answer: "Mengumpulkan data perilaku subjek yang objektif"},
            {q: "Apa yang dimaksud dengan objek observasi dalam psikodiagnostik?", options: ["Perilaku individu yang dapat diamati dan dicatat", "Pikiran alam bawah sadar individu", "Latar belakang masa lalu individu", "Kondisi genetik bawaan"], answer: "Perilaku individu yang dapat diamati dan dicatat"},
            {q: "Karakteristik penting dari tingkah laku adalah:", options: ["Dapat diamati, diukur, dan didefinisikan", "Bersifat abstrak dan kognitif murni", "Mustahil diprediksi", "Selalu terjadi di alam bawah sadar"], answer: "Dapat diamati, diukur, dan didefinisikan"},
            {q: "Fungsi observasi sebagai metode utama dalam psikodiagnostik adalah saat:", options: ["Perilaku tidak dapat diukur dengan tes tertulis atau subjek tidak kooperatif (seperti anak kecil)", "Subjek sangat antusias mengikuti tes tertulis", "Ingin mengukur potensi kognitif bawaan", "Mencari tahu trauma terpendam"], answer: "Perilaku tidak dapat diukur dengan tes tertulis atau subjek tidak kooperatif (seperti anak kecil)"},
            {q: "Prinsip dasar dari observasi adalah:", options: ["Sistematis, objektif, dan memiliki tujuan yang jelas", "Spontan dan bebas tanpa rencana", "Sangat subjektif tergantung pengamat", "Rahasia dan manipulatif"], answer: "Sistematis, objektif, dan memiliki tujuan yang jelas"},
            {q: "Ciri khas dari naturalistic observation adalah:", options: ["Dilakukan di lingkungan asli tanpa manipulasi variabel", "Dilakukan di laboratorium tertutup", "Subjek diberi perlakuan atau stimulus khusus", "Menggunakan tes standar baku"], answer: "Dilakukan di lingkungan asli tanpa manipulasi variabel"},
            {q: "Dalam konteks observasi di ruang kelas TK, apa yang menjadi fokus pengamatan?", options: ["Interaksi sosial dan perilaku belajar anak di lingkungan aslinya", "Tingkat intelegensi anak melalui tes tertulis", "Faktor ekonomi keluarga anak", "Kondisi fisik bangunan TK"], answer: "Interaksi sosial dan perilaku belajar anak di lingkungan aslinya"},
            {q: "Apa yang dimaksud dengan informal observation?", options: ["Observasi yang tidak terstruktur ketat dan terjadi dalam setting sehari-hari", "Observasi di dalam laboratorium klinis", "Observasi menggunakan instrumen tes yang valid", "Observasi dengan memanipulasi situasi eksperimen"], answer: "Observasi yang tidak terstruktur ketat dan terjadi dalam setting sehari-hari"},
            {q: "Salah satu teknik dalam formal observation untuk merekam perilaku target adalah:", options: ["Time sampling atau event recording", "Wawancara tidak terstruktur", "Self-report", "Bermain peran secara bebas"], answer: "Time sampling atau event recording"},
            {q: "Contoh tempat dilakukannya naturalistic observation antara lain:", options: ["Sekolah, rumah, atau taman bermain", "Ruang eksperimen berinsulasi suara", "Klinik psikiatri", "Ruang interogasi"], answer: "Sekolah, rumah, atau taman bermain"},
            {q: "Kelebihan analogue observation adalah:", options: ["Lingkungan dan variabel bisa dikontrol secara spesifik", "Bisa dilakukan tanpa izin", "Subjek merasa 100% natural tanpa beban", "Tidak memerlukan pengamat manusia"], answer: "Lingkungan dan variabel bisa dikontrol secara spesifik"},
            {q: "Analogue observation dirancang untuk:", options: ["Mensimulasikan situasi spesifik demi memicu perilaku target", "Mengamati subjek secara diam-diam di alam bebas", "Menggantikan peran psikoterapi", "Mencatat kejadian bersejarah"], answer: "Mensimulasikan situasi spesifik demi memicu perilaku target"},
            {q: "Permasalahan dalam self-monitoring terutama terjadi ketika:", options: ["Subjek bias, tidak objektif, atau melakukan faking (faking good/bad)", "Pengamat salah mencatat waktu kejadian", "Alat rekam video kehabisan baterai", "Penelitian dilakukan di luar ruangan"], answer: "Subjek bias, tidak objektif, atau melakukan faking (faking good/bad)"},
            {q: "Salah satu solusi untuk meningkatkan validitas self-monitoring adalah:", options: ["Validasi silang (cross-check) dengan observasi dari pihak lain", "Memberikan bayaran lebih mahal pada subjek", "Meminta subjek merevisi jawabannya sendiri", "Menggunakan ruangan yang lebih gelap"], answer: "Validasi silang (cross-check) dengan observasi dari pihak lain"},
            {q: "Pada observasi berdasarkan setting, contrived/simulated setting berarti:", options: ["Lingkungan observasi yang sengaja diatur atau diciptakan peneliti", "Lingkungan yang sepenuhnya natural", "Observasi yang dilakukan murni via internet", "Lingkungan eksperimen acak"], answer: "Lingkungan observasi yang sengaja diatur atau diciptakan peneliti"},
            {q: "Observasi partisipan memiliki ciri utama:", options: ["Observer ikut terlibat langsung dalam aktivitas subjek", "Observer bersembunyi agar tidak terlihat", "Observer hanya mengamati rekaman CCTV", "Observer menyuruh subjek melakukan aktivitas sendirian"], answer: "Observer ikut terlibat langsung dalam aktivitas subjek"},
            {q: "Perbedaan antara pencatatan menyeluruh dan terfokus adalah:", options: ["Menyeluruh mencatat semua perilaku, terfokus hanya pada perilaku target tertentu", "Menyeluruh butuh waktu lama, terfokus butuh alat canggih", "Menyeluruh dilakukan partisipan, terfokus non-partisipan", "Tidak ada bedanya, hanya istilah belaka"], answer: "Menyeluruh mencatat semua perilaku, terfokus hanya pada perilaku target tertentu"},
            {q: "Data mentah dalam observasi terbuka (overt) mencakup:", options: ["Catatan deskriptif faktual tentang perilaku yang tampak (apa yang dilihat/didengar)", "Asumsi mendalam psikolog tentang motif klien", "Hasil interpretasi psikoanalisa", "Angka-angka hasil tes intelegensi"], answer: "Catatan deskriptif faktual tentang perilaku yang tampak (apa yang dilihat/didengar)"},
            {q: "Contoh perilaku dalam data mentah 'tertawa' dapat dicatat sebagai:", options: ["A. Mulut terbuka, mata menyipit, suara 'hahaha'", "B. Hahahaha", "C. Subjek senang", "D. Menunjukkan rasa bahagia"], answer: "A. Mulut terbuka, mata menyipit, suara 'hahaha'"},
            {q: "Low inferential judgment berarti:", options: ["Penilaian atau kesimpulan observasi dengan interpretasi pribadi yang sangat minim", "Penarikan kesimpulan yang sangat subjektif", "Menilai rendah kemampuan subjek", "Mengabaikan perilaku fisik murni"], answer: "Penilaian atau kesimpulan observasi dengan interpretasi pribadi yang sangat minim"},
            {q: "Yang termasuk dalam kombinasi dimensi observasi adalah:", options: ["A. Natural setting – partisipan – menyeluruh", "B. Observasi bebas & berbayar", "C. Observasi online – tertutup – tidak sistematis", "D. Eksperimen – wawancara – self-report"], answer: "A. Natural setting – partisipan – menyeluruh"},
            {q: "Apa yang menjadi tahapan awal dalam proses observasi ilmiah?", options: ["Menentukan tujuan penelitian/observasi", "Menganalisis data lapangan", "Menulis laporan akhir", "Menyebarkan kuesioner"], answer: "Menentukan tujuan penelitian/observasi"},
            {q: "Yang termasuk dalam kategori tingkah laku statis adalah:", options: ["Tinggi badan, bentuk tubuh, ras, atau warna mata", "Ekspresi marah saat diganggu", "Berjalan mondar-mandir", "Berbicara dengan nada tinggi"], answer: "Tinggi badan, bentuk tubuh, ras, atau warna mata"},
            {q: "Behavior tallying termasuk dalam:", options: ["Event recording", "Narrative recording", "Self-monitoring", "Time sampling"], answer: "Event recording"},
            {q: "Apa manfaat dari studi pendahuluan dalam observasi?", options: ["Memperjelas fokus pengamatan dan menguji kelayakan metode/alat ukur", "Langsung mendapatkan kesimpulan diagnostik", "Menghilangkan kebutuhan akan landasan teori", "Membuat subjek lebih patuh"], answer: "Memperjelas fokus pengamatan dan menguji kelayakan metode/alat ukur"},
            {q: "Saat pengambilan data, observer wajib memperhatikan:", options: ["Objektivitas, akurasi pencatatan, dan etika", "Tingkat subjektivitas personal", "Penampilan diri agar menarik di depan subjek", "Komentar orang-orang di sekitar lapangan"], answer: "Objektivitas, akurasi pencatatan, dan etika"},
            {q: "Pencatatan langsung (immediate recording) dilakukan:", options: ["Segera pada saat perilaku subjek sedang berlangsung", "Setelah observasi selesai", "Satu hari sebelum observasi dimulai", "Hanya saat menyusun laporan akhir"], answer: "Segera pada saat perilaku subjek sedang berlangsung"},
            {q: "Contoh tingkah laku dinamis antara lain:", options: ["C. Ekspresi wajah dan gesture", "A. Tinggi badan", "B. Warna suara", "D. Bentuk rambut"], answer: "C. Ekspresi wajah dan gesture"},
            {q: "Tujuan merumuskan definisi operasional perilaku target adalah:", options: ["Agar perilaku dapat diidentifikasi, diamati, dan diukur dengan parameter yang jelas", "Agar laporannya terlihat lebih ilmiah", "Supaya subjek tidak mengerti apa yang sedang diamati", "Menggantikan peran hipotesis utama"], answer: "Agar perilaku dapat diidentifikasi, diamati, dan diukur dengan parameter yang jelas"},
            {q: "Landasan teoritik membantu dalam:", options: ["Memberikan kerangka acuan untuk observasi yang akan dilakukan", "Mempercepat durasi observasi di lapangan", "Membuat observer bebas dari masalah etika", "Mengabaikan perilaku minor yang muncul"], answer: "Memberikan kerangka acuan untuk observasi yang akan dilakukan"},
            {q: "Observasi tanpa diketahui oleh observee hanya boleh dilakukan jika:", options: ["C. Mendapatkan izin tertulis dari tempat yang dituju", "A. Menguntungkan peneliti", "B. Menarik secara visual", "D. Diperintahkan oleh atasan"], answer: "C. Mendapatkan izin tertulis dari tempat yang dituju"},
            {q: "Dalam observasi, waktu pencatatan yang dilakukan setelah observasi selesai disebut:", options: ["Delayed / Retrospective recording", "Immediate recording", "Time-event mapping", "Interval tagging"], answer: "Delayed / Retrospective recording"},
            {q: "Apa yang harus dihindari dalam penarikan kesimpulan observasi?", options: ["Bias subjektif pengamat dan generalisasi berlebihan (overgeneralization)", "Objektivitas data", "Penggunaan landasan teori", "Konsistensi pencatatan"], answer: "Bias subjektif pengamat dan generalisasi berlebihan (overgeneralization)"},
            {q: "Kelelahan, menurunnya konsentrasi, dan minat observer dapat menyebabkan:", options: ["Observer drift (penurunan standar/akurasi pengamatan)", "Hawthorne effect", "Leniency error", "Halo effect"], answer: "Observer drift (penurunan standar/akurasi pengamatan)"},
            {q: "Yang termasuk etika profesional observer adalah:", options: ["Menjaga kerahasiaan identitas dan data subjek (Confidentiality)", "Membocorkan kebiasaan buruk subjek di media", "Memaksa subjek jika mereka tidak bersedia", "Memanipulasi data agar hasil penelitian bagus"], answer: "Menjaga kerahasiaan identitas dan data subjek (Confidentiality)"},
            {q: "Selective attention pada observer berarti:", options: ["Kecenderungan hanya memperhatikan hal tertentu yang sejalan dengan ekspektasi/minat observer", "Fokus sempurna pada seluruh aspek subjek", "Hilangnya fokus akibat suara bising", "Ketidakmampuan melihat subjek secara langsung"], answer: "Kecenderungan hanya memperhatikan hal tertentu yang sejalan dengan ekspektasi/minat observer"},
            {q: "Apa yang menjadi tujuan dari Narrative Recording dalam observasi?", options: ["Mendapatkan deskripsi detail, kronologis, dan komprehensif tentang peristiwa/perilaku", "Mencatat total frekuensi perilaku agresif harian", "Mengubah data kualitatif menjadi angka statistik mutlak", "Membatasi perilaku subjek yang diamati"], answer: "Mendapatkan deskripsi detail, kronologis, dan komprehensif tentang peristiwa/perilaku"},
            {q: "Yang termasuk dalam perilaku molar (bermakna kompleks) adalah:", options: ["B. Membaca", "A. Menggerakkan tangan", "C. Mengunyah makanan", "D. Menyentuh benda"], answer: "B. Membaca"},
            {q: "Kalimat seperti “ia frustasi” termasuk dalam:", options: ["C. High inferential judgment", "A. Deskripsi perilaku objektif", "B. Low inferential judgment", "D. Observasi molar"], answer: "C. High inferential judgment"},
            {q: "Apa kelebihan dari Interval Recording?", options: ["Sangat efisien dan cocok untuk merekam perilaku yang sering berulang atau berdurasi panjang", "Memungkinkan deskripsi berbentuk cerita panjang", "Tidak membutuhkan panduan sama sekali", "Bisa menghitung kecepatan refleks secara akurat"], answer: "Sangat efisien dan cocok untuk merekam perilaku yang sering berulang atau berdurasi panjang"},
            {q: "Time Sampling merujuk pada:", options: ["Pengamatan yang hanya dilakukan pada slot/periode waktu tertentu yang telah ditetapkan", "Mengamati subjek 24 jam penuh tanpa jeda", "Mencatat lamanya (durasi) keseluruhan sebuah perilaku", "Menghitung perilaku subjek di masa lalunya"], answer: "Pengamatan yang hanya dilakukan pada slot/periode waktu tertentu yang telah ditetapkan"},
            {q: "Manakah dari perilaku berikut yang kurang cocok untuk Event Recording?", options: ["B. Berlari dan mengetuk benda secara cepat (terlalu beruntun)", "A. Menyelesaikan tugas matematika", "C. Menggunakan kata kasar", "D. Terlambat masuk kelas"], answer: "B. Berlari dan mengetuk benda secara cepat (terlalu beruntun)"},
            {q: "Apa perbedaan utama antara Event Recording dan Interval Recording?", options: ["Event berfokus menghitung total kemunculan, Interval berfokus mencatat ada/tidaknya perilaku dalam irisan waktu", "Event harus dilakukan siang hari, Interval pada malam hari", "Event butuh kertas kosong, Interval butuh video recorder", "Tidak ada bedanya, hanya soal preferensi format"], answer: "Event berfokus menghitung total kemunculan, Interval berfokus mencatat ada/tidaknya perilaku dalam irisan waktu"},
            {q: "Perilaku seperti “mengucapkan halo” atau “mengajukan pertanyaan” cocok diamati menggunakan:", options: ["Event recording (karena ada titik mula & akhir yang jelas)", "Interval recording", "Rating scale", "Continuous narrative"], answer: "Event recording (karena ada titik mula & akhir yang jelas)"},
            {q: "Rating Recording memiliki kelemahan utama berupa:", options: ["Rentan terhadap bias/subjektivitas pengamat (rater)", "Terlalu mahal untuk direplikasi", "Hanya bisa digunakan untuk objek statis", "Terlalu memakan banyak kertas lembar kerja"], answer: "Rentan terhadap bias/subjektivitas pengamat (rater)"},
            {q: "Ciri khas dari Narrative Recording adalah:", options: ["Disusun secara kronologis dalam bentuk deskripsi/narasi cerita utuh", "Menggunakan tabel ceklis dan tally marks", "Menggunakan alat pengukur waktu stopwatch khusus", "Hasilnya langsung berupa grafik kuantitatif"], answer: "Disusun secara kronologis dalam bentuk deskripsi/narasi cerita utuh"}
        ];

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let isAnswered = false;

        function getElement(id) { return document.getElementById(id); }

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        function triggerReflow(element) {
            element.classList.remove('animate-fade-in');
            void element.offsetWidth; // Trigger reflow
            element.classList.add('animate-fade-in');
        }

        // Initialize total questions UI
        document.addEventListener('DOMContentLoaded', () => {
            getElement('total-q-start').innerText = database.length;
            getElement('total-q').innerText = database.length;
        });

        function startQuiz() {
            questions = shuffleArray(JSON.parse(JSON.stringify(database)));
            currentIndex = 0;
            score = 0;
            
            getElement('start-screen').classList.add('hidden');
            getElement('result-screen').classList.add('hidden');
            
            const quizScreen = getElement('quiz-screen');
            quizScreen.classList.remove('hidden');
            triggerReflow(quizScreen);
            
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            
            const nextBtn = getElement('next-btn');
            nextBtn.classList.remove('show');
            setTimeout(() => nextBtn.classList.add('hidden'), 300); // Wait for transition
            
            getElement('current-q').innerText = currentIndex + 1;
            
            const questionEl = getElement('question');
            const currentData = questions[currentIndex];
            questionEl.innerText = currentData.q;
            
            // Animate question text
            questionEl.style.opacity = '0';
            questionEl.classList.remove('animate-fade-in');
            void questionEl.offsetWidth;
            questionEl.classList.add('animate-fade-in');
            
            let optionsData = shuffleArray([...currentData.options]);
            const optionsContainer = getElement('options');
            optionsContainer.innerHTML = '';
            
            // Staggered slide-up for options
            optionsData.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-slide-up';
                btn.style.animationDelay = `${index * 0.08}s`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt, currentData.answer);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct) {
            if (isAnswered) return;
            isAnswered = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) {
                    b.classList.add('correct');
                }
            });

            if (selected === correct) {
                score++;
            } else {
                btn.classList.add('wrong');
            }

            const nextBtn = getElement('next-btn');
            nextBtn.classList.remove('hidden');
            setTimeout(() => nextBtn.classList.add('show'), 10); // small delay to trigger transition
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            getElement('quiz-screen').classList.add('hidden');
            
            const resultScreen = getElement('result-screen');
            resultScreen.classList.remove('hidden');
            
            getElement('final-score').innerHTML = `${score}<span>/${database.length}</span>`;
            
            const msg = getElement('result-message');
            const percentage = score / database.length;
            
            if (percentage === 1) msg.innerText = "ngecit lu y";
            else if (percentage >= 0.75) msg.innerText = "ywdh";
            else if (percentage >= 0.5) msg.innerText = "balik tk lg ngtd";
            else msg.innerText = "PULANG MAEN ML AJA BEGOO";
            
            // Restart animations for result screen elements
            const animatedElements = resultScreen.querySelectorAll('.animate-slide-up');
            animatedElements.forEach(el => {
                el.classList.remove('animate-slide-up');
                void el.offsetWidth;
                el.classList.add('animate-slide-up');
            });
        }
    </script>
</body>
