<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama is Listening - Now Playing</title>
    <link rel="icon" type="image/png" href="/logo.png">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --primary-color: #4dc2ff; 
            --secondary-color: #b0b0b0; 
            --spotify-green: #1ed760;
            --card-bg: #282828;
            --shadow-dark: rgba(0, 0, 0, 0.8);
            --font-main: 'Poppins', sans-serif;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Fix layout shifting */
        }

        /* Blur Background */
        #albumArtBackground {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.4);
            z-index: 0;
            transition: background-image 1s ease-in-out;
        }

        /* --- PLAYING UI --- */
        .main-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* PC Layout: Album Centered */
        .album-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 3D Peel Effect Container */
        .album-container {
            position: relative;
            width: 450px;
            height: 450px;
            perspective: 1500px; /* Enable 3D space */
        }

        .album-art {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 50px var(--shadow-dark);
            object-fit: cover;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            transform-origin: left center;
        }

        .new-art { z-index: 1; }
        .current-art { z-index: 2; }
        
        /* The Peeling Animation */
        .peel-off {
            z-index: 3;
            animation: peelAnim 1.2s cubic-bezier(0.3, 0.0, 0.2, 1) forwards;
        }

        @keyframes peelAnim {
            0% { transform: rotateY(0deg) scale(1); opacity: 1; }
            100% { transform: rotateY(-110deg) scale(1.1) translateX(-30px); opacity: 0; filter: drop-shadow(20px 20px 20px rgba(0,0,0,0.5)); }
        }

        /* PC Layout: Info Bottom Left */
        .info-section {
            position: absolute;
            bottom: 60px;
            left: 60px;
            width: 450px;
            z-index: 20;
            text-align: left;
        }

        .song-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0 0 5px 0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        /* Progress Bar & Timestamp */
        .progress-area {
            width: 100%;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #404040;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--spotify-green);
            width: 0%;
            /* Transition updated via JS for smooth rewind */
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.85rem;
            color: var(--secondary-color);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 25px;
            margin-top: 20px;
        }

        .controls i {
            font-size: 1.8rem;
            color: var(--secondary-color);
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .controls i:hover { color: var(--text-color); }
        .controls .play-btn i { font-size: 3rem; color: var(--spotify-green); }
        .controls .play-btn i:hover { color: #1aae55; }

        /* Socials Container */
        .socials-section {
            position: absolute;
            bottom: 60px;
            right: 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            z-index: 20;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 0.95em;
            transition: color 0.3s;
        }
        .social-link:hover { color: var(--primary-color); }

        /* --- NOT PLAYING UI --- */
        .not-playing-ui {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 30;
        }

        .not-playing-title {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 2rem;
        }

        .connect-button a {
            background-color: var(--spotify-green);
            color: var(--card-bg);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .connect-button a:hover { background-color: #1aae55; }

        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        /* --- ANDROID / MOBILE RESPONSIVE --- */
        @media (max-width: 850px) {
            .main-ui {
                flex-direction: column;
                justify-content: center;
                padding: 30px;
            }

            .album-wrapper {
                height: auto;
                margin-bottom: 40px;
            }

            .album-container {
                width: 80vw;
                height: 80vw;
                max-width: 350px;
                max-height: 350px;
            }

            .info-section {
                position: relative;
                bottom: auto; left: auto;
                width: 100%;
                max-width: 400px;
                text-align: center; /* Center text on mobile */
            }

            .song-title { font-size: 2rem; }

            .controls {
                justify-content: center; /* Center controls on mobile */
            }

            .socials-section {
                position: relative;
                bottom: auto; right: auto;
                align-items: center; /* Center socials */
                margin-top: 40px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    
    <div id="albumArtBackground"></div>

    <!-- PLAYING STATE -->
    <div id="mainUI" class="main-ui hidden">
        
        <div class="album-wrapper">
            <div id="albumContainer" class="album-container">
                <!-- JS will inject album art here for peel effect -->
            </div>
        </div>

        <div class="info-section">
            <h2 id="songTitle" class="song-title">Loading...</h2>
            <p id="artistName" class="artist-name">Loading...</p>
            
            <div class="progress-area">
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <div class="controls">
                <i class="fas fa-backward"></i>
                <span class="play-btn">
                    <i id="playPauseIcon" class="fas fa-pause"></i>
                </span>
                <i class="fas fa-forward"></i>
            </div>
        </div>

    </div>

    <!-- NOT PLAYING / ERROR STATE -->
    <div id="notPlayingUI" class="not-playing-ui">
        <h1 id="listeningText" class="not-playing-title">Loading...</h1>
        <div id="connectButton" class="connect-button hidden">
            <a href="/.netlify/functions/login-spotify">Connect to Spotify</a>
        </div>
    </div>

    <!-- SOCIALS (Always visible, adjusted positioning) -->
    <div id="socialsSection" class="socials-section hidden">
        <a id="spotifyLink" href="https://open.spotify.com/user/312em4jgpxct27qoj7vfu3z2xqei?si=2238a3ccbb1545a2" target="_blank" rel="noopener noreferrer" class="social-link">
            <i class="fab fa-spotify"></i>
            <span id="spotifyLinkText">Follow my Spotify!</span>
        </a>
        
        <a id="instagramLink" href="https://instagram.com/grayalldayog" target="_blank" rel="noopener noreferrer" class="social-link">
            <i class="fab fa-instagram"></i>
            <span id="instagramLinkText">Hit me up on Instagram!</span>
        </a>
    </div>

    <script>
        const mainUI = document.getElementById('mainUI');
        const notPlayingUI = document.getElementById('notPlayingUI');
        const listeningText = document.getElementById('listeningText');
        const albumContainer = document.getElementById('albumContainer');
        const albumArtBackground = document.getElementById('albumArtBackground');
        const songTitle = document.getElementById('songTitle');
        const artistName = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const currentTimeElement = document.getElementById('currentTime');
        const totalTimeElement = document.getElementById('totalTime');
        const socialsSection = document.getElementById('socialsSection');
        const spotifyLinkText = document.getElementById('spotifyLinkText');
        const instagramLinkText = document.getElementById('instagramLinkText');
        const connectButton = document.getElementById('connectButton');

        let currentSongId = null;
        let lastProgressMs = 0;
        let isRewinding = false;

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // --- 1. PEELING OFF ANIMATION LOGIC ---
        function triggerPeelOff(newUrl) {
            const currentArt = albumContainer.querySelector('.current-art');
            
            // Initial load
            if (!currentArt) {
                albumContainer.innerHTML = `<img src="${newUrl}" class="album-art current-art">`;
                albumArtBackground.style.backgroundImage = `url('${newUrl}')`;
                return;
            }

            // Don't peel if it's the exact same image
            if (currentArt.src === newUrl) return;

            // Create new art behind the current one
            const newArt = document.createElement('img');
            newArt.src = newUrl;
            newArt.className = 'album-art new-art';
            albumContainer.appendChild(newArt);

            // Trigger peel off animation on old art
            currentArt.classList.remove('current-art');
            currentArt.classList.add('peel-off');

            albumArtBackground.style.backgroundImage = `url('${newUrl}')`;

            // Cleanup DOM after animation completes
            setTimeout(() => {
                if (currentArt.parentNode) currentArt.parentNode.removeChild(currentArt);
                newArt.classList.remove('new-art');
                newArt.classList.add('current-art');
            }, 1200); 
        }

        // --- 2. BACKWARD TIMESTAMP/PROGRESS ANIMATION LOGIC ---
        async function performRewind(startMs) {
            isRewinding = true;

            // Smooth transition for progress bar backwards
            progressBar.style.transition = 'width 1s cubic-bezier(0.25, 1, 0.5, 1)';
            progressBar.style.width = '0%';

            let startTime = performance.now();
            const duration = 1000; // Rewind takes 1 second

            return new Promise(resolve => {
                function updateNumber(time) {
                    let elapsed = time - startTime;
                    let progress = Math.min(elapsed / duration, 1);
                    
                    // Ease out effect for the numbers rewinding
                    let ease = 1 - Math.pow(1 - progress, 3);
                    let currentMs = startMs - (startMs * ease);

                    currentTimeElement.textContent = formatTime(currentMs);

                    if (progress < 1) {
                        requestAnimationFrame(updateNumber);
                    } else {
                        isRewinding = false;
                        progressBar.style.transition = 'width 1s linear'; // Restore normal forward transition
                        resolve();
                    }
                }
                requestAnimationFrame(updateNumber);
            });
        }

        // --- 3. FETCH & STATE MANAGEMENT ---
        async function fetchNowPlaying() {
            if (isRewinding) return; // Prevent conflicting UI updates while rewinding

            try {
                const response = await fetch('/.netlify/functions/now-playing');
                const data = await response.json();

                socialsSection.classList.remove('hidden');

                if (data.error) {
                    showErrorState();
                    return;
                }

                if (data.isPlaying) {
                    const newSongId = `${data.title}-${data.artist}`;

                    // Detect Song Change or Loop Back
                    if (currentSongId && currentSongId !== newSongId) {
                        triggerPeelOff(data.albumArt);
                        await performRewind(lastProgressMs);
                        currentSongId = newSongId;
                    } else if (currentSongId === null) {
                        triggerPeelOff(data.albumArt);
                        currentSongId = newSongId;
                    } else if (data.progress < lastProgressMs - 3000) {
                        // Triggers if song is placed on repeat and drops back to 0
                        await performRewind(lastProgressMs);
                    }

                    if (!isRewinding) {
                        updatePlayingUI(data);
                    }
                } else {
                    showNotPlayingState();
                }
            } catch (error) {
                console.error("Failed to fetch data:", error);
            }
        }

        function updatePlayingUI(data) {
            mainUI.classList.remove('hidden');
            notPlayingUI.classList.add('hidden');
            connectButton.classList.add('hidden');

            songTitle.textContent = data.title;
            artistName.textContent = data.artist;

            lastProgressMs = data.progress;
            const progressPercent = (data.progress / data.duration) * 100;

            // Standard forward progression
            progressBar.style.transition = 'width 1s linear';
            progressBar.style.width = `${progressPercent}%`;

            currentTimeElement.textContent = formatTime(data.progress);
            totalTimeElement.textContent = formatTime(data.duration);

            spotifyLinkText.textContent = 'Follow my Spotify!';
            instagramLinkText.textContent = 'Hit me up on Instagram!';
        }

        function showNotPlayingState() {
            mainUI.classList.add('hidden');
            notPlayingUI.classList.remove('hidden');
            albumArtBackground.style.backgroundImage = 'none';

            listeningText.textContent = 'Rama is doing something else..';
            listeningText.style.color = 'var(--text-color)';
            connectButton.classList.add('hidden');

            spotifyLinkText.textContent = 'But still you can stalk my spotify!';
            instagramLinkText.textContent = 'Maybe im active here? idk';

            currentSongId = null; // Reset so peeling triggers again next session
        }

        function showErrorState() {
            mainUI.classList.add('hidden');
            notPlayingUI.classList.remove('hidden');
            albumArtBackground.style.backgroundImage = 'none';

            listeningText.textContent = 'ERROR: Admin connection required.';
            listeningText.style.color = '#ff4d4d';
            connectButton.classList.remove('hidden');
        }

        // Initialize and set interval
        fetchNowPlaying();
        setInterval(fetchNowPlaying, 1000); 
    </script>
</body>
</html>
