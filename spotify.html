<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rama is Listening - Now Playing</title>
    <link rel="icon" type="image/png" href="/logo.png">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --primary-color: #4dc2ff; 
            --secondary-color: #b0b0b0; 
            --spotify-green: #1ed760;
            --card-bg: #282828;
            --shadow-dark: rgba(0, 0, 0, 0.8);
            --font-main: 'Poppins', sans-serif;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* Allows scrolling on very small screens instead of overlapping */
        }

        /* Blur Background */
        #albumArtBackground {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) brightness(0.4);
            z-index: 0;
            transition: background-image 1s ease-in-out;
        }

        /* --- STRUCTURAL LAYOUT --- */
        .main-layout {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            padding: 40px 60px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-layout.visible {
            opacity: 1;
        }

        /* Top Center: Album Area */
        .album-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 300px;
            margin-bottom: 40px;
        }

        /* Top Center: Not Playing Message */
        .message-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Bottom Row: Info (Left) & Socials (Right) */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            gap: 30px;
        }

        .bottom-bar.center-socials {
            justify-content: center;
        }

        /* --- 3D ALBUM ART --- */
        .album-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1; /* Keeps art perfectly square regardless of image dims */
            perspective: 1500px;
        }

        .album-art {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 50px var(--shadow-dark);
            object-fit: cover;
            backface-visibility: hidden;
            transform-style: preserve-3d;
            transform-origin: left center;
        }

        .new-art { z-index: 1; }
        .current-art { z-index: 2; }
        
        .peel-off {
            z-index: 3;
            animation: peelAnim 1.2s cubic-bezier(0.3, 0.0, 0.2, 1) forwards;
        }

        @keyframes peelAnim {
            0% { transform: rotateY(0deg) scale(1); opacity: 1; }
            100% { transform: rotateY(-110deg) scale(1.1) translateX(-30px); opacity: 0; filter: drop-shadow(20px 20px 20px rgba(0,0,0,0.5)); }
        }

        /* --- INFO SECTION (Left Side PC) --- */
        .info-section {
            width: 450px;
            max-width: 100%;
        }

        .song-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0 0 5px 0;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            font-size: 1.2rem;
            color: var(--secondary-color);
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        /* Progress Bar */
        .progress-area { width: 100%; }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #404040;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--spotify-green);
            width: 0%;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.85rem;
            color: var(--secondary-color);
            margin-top: 8px;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 25px;
            margin-top: 20px;
        }

        .controls i {
            font-size: 1.8rem;
            color: var(--secondary-color);
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .controls i:hover { color: var(--text-color); }
        .controls .play-btn i { font-size: 3rem; color: var(--spotify-green); }
        .controls .play-btn i:hover { color: #1aae55; }

        /* --- NOT PLAYING UI --- */
        .not-playing-title {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 2rem;
        }

        .connect-button a {
            background-color: var(--spotify-green);
            color: var(--card-bg);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .connect-button a:hover { background-color: #1aae55; }

        /* --- SOCIALS (Right Side PC / Bottom Mobile) --- */
        .socials-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 0.95em;
            transition: color 0.3s;
        }
        .social-link:hover { color: var(--primary-color); }

        .hidden { display: none !important; }

        /* --- ANDROID / MOBILE RESPONSIVE --- */
        @media (max-width: 850px) {
            .main-layout {
                padding: 30px 25px;
                justify-content: flex-start; /* Stacks everything top-down */
            }

            .album-section {
                margin-bottom: 30px;
                min-height: unset;
            }

            .album-container {
                width: 80vw;
                max-width: 350px;
            }

            .bottom-bar {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 45px;
                margin-top: auto; /* Pushes bottom-bar (and socials inside it) to the very bottom */
            }

            .info-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
            }

            .controls {
                justify-content: center;
            }

            .socials-section {
                align-items: center; /* Centers social items on mobile */
                width: 100%;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    
    <div id="albumArtBackground"></div>

    <div id="mainLayout" class="main-layout">
        
        <!-- DYNAMIC TOP SECTION -->
        <div id="albumSection" class="album-section hidden">
            <div id="albumContainer" class="album-container">
                <!-- JS handles album art injection for peel effect -->
            </div>
        </div>

        <div id="messageSection" class="message-section">
            <h1 id="listeningText" class="not-playing-title">Loading...</h1>
            <div id="connectButton" class="connect-button hidden">
                <a href="/.netlify/functions/login-spotify">Connect to Spotify</a>
            </div>
        </div>

        <!-- ALWAYS AT BOTTOM -->
        <div id="bottomBar" class="bottom-bar">
            
            <div id="infoSection" class="info-section hidden">
                <h2 id="songTitle" class="song-title">Loading...</h2>
                <p id="artistName" class="artist-name">Loading...</p>
                
                <div class="progress-area">
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <i class="fas fa-backward"></i>
                    <span class="play-btn">
                        <i id="playPauseIcon" class="fas fa-pause"></i>
                    </span>
                    <i class="fas fa-forward"></i>
                </div>
            </div>

            <div class="socials-section">
                <a id="spotifyLink" href="https://open.spotify.com/user/312em4jgpxct27qoj7vfu3z2xqei?si=2238a3ccbb1545a2" target="_blank" rel="noopener noreferrer" class="social-link">
                    <i class="fab fa-spotify"></i>
                    <span id="spotifyLinkText">Follow my Spotify!</span>
                </a>
                
                <a id="instagramLink" href="https://instagram.com/grayalldayog" target="_blank" rel="noopener noreferrer" class="social-link">
                    <i class="fab fa-instagram"></i>
                    <span id="instagramLinkText">Hit me up on Instagram!</span>
                </a>
            </div>

        </div>
    </div>

    <script>
        const mainLayout = document.getElementById('mainLayout');
        const albumSection = document.getElementById('albumSection');
        const messageSection = document.getElementById('messageSection');
        const bottomBar = document.getElementById('bottomBar');
        const infoSection = document.getElementById('infoSection');
        
        const listeningText = document.getElementById('listeningText');
        const albumContainer = document.getElementById('albumContainer');
        const albumArtBackground = document.getElementById('albumArtBackground');
        const songTitle = document.getElementById('songTitle');
        const artistName = document.getElementById('artistName');
        const progressBar = document.getElementById('progressBar');
        const currentTimeElement = document.getElementById('currentTime');
        const totalTimeElement = document.getElementById('totalTime');
        const spotifyLinkText = document.getElementById('spotifyLinkText');
        const instagramLinkText = document.getElementById('instagramLinkText');
        const connectButton = document.getElementById('connectButton');

        let currentSongId = null;
        let lastProgressMs = 0;
        let isRewinding = false;

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // --- PEELING OFF ANIMATION ---
        function triggerPeelOff(newUrl) {
            const currentArt = albumContainer.querySelector('.current-art');
            
            if (!currentArt) {
                albumContainer.innerHTML = `<img src="${newUrl}" class="album-art current-art">`;
                albumArtBackground.style.backgroundImage = `url('${newUrl}')`;
                return;
            }

            if (currentArt.src === newUrl) return;

            const newArt = document.createElement('img');
            newArt.src = newUrl;
            newArt.className = 'album-art new-art';
            albumContainer.appendChild(newArt);

            currentArt.classList.remove('current-art');
            currentArt.classList.add('peel-off');
            albumArtBackground.style.backgroundImage = `url('${newUrl}')`;

            setTimeout(() => {
                if (currentArt.parentNode) currentArt.parentNode.removeChild(currentArt);
                newArt.classList.remove('new-art');
                newArt.classList.add('current-art');
            }, 1200); 
        }

        // --- BACKWARD TIMESTAMP ANIMATION ---
        async function performRewind(startMs) {
            isRewinding = true;
            progressBar.style.transition = 'width 1s cubic-bezier(0.25, 1, 0.5, 1)';
            progressBar.style.width = '0%';

            let startTime = performance.now();
            const duration = 1000; 

            return new Promise(resolve => {
                function updateNumber(time) {
                    let elapsed = time - startTime;
                    let progress = Math.min(elapsed / duration, 1);
                    
                    let ease = 1 - Math.pow(1 - progress, 3);
                    let currentMs = startMs - (startMs * ease);

                    currentTimeElement.textContent = formatTime(currentMs);

                    if (progress < 1) {
                        requestAnimationFrame(updateNumber);
                    } else {
                        isRewinding = false;
                        progressBar.style.transition = 'width 1s linear'; 
                        resolve();
                    }
                }
                requestAnimationFrame(updateNumber);
            });
        }

        // --- UI STATE MANAGEMENT ---
        function updatePlayingUI(data) {
            mainLayout.classList.add('visible');
            albumSection.classList.remove('hidden');
            infoSection.classList.remove('hidden');
            messageSection.classList.add('hidden');
            bottomBar.classList.remove('center-socials');
            connectButton.classList.add('hidden');

            songTitle.textContent = data.title;
            artistName.textContent = data.artist;

            lastProgressMs = data.progress;
            const progressPercent = (data.progress / data.duration) * 100;

            progressBar.style.transition = 'width 1s linear';
            progressBar.style.width = `${progressPercent}%`;

            currentTimeElement.textContent = formatTime(data.progress);
            totalTimeElement.textContent = formatTime(data.duration);

            spotifyLinkText.textContent = 'Follow my Spotify!';
            instagramLinkText.textContent = 'Hit me up on Instagram!';
        }

        function showNotPlayingState() {
            mainLayout.classList.add('visible');
            albumSection.classList.add('hidden');
            infoSection.classList.add('hidden');
            messageSection.classList.remove('hidden');
            bottomBar.classList.add('center-socials'); 

            albumArtBackground.style.backgroundImage = 'none';
            listeningText.textContent = 'Rama is doing something else..';
            listeningText.style.color = 'var(--text-color)';
            connectButton.classList.add('hidden');

            spotifyLinkText.textContent = 'But still you can stalk my spotify!';
            instagramLinkText.textContent = 'Maybe im active here? idk';

            currentSongId = null; 
        }

        function showErrorState() {
            mainLayout.classList.add('visible');
            albumSection.classList.add('hidden');
            infoSection.classList.add('hidden');
            messageSection.classList.remove('hidden');
            bottomBar.classList.add('center-socials');

            albumArtBackground.style.backgroundImage = 'none';
            listeningText.textContent = 'ERROR: Admin connection required.';
            listeningText.style.color = '#ff4d4d';
            connectButton.classList.remove('hidden');
        }

        // --- FETCH DATA ---
        async function fetchNowPlaying() {
            if (isRewinding) return;

            try {
                const response = await fetch('/.netlify/functions/now-playing');
                const data = await response.json();

                if (data.error) {
                    showErrorState();
                    return;
                }

                if (data.isPlaying) {
                    const newSongId = `${data.title}-${data.artist}`;

                    if (currentSongId && currentSongId !== newSongId) {
                        triggerPeelOff(data.albumArt);
                        await performRewind(lastProgressMs);
                        currentSongId = newSongId;
                    } else if (currentSongId === null) {
                        triggerPeelOff(data.albumArt);
                        currentSongId = newSongId;
                    } else if (data.progress < lastProgressMs - 3000) {
                        await performRewind(lastProgressMs);
                    }

                    if (!isRewinding) {
                        updatePlayingUI(data);
                    }
                } else {
                    showNotPlayingState();
                }
            } catch (error) {
                console.error("Failed to fetch data:", error);
            }
        }

        fetchNowPlaying();
        setInterval(fetchNowPlaying, 1000); 
    </script>
</body>
</html>
